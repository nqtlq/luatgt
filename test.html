<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chọn bộ đề thi | Traffic Law Test</title>

<style>
body{
 margin:0;
 font-family:Arial,Helvetica,sans-serif;
 background:linear-gradient(135deg,#eef3ff,#f9fbff);
}

/* ===== HEADER ===== */
header{
 background:linear-gradient(90deg,#1d3557,#264a8a);
 color:white;
 padding:24px 30px;
 box-shadow:0 6px 18px rgba(0,0,0,.25);
 text-align:center;

 /* ✨ bo tròn header */
 border-bottom-left-radius:26px;
 border-bottom-right-radius:26px;
}

/* TIÊU ĐỀ CHÍNH */
header h1{
 margin:0;
 font-size:24px;
 letter-spacing:.6px;
}

/* 🔠 HÀNG 2 – TO HƠN + IN HOA */
header .en{
 margin-top:6px;
 font-size:18px;          /* tăng cỡ chữ */
 font-weight:600;
 letter-spacing:1px;
 text-transform:uppercase; /* IN HOA */
 opacity:.95;
}

/* DÒNG GỢI Ý (NẾU CÓ) */
header .hint{
 margin-top:12px;
 font-size:14px;
 opacity:.95;
}


/* ===== CONTAINER ===== */
#container{
 max-width:1200px;
 margin:35px auto;
 padding:0 20px;
}

/* ===== SECTION ===== */
.section{
 margin-bottom:45px;
}
.section h2{
 color:#1d3557;
 margin-bottom:22px;
}

/* ===== GRID ===== */
.grid{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
 gap:28px;
}

/* ===== CARD ===== */
.card{
 border-radius:18px;
 padding:24px;
 box-shadow:0 10px 28px rgba(0,0,0,.14);
 transition:.25s;
 position:relative;
 overflow:hidden;
}
.card::after{
 content:"";
 position:absolute;
 inset:0;
 background:rgba(255,255,255,.05);
 opacity:0;
 transition:.25s;
}
.card:hover{
 transform:translateY(-6px);
 box-shadow:0 16px 38px rgba(0,0,0,.22);
}
.card:hover::after{opacity:1;}

.card h3{
 margin:0 0 10px;
 font-size:18px;
}
.card p{
 margin:6px 0;
 font-size:14px;
}

/* ===== COLOR THEMES ===== */
.moto{
 background:linear-gradient(135deg,#e8f7f3,#cfeee7);
 border-left:6px solid #2a9d8f;
}
.car{
 background:linear-gradient(135deg,#eef4ff,#dbe6ff);
 border-left:6px solid #457b9d;
}

/* ===== BUTTON ===== */
.card button{
 margin-top:16px;
 width:100%;
 padding:12px;
 border:none;
 border-radius:10px;
 font-size:15px;
 cursor:pointer;
 background:#1d3557;
 color:white;
}
.card button:hover{opacity:.9}

/* ===== MODAL ===== */
#modal{
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.55);
 display:none;
 align-items:center;
 justify-content:center;
 z-index:10;
}
#modalBox{
 background:white;
 width:430px;
 max-width:92%;
 border-radius:18px;
 padding:26px;
}
#modalBox h3{
 margin-top:0;
 color:#1d3557;
}
.modal-btns{
 display:flex;
 gap:14px;
 margin-top:22px;
}
.modal-btns button{
 flex:1;
 padding:12px;
 border:none;
 border-radius:10px;
 cursor:pointer;
 font-size:14px;
}
.start{
 background:#2a9d8f;
 color:white;
}
.back{
 background:#999;
 color:white;
}
</style>
</head>

<body>

<!-- ===== HEADER ===== -->
<header>
 <h1>HỆ THỐNG THI LUẬT GIAO THÔNG ĐƯỜNG BỘ</h1>
 <div class="en">Road Traffic Law Examination System</div>
 <div class="hint">👉 Vui lòng lựa chọn bộ đề thi phù hợp để bắt đầu làm bài</div>
</header>

<div id="container">

 <!-- ===== MOTO ===== -->
 <div class="section">
  <h2>🏍️ Thi sát hạch lái xe mô tô quân sự</h2>
  <div class="grid" id="motoBox"></div>
 </div>

 <!-- ===== CAR ===== -->
 <div class="section">
  <h2>🚛 Kiểm tra lái xe ô tô quân sự</h2>
  <div class="grid" id="carBox"></div>
 </div>

</div>

<!-- ===== MODAL ===== -->
<div id="modal">
 <div id="modalBox">
  <h3 id="mName"></h3>
  <p id="mDesc"></p>
  <p id="mTotal"></p>
  <p id="mTime"></p>
  <p id="mPass"></p>

  <div class="modal-btns">
   <button class="start" onclick="startExam()">▶ Bắt đầu làm bài</button>
   <button class="back" onclick="closeModal()">⬅ Quay lại</button>
  </div>
 </div>
</div>

<!-- ===== FIREBASE ===== -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
 apiKey:"AIzaSyBGivIEsyBLsLs0CqRvwmwceG26duZbWlM",
 authDomain:"thi-luat-giao-thong.firebaseapp.com",
 projectId:"thi-luat-giao-thong"
});
const db = firebase.firestore();

let selectedSet=null;

/* ===== LOAD QUESTION SETS ===== */
db.collection("question_sets")
 .where("active","==",true)
 .get()
 .then(snap=>{
  snap.forEach(doc=>{
   const s = doc.data();

   const card = `
    <div class="card ${s.type}">
     <h3>${s.name}</h3>
     <p>${s.description||""}</p>
     <p>• Số câu: ${s.totalQuestions}</p>
     <p>• Thời gian: ${s.time} phút</p>
     <p>• Điều kiện đạt: ≥ ${s.passQuestions}/${s.totalQuestions}</p>
     <button onclick='openModal(${JSON.stringify(s)})'>Xem chi tiết</button>
    </div>
   `;

   if(s.type==="moto"){
    document.getElementById("motoBox").innerHTML+=card;
   }

   if(s.type==="car" && s.code!=="XMT"){
    document.getElementById("carBox").innerHTML+=card;
   }
  });
 });

/* ===== MODAL ===== */
function openModal(s){
 selectedSet=s;
 mName.innerText=s.name;
 mDesc.innerText=s.description||"";
 mTotal.innerText="• Số câu: "+s.totalQuestions;
 mTime.innerText="• Thời gian: "+s.time+" phút";
 mPass.innerText="• Điều kiện đạt: ≥ "+s.passQuestions+"/"+s.totalQuestions;
 modal.style.display="flex";
}

function closeModal(){
 modal.style.display="none";
}

function startExam(){
 localStorage.setItem("examSet",JSON.stringify(selectedSet));
 location.href="exam.html";
}
</script>

</body>
</html>
