<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thi kiểm tra | Driving Test System</title>

<style>
body{
 margin:0;
 font-family:Arial,Helvetica,sans-serif;
 background:linear-gradient(135deg,#eef3ff,#f9fbff);
}

header{
 background:linear-gradient(90deg,#1d3557,#264a8a);
 color:white;
 padding:18px 30px;
 box-shadow:0 4px 15px rgba(0,0,0,.25);
}
header h1{margin:0;font-size:22px;}
header small{font-size:14px;opacity:.85;}

#container{
 max-width:1100px;
 margin:30px auto;
 padding:0 20px;
}

.section{margin-bottom:40px;}
.section h2{color:#1d3557;margin-bottom:20px;}

.grid{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
 gap:22px;
}

.card{
 background:white;
 border-radius:18px;
 padding:22px;
 box-shadow:0 8px 25px rgba(0,0,0,.12);
 transition:.2s;
 position:relative;
 overflow:hidden;
}
.card::before{
 content:"";
 position:absolute;
 top:0;left:0;right:0;
 height:6px;
}
.card.moto::before{background:#457b9d;}
.card.car::before{background:#e76f51;}

.card:hover{
 transform:translateY(-4px);
 box-shadow:0 14px 32px rgba(0,0,0,.18);
}

.card h3{margin:0 0 8px;color:#1d3557;}
.card p{margin:4px 0;font-size:14px;color:#333;}

.stats{
 display:flex;
 gap:10px;
 margin-top:8px;
}
.stat{
 background:#eef3ff;
 padding:6px 10px;
 border-radius:10px;
 font-size:13px;
 font-weight:bold;
 color:#1d3557;
}

.card button{
 margin-top:14px;
 width:100%;
 padding:12px;
 border:none;
 border-radius:12px;
 background:#1d3557;
 color:white;
 font-size:15px;
 cursor:pointer;
}
.card.car button{background:#e76f51;}
.card button:hover{opacity:.9}

/* ===== MODAL ===== */
#modal{
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.5);
 display:none;
 align-items:center;
 justify-content:center;
 z-index:10;
}
#modalBox{
 background:white;
 width:420px;
 max-width:90%;
 border-radius:18px;
 padding:25px;
}
#modalBox h3{margin-top:0;color:#1d3557}
.modal-btns{
 display:flex;
 gap:12px;
 margin-top:20px;
}
.modal-btns button{
 flex:1;
 padding:12px;
 border:none;
 border-radius:12px;
 cursor:pointer;
 font-size:14px;
}
.start{background:#2a9d8f;color:white;}
.back{background:#aaa;color:white;}
</style>
</head>

<body>

<header>
 <h1>📝 HỆ THỐNG THI KIỂM TRA LÁI XE</h1>
 <small>Driving Test Examination System</small>
</header>

<div id="container">

 <div class="section">
  <h2>🏍️ Thi sát hạch lái xe mô tô quân sự</h2>
  <div class="grid" id="motoBox"></div>
 </div>

 <div class="section">
  <h2>🚛 Kiểm tra lái xe ô tô quân sự</h2>
  <div class="grid" id="carBox"></div>
 </div>

</div>

<!-- ===== MODAL ===== -->
<div id="modal">
 <div id="modalBox">
  <h3 id="mName"></h3>
  <p id="mDesc"></p>
  <p id="mTotal"></p>
  <p id="mTime"></p>
  <p id="mPass"></p>

  <div class="modal-btns">
   <button class="start" onclick="startExam()">▶ Bắt đầu</button>
   <button class="back" onclick="closeModal()">⬅ Quay lại</button>
  </div>
 </div>
</div>

<!-- ===== FIREBASE ===== -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
 apiKey:"AIzaSyBGivIEsyBLsLs0CqRvwmwceG26duZbWlM",
 authDomain:"thi-luat-giao-thong.firebaseapp.com",
 projectId:"thi-luat-giao-thong"
});
const db = firebase.firestore();
let selectedSet=null;

/* ===== LOAD DATA + STATS ===== */
db.collection("question_sets")
 .where("active","==",true)
 .get()
 .then(async snap=>{
  for(const doc of snap.docs){
   const s = doc.data();

   // ❌ bỏ bộ đề không cần
   if(s.type==="car" && s.code==="XMT") continue;

   const logSnap = await db.collection("exam_logs")
    .where("setCode","==",s.code).get();

   let total=logSnap.size, pass=0;
   logSnap.forEach(l=>{ if(l.data().pass) pass++; });
   const rate = total ? Math.round(pass/total*100) : 0;

   const html = `
    <div class="card ${s.type}">
     <h3>${s.name}</h3>
     <p>${s.description||""}</p>
     <p>• Số câu: ${s.totalQuestions}</p>
     <p>• Thời gian: ${s.time} phút</p>
     <p>• Điều kiện đạt: ≥ ${s.passQuestions}/${s.totalQuestions}</p>
     <div class="stats">
      <div class="stat">📊 ${total} lượt</div>
      <div class="stat">✅ ${rate}% đậu</div>
     </div>
     <button onclick='openModal(${JSON.stringify(s)})'>Xem chi tiết</button>
    </div>
   `;

   if(s.type==="moto") motoBox.innerHTML+=html;
   if(s.type==="car") carBox.innerHTML+=html;
  }
 });

/* ===== MODAL ===== */
function openModal(s){
 selectedSet=s;
 mName.innerText=s.name;
 mDesc.innerText=s.description||"";
 mTotal.innerText="• Số câu: "+s.totalQuestions;
 mTime.innerText="• Thời gian: "+s.time+" phút";
 mPass.innerText="• Điều kiện đạt: ≥ "+s.passQuestions+"/"+s.totalQuestions;
 modal.style.display="flex";
}
function closeModal(){modal.style.display="none";}
function startExam(){
 localStorage.setItem("examSet",JSON.stringify(selectedSet));
 location.href="exam.html";
}
</script>

</body>
</html>
