<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thi kiểm tra | Driving Test System</title>

<style>
body{
 margin:0;
 font-family:Arial,Helvetica,sans-serif;
 background:linear-gradient(135deg,#eef3ff,#f9fbff);
}

header{
 background:linear-gradient(90deg,#1d3557,#264a8a);
 color:white;
 padding:18px 30px;
 box-shadow:0 4px 15px rgba(0,0,0,.25);
}
header h1{margin:0;font-size:22px;}
header small{font-size:14px;opacity:.85;}

#container{
 max-width:1100px;
 margin:30px auto;
 padding:0 20px;
}

.section{
 margin-bottom:40px;
}
.section h2{
 color:#1d3557;
 margin-bottom:20px;
}

.grid{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
 gap:25px;
}

.card{
 background:white;
 border-radius:16px;
 padding:22px;
 box-shadow:0 8px 25px rgba(0,0,0,.12);
 transition:.2s;
}
.card:hover{
 transform:translateY(-4px);
 box-shadow:0 12px 30px rgba(0,0,0,.18);
}

.card h3{
 margin:0 0 8px;
 color:#1d3557;
}
.card p{
 margin:4px 0;
 font-size:14px;
 color:#333;
}

.card button{
 margin-top:14px;
 width:100%;
 padding:12px;
 border:none;
 border-radius:10px;
 background:#1d3557;
 color:white;
 font-size:15px;
 cursor:pointer;
}
.card button:hover{opacity:.9}

/* ===== MODAL ===== */
#modal{
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.5);
 display:none;
 align-items:center;
 justify-content:center;
 z-index:10;
}
#modalBox{
 background:white;
 width:420px;
 max-width:90%;
 border-radius:16px;
 padding:25px;
}
#modalBox h3{margin-top:0;color:#1d3557}
.modal-btns{
 display:flex;
 gap:12px;
 margin-top:20px;
}
.modal-btns button{
 flex:1;
 padding:12px;
 border:none;
 border-radius:10px;
 cursor:pointer;
 font-size:14px;
}
.start{
 background:#2a9d8f;
 color:white;
}
.back{
 background:#aaa;
 color:white;
}
</style>
</head>

<body>

<header>
 <h1>📝 HỆ THỐNG THI KIỂM TRA LÁI XE</h1>
 <small>Driving Test Examination System</small>
</header>

<div id="container">

 <!-- ===== MOTO ===== -->
 <div class="section">
  <h2>🏍️ Thi sát hạch lái xe mô tô quân sự<br><small>Military Motorcycle Test</small></h2>
  <div class="grid" id="motoBox"></div>
 </div>

 <!-- ===== CAR ===== -->
 <div class="section">
  <h2>🚛 Kiểm tra lái xe ô tô quân sự<br><small>Military Car Driving Test</small></h2>
  <div class="grid" id="carBox"></div>
 </div>

</div>

<!-- ===== MODAL ===== -->
<div id="modal">
 <div id="modalBox">
  <h3 id="mName"></h3>
  <p id="mDesc"></p>
  <p id="mTotal"></p>
  <p id="mTime"></p>
  <p id="mPass"></p>

  <div class="modal-btns">
   <button class="start" onclick="startExam()">▶ Bắt đầu</button>
   <button class="back" onclick="closeModal()">⬅ Quay lại</button>
  </div>
 </div>
</div>

<!-- ===== FIREBASE ===== -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
 apiKey:"AIzaSyBGivIEsyBLsLs0CqRvwmwceG26duZbWlM",
 authDomain:"thi-luat-giao-thong.firebaseapp.com",
 projectId:"thi-luat-giao-thong"
});
const db = firebase.firestore();

let selectedSet=null;

/* ===== LOAD DATA ===== */
db.collection("question_sets")
 .where("active","==",true)
 .get()
 .then(snap=>{
  snap.forEach(doc=>{
   const s = doc.data();

   const html = `
    <div class="card">
     <h3>${s.name}</h3>
     <p>${s.description||""}</p>
     <p>• Số câu: ${s.totalQuestions}</p>
     <p>• Thời gian: ${s.time} phút</p>
     <p>• Điều kiện đạt: ≥ ${s.passQuestions}/${s.totalQuestions}</p>
     <button onclick='openModal(${JSON.stringify(s)})'>Xem chi tiết</button>
    </div>
   `;

   // ---- PHÂN LOẠI ----
   if(s.type === "moto"){
    document.getElementById("motoBox").innerHTML += html;
   }
   if(s.type === "car" && s.code !== "XMT"){
    document.getElementById("carBox").innerHTML += html;
   }
  });
 });

/* ===== MODAL ===== */
function openModal(s){
 selectedSet=s;
 document.getElementById("mName").innerText=s.name;
 document.getElementById("mDesc").innerText=s.description||"";
 document.getElementById("mTotal").innerText="• Số câu: "+s.totalQuestions;
 document.getElementById("mTime").innerText="• Thời gian: "+s.time+" phút";
 document.getElementById("mPass").innerText=
  "• Điều kiện đạt: ≥ "+s.passQuestions+"/"+s.totalQuestions;
 document.getElementById("modal").style.display="flex";
}

function closeModal(){
 document.getElementById("modal").style.display="none";
}

function startExam(){
 localStorage.setItem("examSet",JSON.stringify(selectedSet));
 location.href="exam.html";
}
</script>

</body>
</html>
