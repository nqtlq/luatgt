<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chọn bộ đề</title>

<style>
body{
 margin:0;
 font-family:Arial,Helvetica,sans-serif;
 background:linear-gradient(135deg,#eef3ff,#f9fbff);
}
header{
 background:linear-gradient(90deg,#1d3557,#264a8a);
 color:white;
 padding:18px;
 text-align:center;
}
#container{
 max-width:1100px;
 margin:30px auto;
 padding:0 16px;
}
.grid{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:28px;
}
@media(max-width:900px){
 .grid{grid-template-columns:1fr;}
}
.box{
 background:white;
 padding:24px;
 border-radius:20px;
 box-shadow:0 10px 28px rgba(0,0,0,.12);
}
.box.motor{border-top:6px solid #457b9d;}
.box.car{border-top:6px solid #e76f51;}
.box h3{margin:0;color:#1d3557;}
.box h4{margin:6px 0 16px;color:#555;font-weight:normal;}

.exam{
 background:#f9fbff;
 border-radius:14px;
 padding:18px 20px;
 margin-bottom:16px;
 box-shadow:0 6px 18px rgba(0,0,0,.1);
 position:relative;
}
.exam::before{
 content:"";
 position:absolute;
 left:0;top:0;bottom:0;
 width:6px;
 border-radius:14px 0 0 14px;
 background:#e76f51;
}
.exam b{font-size:16px;color:#1d3557;}
.exam p{margin:6px 0;font-size:14px;color:#555;}

.stats{
 display:flex;
 gap:16px;
 margin-top:8px;
 font-size:14px;
}
.stat{
 background:#eef3ff;
 padding:6px 12px;
 border-radius:10px;
 font-weight:bold;
 color:#1d3557;
}

.exam button{
 margin-top:12px;
 width:100%;
 background:#e76f51;
 color:white;
 border:none;
 border-radius:12px;
 padding:12px;
 font-size:15px;
 cursor:pointer;
}

.back{text-align:center;margin:30px 0;}
.back button{
 background:#457b9d;
 color:white;
 border:none;
 border-radius:14px;
 padding:14px 26px;
 font-size:16px;
}
</style>
</head>

<body>

<header>
 <h1>HỆ THỐNG KIỂM TRA LUẬT GIAO THÔNG</h1>
 <h2>Traffic Law Examination System</h2>
</header>

<div id="container">

 <div class="grid">

  <!-- ===== MÔ TÔ ===== -->
  <div class="box motor">
   <h3>🚲 SÁT HẠCH MÔ TÔ</h3>
   <h4>Motorcycle Test</h4>

   <div class="exam">
    <b>Bộ đề A1</b>
    <p>25 câu • 19 phút • ≥21 đạt</p>
    <button onclick="startExam('A1')">▶ Bắt đầu thi</button>
   </div>
  </div>

  <!-- ===== Ô TÔ ===== -->
  <div class="box car">
   <h3>🚗 SÁT HẠCH Ô TÔ</h3>
   <h4>Car Driving Test</h4>
   <div id="carExams">⏳ Đang tải...</div>
  </div>

 </div>

 <div class="back">
  <button onclick="back()">⬅ Quay lại</button>
 </div>

</div>

<!-- ===== FIREBASE ===== -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
 apiKey:"AIzaSyBGivIEsyBLsLs0CqRvwmwceG26duZbWlM",
 authDomain:"thi-luat-giao-thong.firebaseapp.com",
 projectId:"thi-luat-giao-thong"
});
const db=firebase.firestore();

/* ===== LOAD CAR EXAMS + STATS ===== */
async function loadCarExams(){
 const setSnap = await db.collection("question_sets")
  .where("active","==",true).get();

 if(setSnap.empty){
  carExams.innerHTML="<i>Không có bộ đề</i>";
  return;
 }

 carExams.innerHTML="";

 for(const d of setSnap.docs){
  const s=d.data();

  const logSnap = await db.collection("exam_logs")
   .where("code","==",s.code).get();

  let total=logSnap.size, pass=0;
  logSnap.forEach(l=>{ if(l.data().pass) pass++; });

  const rate = total ? Math.round(pass/total*100) : 0;

  carExams.innerHTML+=`
   <div class="exam">
    <b>${s.name}</b>
    <p>${s.description||""}</p>
    <div class="stats">
     <div class="stat">📊 ${total} lượt</div>
     <div class="stat">✅ ${rate}% đậu</div>
    </div>
    <button onclick="startExam('${s.code}')">▶ Bắt đầu thi</button>
   </div>`;
 }
}

loadCarExams();

/* ===== START ===== */
function startExam(code){
 localStorage.setItem("examSet",code);
 location.href="exam_do.html";
}

/* ===== BACK ===== */
function back(){
 location.href = localStorage.getItem("userType")==="student"
  ? "exam.html"
  : "index.html";
}
</script>

</body>
</html>
