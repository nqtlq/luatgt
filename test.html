<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chọn bộ đề thi</title>

<style>
body{
 margin:0;
 font-family:Arial,Helvetica,sans-serif;
 background:linear-gradient(135deg,#eef3ff,#f9fbff);
}
header{
 background:linear-gradient(90deg,#1d3557,#264a8a);
 color:white;
 padding:22px 30px;
 text-align:center;
 box-shadow:0 4px 15px rgba(0,0,0,.25);
}
header h1{margin:0;font-size:24px;}
header .en{font-size:15px;margin-top:4px;}
header .hint{margin-top:12px;font-size:14px;}

#container{
 max-width:1200px;
 margin:35px auto;
 padding:0 20px;
}

.section{margin-bottom:45px;}
.section h2{color:#1d3557;margin-bottom:22px;}

.grid{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
 gap:26px;
}

.card{
 border-radius:18px;
 padding:24px;
 box-shadow:0 10px 28px rgba(0,0,0,.14);
 transition:.25s;
}
.card:hover{
 transform:translateY(-6px);
 box-shadow:0 16px 38px rgba(0,0,0,.22);
}
.moto{
 background:linear-gradient(135deg,#e8f7f3,#cfeee7);
 border-left:6px solid #2a9d8f;
}
.car{
 background:linear-gradient(135deg,#eef4ff,#dbe6ff);
 border-left:6px solid #457b9d;
}
.card h3{margin:0 0 10px;}
.card p{margin:6px 0;font-size:14px;}
.card button{
 margin-top:16px;
 width:100%;
 padding:12px;
 border:none;
 border-radius:10px;
 background:#1d3557;
 color:white;
 cursor:pointer;
}
.card button:hover{opacity:.9}

/* MODAL */
#modal{
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.55);
 display:none;
 align-items:center;
 justify-content:center;
}
#modalBox{
 background:white;
 width:430px;
 max-width:92%;
 border-radius:18px;
 padding:26px;
}
#modalBox h3{margin-top:0;color:#1d3557;}
.modal-btns{
 display:flex;
 gap:14px;
 margin-top:22px;
}
.modal-btns button{
 flex:1;
 padding:12px;
 border:none;
 border-radius:10px;
 cursor:pointer;
}
.start{background:#2a9d8f;color:white;}
.back{background:#999;color:white;}
</style>
</head>

<body>

<header>
 <h1>HỆ THỐNG THI LUẬT GIAO THÔNG ĐƯỜNG BỘ</h1>
 <div class="en">Road Traffic Law Examination System</div>
 <div class="hint">👉 Vui lòng lựa chọn bộ đề thi phù hợp để bắt đầu làm bài</div>
</header>

<div id="container">

 <div class="section">
  <h2>🏍️ Thi sát hạch lái xe mô tô quân sự</h2>
  <div class="grid" id="motoBox"></div>
 </div>

 <div class="section">
  <h2>🚛 Kiểm tra lái xe ô tô quân sự</h2>
  <div class="grid" id="carBox"></div>
 </div>

</div>

<!-- MODAL -->
<div id="modal">
 <div id="modalBox">
  <h3 id="mName"></h3>
  <p id="mDesc"></p>
  <p id="mTotal"></p>
  <p id="mTime"></p>
  <p id="mPass"></p>
  <div class="modal-btns">
   <button class="start" onclick="startExam()">▶ Bắt đầu</button>
   <button class="back" onclick="closeModal()">⬅ Quay lại</button>
  </div>
 </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
 apiKey:"AIzaSyBGivIEsyBLsLs0CqRvwmwceG26duZbWlM",
 authDomain:"thi-luat-giao-thong.firebaseapp.com",
 projectId:"thi-luat-giao-thong"
});
const db = firebase.firestore();

let selectedSet=null;

/* LOAD QUESTION SETS */
db.collection("question_sets")
 .where("active","==",true)
 .get()
 .then(snap=>{
  snap.forEach(doc=>{
   const s = doc.data();
   const code = (s.code||"").toUpperCase();

   // PHÂN LOẠI
   let type=null;
   if(code==="A1" || code==="MOTO") type="moto";
   if(code==="150" || code==="450" || code==="600") type="car";
   if(code==="XMT") return;

   if(!type) return;

   const card = `
    <div class="card ${type}">
     <h3>${s.name||"Bộ đề"}</h3>
     <p>${s.description||""}</p>
     <p>• Số câu: ${s.totalQuestions||0}</p>
     <p>• Thời gian: ${s.time||0} phút</p>
     <p>• Điều kiện đạt: ≥ ${s.passQuestions||0}/${s.totalQuestions||0}</p>
     <button onclick='openModal(${JSON.stringify(s)})'>Xem chi tiết</button>
    </div>
   `;

   document.getElementById(type+"Box").innerHTML+=card;
  });
 });

function openModal(s){
 selectedSet=s;
 mName.innerText=s.name||"";
 mDesc.innerText=s.description||"";
 mTotal.innerText="• Số câu: "+(s.totalQuestions||0);
 mTime.innerText="• Thời gian: "+(s.time||0)+" phút";
 mPass.innerText="• Điều kiện đạt: ≥ "+(s.passQuestions||0)+"/"+(s.totalQuestions||0);
 modal.style.display="flex";
}
function closeModal(){modal.style.display="none";}
function startExam(){
 localStorage.setItem("examSet",JSON.stringify(selectedSet));
 location.href="exam.html";
}
</script>

</body>
</html>
