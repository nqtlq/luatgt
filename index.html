<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Đăng nhập – Hệ thống thi Luật Giao thông</title>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0f4f8;
      --card: #fff;
      --blue: #1d3557;
      --accent: #264a8a;
      --green: #2a9d8f;
      --red: #e63946;
      --yellow: #f4a261;
      --muted: #636e72;
      --border: #dfe6e9;
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
      --radius: 16px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      border-radius: var(--radius);
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 420px;
      padding: 40px 32px;
      animation: slideIn 0.4s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      font-size: 64px;
      margin-bottom: 12px;
    }

    .logo h1 {
      font-size: 22px;
      color: var(--blue);
      margin-bottom: 6px;
    }

    .logo p {
      font-size: 13px;
      color: var(--muted);
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      background: #f8fafc;
      padding: 6px;
      border-radius: 12px;
    }

    .tab {
      flex: 1;
      padding: 12px;
      border: none;
      background: transparent;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      transition: all 0.2s;
    }

    .tab.active {
      background: white;
      color: var(--blue);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .form-section {
      display: none;
    }

    .form-section.active {
      display: block;
      animation: fadeIn 0.3s;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--blue);
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      transition: all 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--blue);
      background: #f8fafc;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--blue), var(--accent));
      color: white;
    }

    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-guest {
      background: linear-gradient(135deg, var(--green), #1a7a6e);
      color: white;
    }

    .btn-guest:hover {
      opacity: 0.9;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 13px;
      line-height: 1.5;
      display: none;
    }

    .alert.show {
      display: block;
      animation: fadeIn 0.3s;
    }

    .alert-error {
      background: #fee2e2;
      border: 1px solid #fca5a5;
      color: #991b1b;
    }

    .alert-success {
      background: #d1fae5;
      border: 1px solid #6ee7b7;
      color: #065f46;
    }

    .alert-info {
      background: #dbeafe;
      border: 1px solid #93c5fd;
      color: #1e40af;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .divider {
      text-align: center;
      margin: 24px 0;
      color: var(--muted);
      font-size: 13px;
      position: relative;
    }

    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: var(--border);
    }

    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .footer {
      text-align: center;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 28px 20px;
      }

      .logo h1 {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>
  <div class="login-container">
    <div class="logo">
      <div class="logo-icon">🚗</div>
      <h1>HỆ THỐNG THI LÝ THUYẾT</h1>
      <p>Luật Giao thông Đường bộ Việt Nam</p>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('student')">Học viên</button>
      <button class="tab" onclick="switchTab('guest')">Khách</button>
    </div>

    <div id="alertBox" class="alert"></div>

    <!-- STUDENT LOGIN -->
    <div class="form-section active" id="studentForm">
      <form onsubmit="loginStudent(event)">
        <div class="form-group">
          <label>Mã học viên</label>
          <input type="text" id="studentCode" placeholder="Ví dụ: HV001" required>
        </div>

        <div class="form-group">
          <label>Mật khẩu</label>
          <input type="password" id="studentPassword" placeholder="Nhập mật khẩu" required>
        </div>

        <button type="submit" class="btn btn-primary" id="btnStudentLogin">
          Đăng nhập
        </button>
      </form>
    </div>

    <!-- GUEST LOGIN -->
    <div class="form-section" id="guestForm">
      <div class="alert alert-info show">
        <b>Chế độ Khách</b><br>
        • Giới hạn 3 lượt thi/ngày<br>
        • Kết quả không được lưu vào hệ thống<br>
        • Liên hệ Admin để đăng ký tài khoản học viên
      </div>

      <button class="btn btn-guest" onclick="loginGuest()">
        Vào thi với tư cách Khách
      </button>
    </div>

    <div class="footer">
      © 2024 Hệ thống thi Luật Giao thông<br>
      Hỗ trợ: <b>0973.306.802</b>
    </div>
  </div>

  <script>
    // ================================================================
    // FIREBASE INIT
    // ================================================================
    let db = null, auth = null;

    try {
      if (!firebase.apps.length) {
        firebase.initializeApp({
          apiKey: "AIzaSyBGivIEsyBLsLs0CqRvwmwceG26duZbWlM",
          authDomain: "thi-luat-giao-thong.firebaseapp.com",
          projectId: "thi-luat-giao-thong"
        });
      }
      db = firebase.firestore();
      auth = firebase.auth();
    } catch (e) {
      console.error("Firebase init error:", e);
      showAlert("Không thể kết nối Firebase. Kiểm tra cấu hình.", "error");
    }

    // ================================================================
    // HELPERS
    // ================================================================
    function showAlert(msg, type = 'error') {
      const box = document.getElementById('alertBox');
      box.className = `alert alert-${type} show`;
      box.innerHTML = msg;
      setTimeout(() => box.classList.remove('show'), 5000);
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => {
        t.classList.toggle('active', t.textContent.toLowerCase().includes(tab));
      });

      document.getElementById('studentForm').classList.toggle('active', tab === 'student');
      document.getElementById('guestForm').classList.toggle('active', tab === 'guest');
      document.getElementById('alertBox').classList.remove('show');
    }

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      if (loading) {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Đang xử lý...';
      } else {
        btn.disabled = false;
        btn.innerHTML = btnId === 'btnStudentLogin' ? 'Đăng nhập' : 'Vào thi với tư cách Khách';
      }
    }

    // ================================================================
    // STUDENT LOGIN
    // ================================================================
    async function loginStudent(e) {
      e.preventDefault();

      if (!db) {
        showAlert("Không thể kết nối cơ sở dữ liệu.", "error");
        return;
      }

      const code = document.getElementById('studentCode').value.trim();
      const password = document.getElementById('studentPassword').value;

      if (!code || !password) {
        showAlert("Vui lòng nhập đầy đủ thông tin.", "error");
        return;
      }

      setLoading('btnStudentLogin', true);

      try {
        // Sign in anonymous để có request.auth != null
        await auth.signInAnonymously();

        // Rules: allow read if request.auth != null && request.auth.uid == studentCode
        // Nhưng uid của anonymous != studentCode
        // => Phải query bằng admin hoặc custom auth
        // Đơn giản nhất: query public field hoặc dùng cloud function

        // Workaround: đọc students/{code} - rules hiện tại sẽ chặn
        // Cách an toàn: dùng callable function hoặc custom token
        // Tạm thời dùng client-side đơn giản:

        const docSnap = await db.collection('students').doc(code).get();

        if (!docSnap.exists) {
          showAlert("Mã học viên không tồn tại.", "error");
          setLoading('btnStudentLogin', false);
          return;
        }

        const data = docSnap.data();

        // Kiểm tra password (trong thực tế nên hash)
        if (data.password !== password) {
          showAlert("Mật khẩu không đúng.", "error");
          setLoading('btnStudentLogin', false);
          return;
        }

        // Kiểm tra trạng thái
        if (data.status !== 'active') {
          showAlert("Tài khoản của bạn đã bị khóa. Liên hệ Admin.", "error");
          setLoading('btnStudentLogin', false);
          return;
        }

        // Lưu thông tin vào localStorage
        localStorage.setItem('userType', 'student');
        localStorage.setItem('studentCode', code);
        localStorage.setItem('studentName', data.name || code);
        localStorage.setItem('studentUnit', data.unit || '');
        localStorage.setItem('studentObject', data.object || '');
        localStorage.setItem('studentCourse', data.course || '');

        showAlert("Đăng nhập thành công!", "success");

        setTimeout(() => {
          const redirect = localStorage.getItem('redirectAfterLogin') || 'exam.html';
          localStorage.removeItem('redirectAfterLogin');
          location.href = redirect;
        }, 800);

      } catch (err) {
        console.error("Login error:", err);

        if (err.code === 'permission-denied') {
          showAlert(
            "Không có quyền đọc thông tin học viên.<br>" +
            "Với rules hiện tại, cần custom auth token hoặc callable function.<br>" +
            "Liên hệ Admin để cấu hình.",
            "error"
          );
        } else {
          showAlert(`Lỗi: ${err.message || err.code}`, "error");
        }

        setLoading('btnStudentLogin', false);
      }
    }

    // ================================================================
    // GUEST LOGIN
    // ================================================================
    async function loginGuest() {
      try {
        await auth.signInAnonymously();

        localStorage.setItem('userType', 'guest');
        localStorage.removeItem('studentCode');
        localStorage.removeItem('studentName');

        showAlert("Đang chuyển trang...", "success");

        setTimeout(() => {
          location.href = 'exam.html';
        }, 500);

      } catch (err) {
        console.error("Guest login error:", err);

        if (err.code === 'auth/operation-not-allowed') {
          showAlert(
            "Anonymous Authentication chưa được bật.<br>" +
            "Vào Firebase Console → Authentication → Sign-in methods → Anonymous → Enable",
            "error"
          );
        } else {
          showAlert(`Lỗi: ${err.message}`, "error");
        }
      }
    }

    // ================================================================
    // AUTO-REDIRECT IF LOGGED IN
    // ================================================================
    window.addEventListener('DOMContentLoaded', () => {
      const userType = localStorage.getItem('userType');
      if (userType === 'student' || userType === 'guest') {
        location.href = 'exam.html';
      }
    });
  </script>
</body>
</html>
