<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập hệ thống</title>

<style>
body{
 margin:0;
 font-family:Arial,Helvetica,sans-serif;
 background:#eef2f6;
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
}
.box{
 background:white;
 padding:30px;
 width:360px;
 border-radius:14px;
 box-shadow:0 6px 20px rgba(0,0,0,.18);
}
h2{
 text-align:center;
 margin-top:0;
 color:#1d3557;
}
input{
 width:100%;
 padding:12px;
 margin-top:12px;
 border-radius:8px;
 border:1px solid #ccc;
 font-size:15px;
}
button{
 width:100%;
 margin-top:15px;
 padding:13px;
 border:none;
 border-radius:8px;
 font-size:15px;
 cursor:pointer;
}
#loginStudent{background:#2a9d8f;color:white;}
#loginAdmin{background:#457b9d;color:white;}
#trialBtn{background:#adb5bd;color:white;}
button:hover{opacity:.9}
.note{
 font-size:13px;
 color:#666;
 margin-top:10px;
 text-align:center;
}
</style>
</head>

<body>

<div class="box">
 <h2>🔐 ĐĂNG NHẬP</h2>

 <!-- HỌC VIÊN -->
 <input id="studentInput" placeholder="Mã học viên hoặc tên học viên">
 <button id="loginStudent">Đăng nhập học viên</button>

 <hr style="margin:18px 0">

 <!-- ADMIN -->
 <input id="adminPass" type="password" placeholder="Mật khẩu Admin">
 <button id="loginAdmin">Đăng nhập Admin</button>

 <hr style="margin:18px 0">

 <button id="trialBtn">▶ Thi thử (không cần đăng nhập)</button>

 <div class="note">
  • Học viên chỉ cần nhập mã hoặc tên<br>
  • Admin cần mật khẩu
 </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
/* ===== FIREBASE ===== */
firebase.initializeApp({
 apiKey:"AIzaSyBGivIEsyBLsLs0CqRvwmwceG26duZbWlM",
 authDomain:"thi-luat-giao-thong.firebaseapp.com",
 projectId:"thi-luat-giao-thong"
});
const db = firebase.firestore();

/* ===== ADMIN HASH (THEO YÊU CẦU) ===== */
const ADMIN_HASH =
"7676aaafb027c825bd9abab78b234070e702752f625b752e55e55b48e607e358";

/* ===== HASH FUNCTION ===== */
async function hashPassword(str){
 const buf = await crypto.subtle.digest(
  "SHA-256",
  new TextEncoder().encode(str)
 );
 return Array.from(new Uint8Array(buf))
  .map(b=>b.toString(16).padStart(2,"0"))
  .join("");
}

/* ===== ADMIN LOGIN ===== */
document.getElementById("loginAdmin").onclick = async ()=>{
 const pass = adminPass.value.trim();
 if(!pass){
  alert("Nhập mật khẩu admin");
  return;
 }
 const hash = await hashPassword(pass);
 if(hash === ADMIN_HASH){
  localStorage.setItem("userType","admin");
  location.href="admin.html";
 }else{
  alert("❌ Sai mật khẩu admin");
 }
};

/* ===== STUDENT LOGIN (GIỮ NGUYÊN – KHÔNG ĐỘNG LOGIC CŨ) ===== */
document.getElementById("loginStudent").onclick = ()=>{
 const val = studentInput.value.trim();
 if(!val){
  alert("Nhập mã hoặc tên học viên");
  return;
 }
 localStorage.setItem("userType","student");
 localStorage.setItem("studentCode",val);
 location.href="exam.html";
};

/* ===== ENTER KEY ===== */
document.addEventListener("keydown",e=>{
 if(e.key==="Enter"){
  if(document.activeElement===adminPass){
   loginAdmin.click();
  }else{
   loginStudent.click();
  }
 }
});

/* ===== TRIAL ===== */
document.getElementById("trialBtn").onclick=()=>{
 localStorage.clear();
 location.href="test.html";
};
</script>

</body>
</html>
