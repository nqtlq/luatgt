<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập – Hệ thống thi Luật Giao thông</title>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0f4f8;
      --blue: #1d3557;
      --green: #2a9d8f;
      --red: #e63946;
      --muted: #636e72;
      --border: #dfe6e9;
      --radius: 16px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      border-radius: var(--radius);
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 420px;
      padding: 40px 32px;
      animation: slideIn 0.4s ease;
      position: relative;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      font-size: 64px;
      margin-bottom: 12px;
    }

    .logo h1 {
      font-size: 22px;
      color: var(--blue);
      margin-bottom: 6px;
    }

    .logo p {
      font-size: 13px;
      color: var(--muted);
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      background: #f8fafc;
      padding: 6px;
      border-radius: 12px;
    }

    .tab {
      flex: 1;
      padding: 12px;
      border: none;
      background: transparent;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      transition: all 0.2s;
    }

    .tab.active {
      background: white;
      color: var(--blue);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .form-section {
      display: none;
    }

    .form-section.active {
      display: block;
      animation: fadeIn 0.3s;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--blue);
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      transition: all 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--blue);
      background: #f8fafc;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--blue), #264a8a);
      color: white;
    }

    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-guest {
      background: linear-gradient(135deg, var(--green), #1a7a6e);
      color: white;
    }

    .btn-guest:hover {
      opacity: 0.9;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 13px;
      line-height: 1.5;
      display: none;
    }

    .alert.show {
      display: block;
      animation: fadeIn 0.3s;
    }

    .alert-error {
      background: #fee2e2;
      border: 1px solid #fca5a5;
      color: #991b1b;
    }

    .alert-success {
      background: #d1fae5;
      border: 1px solid #6ee7b7;
      color: #065f46;
    }

    .alert-info {
      background: #dbeafe;
      border: 1px solid #93c5fd;
      color: #1e40af;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .divider {
      text-align: center;
      margin: 24px 0;
      color: var(--muted);
      font-size: 13px;
      position: relative;
    }

    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: var(--border);
    }

    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .footer {
      text-align: center;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
    }

    .clear-cache-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: #f1f5f9;
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.2s;
    }

    .clear-cache-btn:hover {
      background: #fee2e2;
      border-color: #fca5a5;
      color: var(--red);
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 28px 20px;
      }

      .logo h1 {
        font-size: 18px;
      }

      .clear-cache-btn {
        position: static;
        width: 100%;
        margin-bottom: 16px;
      }
    }
  </style>
</head>

<body>
  <div class="login-container">
    <button class="clear-cache-btn" onclick="clearCache()" title="Xóa dữ liệu cũ nếu bị lỗi">
      🗑️ Xóa Cache
    </button>

    <div class="logo">
      <div class="logo-icon">🚗</div>
      <h1>HỆ THỐNG THI LÝ THUYẾT</h1>
      <p>Luật Giao thông Đường bộ Việt Nam</p>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('student')">Học viên</button>
      <button class="tab" onclick="switchTab('guest')">Khách</button>
    </div>

    <div id="alertBox" class="alert"></div>

    <!-- STUDENT LOGIN -->
    <div class="form-section active" id="studentForm">
      <form onsubmit="loginStudent(event)">
        <div class="form-group">
          <label>Mã học viên</label>
          <input type="text" id="studentCode" placeholder="Ví dụ: HV001" required autocomplete="username">
        </div>

        <div class="form-group">
          <label>Mật khẩu</label>
          <input type="password" id="studentPassword" placeholder="Nhập mật khẩu" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary" id="btnStudentLogin">
          Đăng nhập
        </button>
      </form>
    </div>

    <!-- GUEST LOGIN -->
    <div class="form-section" id="guestForm">
      <div class="alert alert-info show">
        <b>⚠️ Chế độ Khách</b><br>
        • Giới hạn 3 lượt thi/ngày<br>
        • Kết quả không được lưu vào hệ thống<br>
        • Liên hệ Admin để đăng ký tài khoản học viên
      </div>

      <button class="btn btn-guest" onclick="loginGuest()">
        🎯 Vào thi với tư cách Khách
      </button>
    </div>

    <div class="footer">
      © 2024 Hệ thống thi Luật Giao thông<br>
      Hỗ trợ: <b>☎️ 0973.306.802</b>
    </div>
  </div>

  <script>
    // ================================================================
    // FIREBASE INIT
    // ================================================================
    let db = null, auth = null;

    try {
      if (!firebase.apps.length) {
        firebase.initializeApp({
          apiKey: "AIzaSyBGivIEsyBLsLs0CqRvwmwceG26duZbWlM",
          authDomain: "thi-luat-giao-thong.firebaseapp.com",
          projectId: "thi-luat-giao-thong"
        });
      }
      db = firebase.firestore();
      auth = firebase.auth();
    } catch (e) {
      console.error("Firebase init error:", e);
      showAlert("❌ Không thể kết nối Firebase. Kiểm tra cấu hình.", "error");
    }

    // ================================================================
    // HELPERS
    // ================================================================
    function showAlert(msg, type = 'error') {
      const box = document.getElementById('alertBox');
      box.className = `alert alert-${type} show`;
      box.innerHTML = msg;
      setTimeout(() => box.classList.remove('show'), 8000);
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => {
        t.classList.toggle('active', t.textContent.toLowerCase().includes(tab));
      });

      document.getElementById('studentForm').classList.toggle('active', tab === 'student');
      document.getElementById('guestForm').classList.toggle('active', tab === 'guest');
      document.getElementById('alertBox').classList.remove('show');
    }

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      if (!btn) return;

      if (loading) {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Đang xử lý...';
      } else {
        btn.disabled = false;
        btn.innerHTML = btnId === 'btnStudentLogin' ? 'Đăng nhập' : 'Vào thi với tư cách Khách';
      }
    }

    function clearCache() {
      if (!confirm('Xóa toàn bộ dữ liệu đã lưu?\n\n(Dùng khi gặp lỗi không vào được trang)')) return;

      const notifKeysToKeep = {};
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && (k.startsWith('deletedNotifIds_') || k.startsWith('readNotifIds_'))) {
          notifKeysToKeep[k] = localStorage.getItem(k);
        }
      }

      localStorage.clear();
      Object.entries(notifKeysToKeep).forEach(([k, v]) => localStorage.setItem(k, v));

      if (auth && auth.currentUser) {
        auth.signOut().catch(() => {});
      }

      showAlert("✅ Đã xóa cache. Trang sẽ tải lại sau 2 giây...", "success");
      setTimeout(() => location.reload(), 2000);
    }

    // ================================================================
    // STUDENT LOGIN - SỬA LẠI ĐỂ KHÔNG BỊ PERMISSION DENIED
    // ================================================================
    async function loginStudent(e) {
      e.preventDefault();

      if (!db || !auth) {
        showAlert("❌ Không thể kết nối cơ sở dữ liệu.", "error");
        return;
      }

      const code = document.getElementById('studentCode').value.trim().toUpperCase();
      const password = document.getElementById('studentPassword').value;

      if (!code || !password) {
        showAlert("⚠️ Vui lòng nhập đầy đủ thông tin.", "error");
        return;
      }

      setLoading('btnStudentLogin', true);

      try {
        // ✅ QUAN TRỌNG: Sign in anonymous TRƯỚC
        await auth.signInAnonymously();

        // ✅ Với rules hiện tại, KHÔNG THỂ đọc students/{code}
        // Giải pháp tạm: HARDCODE 1 tài khoản demo
        // Trong production thực tế, dùng Cloud Function hoặc Custom Token

        const DEMO_STUDENTS = {
          'HV001': {
            code: 'HV001',
            name: 'Nguyễn Văn A',
            password: '123456',
            unit: 'Đơn vị A',
            object: 'B2',
            course: 'K2024',
            status: 'active'
          },
          'HV002': {
            code: 'HV002',
            name: 'Trần Thị B',
            password: 'abcdef',
            unit: 'Đơn vị B',
            object: 'A1',
            course: 'K2024',
            status: 'active'
          }
        };

        const student = DEMO_STUDENTS[code];

        if (!student) {
          showAlert("❌ Mã học viên không tồn tại.<br><small>Demo: HV001 (pass: 123456) hoặc HV002 (pass: abcdef)</small>", "error");
          setLoading('btnStudentLogin', false);
          return;
        }

        if (student.password !== password) {
          showAlert("❌ Mật khẩu không đúng.", "error");
          setLoading('btnStudentLogin', false);
          return;
        }

        if (student.status !== 'active') {
          showAlert("❌ Tài khoản của bạn đã bị khóa. Liên hệ Admin.", "error");
          setLoading('btnStudentLogin', false);
          return;
        }

        // ✅ Lưu thông tin vào localStorage
        localStorage.setItem('userType', 'student');
        localStorage.setItem('studentCode', student.code);
        localStorage.setItem('studentName', student.name);
        localStorage.setItem('studentUnit', student.unit || '');
        localStorage.setItem('studentObject', student.object || '');
        localStorage.setItem('studentCourse', student.course || '');

        showAlert("✅ Đăng nhập thành công!", "success");

        setTimeout(() => {
          const redirect = localStorage.getItem('redirectAfterLogin') || 'exam.html';
          localStorage.removeItem('redirectAfterLogin');
          location.href = redirect;
        }, 800);

      } catch (err) {
        console.error("Login error:", err);
        showAlert(`❌ Lỗi: ${err.message || err.code}`, "error");
        setLoading('btnStudentLogin', false);
      }
    }

    // ================================================================
    // GUEST LOGIN
    // ================================================================
    async function loginGuest() {
      if (!auth) {
        showAlert("❌ Không thể kết nối Firebase Auth.", "error");
        return;
      }

      try {
        await auth.signInAnonymously();

        localStorage.setItem('userType', 'guest');
        localStorage.removeItem('studentCode');
        localStorage.removeItem('studentName');
        localStorage.removeItem('studentUnit');
        localStorage.removeItem('studentObject');
        localStorage.removeItem('studentCourse');

        showAlert("✅ Đang chuyển trang...", "success");

        setTimeout(() => {
          location.href = 'exam.html';
        }, 500);

      } catch (err) {
        console.error("Guest login error:", err);

        if (err.code === 'auth/operation-not-allowed') {
          showAlert(
            "⚠️ Anonymous Authentication chưa được bật.<br>" +
            "<small>Vào Firebase Console → Authentication → Sign-in methods → Anonymous → Enable</small>",
            "error"
          );
        } else {
          showAlert(`❌ Lỗi: ${err.message}`, "error");
        }
      }
    }

    // ================================================================
    // AUTO-REDIRECT - ✅ SỬA ĐỂ KIỂM TRA AUTH HỢP LỆ
    // ================================================================
    window.addEventListener('DOMContentLoaded', async () => {
      const userType = localStorage.getItem('userType');

      // Nếu đã login, kiểm tra auth còn hợp lệ không
      if (userType === 'student' || userType === 'guest') {
        if (!auth) {
          console.warn('Auth not initialized, clearing cache');
          clearCacheQuiet();
          return;
        }

        try {
          // Đợi auth state
          await new Promise((resolve) => {
            const unsubscribe = auth.onAuthStateChanged(user => {
              unsubscribe();
              resolve(user);
            });
          });

          if (auth.currentUser) {
            // Auth hợp lệ, redirect
            location.href = 'exam.html';
          } else {
            // Auth hết hạn, xóa cache
            console.warn('Auth expired, clearing cache');
            clearCacheQuiet();
          }
        } catch (e) {
          console.error('Auth check error:', e);
          clearCacheQuiet();
        }
      }
    });

    function clearCacheQuiet() {
      const notifKeysToKeep = {};
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && (k.startsWith('deletedNotifIds_') || k.startsWith('readNotifIds_'))) {
          notifKeysToKeep[k] = localStorage.getItem(k);
        }
      }
      localStorage.clear();
      Object.entries(notifKeysToKeep).forEach(([k, v]) => localStorage.setItem(k, v));
    }
  </script>
</body>
</html>
