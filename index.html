<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập - Hệ thống thi luật GT</title>

<style>
body{
 margin:0;
 font-family:Arial,Helvetica,sans-serif;
 background:url("bg.jpg") center/cover no-repeat fixed;
}
.overlay{
 background:rgba(0,0,0,.45);
 min-height:100vh;
 display:flex;
 align-items:center;
 justify-content:center;
}
.box{
 background:white;
 width:390px;
 padding:30px;
 border-radius:14px;
 box-shadow:0 10px 30px rgba(0,0,0,.3);
}

/* ===== TÊN WEB ===== */
.webname{
 text-align:center;
 margin-bottom:14px;
}
.webname .vi{
 font-size:20px;
 font-weight:bold;
 color:#1d3557;
}
.webname .en{
 font-size:13px;
 color:#666;
 margin-top:4px;
}

/* ===== LOGIN TITLE ===== */
h2{
 text-align:center;
 font-size:17px;
 color:#333;
 margin:12px 0 20px;
 font-weight:600;
}

input{
 width:100%;
 padding:12px;
 margin-bottom:12px;
 border-radius:8px;
 border:1px solid #ccc;
 font-size:15px;
 box-sizing:border-box;
}

/* CHECKBOX */
.showpass{
 display:flex;
 align-items:center;
 gap:8px;
 font-size:14px;
 color:#333;
 margin-bottom:16px;
}
.showpass input{
 width:16px;
 height:16px;
 margin:0;
 cursor:pointer;
}

button{
 width:100%;
 padding:13px;
 border:none;
 border-radius:10px;
 background:#1d3557;
 color:white;
 font-size:16px;
 cursor:pointer;
}
button:hover{opacity:.9;}

.try{
 margin-top:12px;
 background:#2a9d8f;
}

/* NOTE */
.note{
 font-size:13px;
 color:#555;
 margin-top:14px;
 line-height:1.45;
}

/* ZALO */
.zalo{
 display:inline-flex;
 align-items:center;
 gap:6px;
}
.zalo img{
 width:16px;
 height:16px;
}
</style>
</head>

<body>
<div class="overlay">
 <div class="box">

  <!-- TÊN WEB SONG NGỮ -->
  <div class="webname">
   <div class="vi">HỆ THỐNG KIỂM TRA LUẬT GIAO THÔNG</div>
   <div class="en">Traffic Law Examination System</div>
  </div>

  <h2>🔐 ĐĂNG NHẬP HỆ THỐNG</h2>

  <input id="loginInput" placeholder="Nhập mã hoặc tên học viên">
  <input id="password" type="password" placeholder="Mật khẩu (chỉ dành cho admin)">

  <div class="showpass">
   <input type="checkbox" id="togglePass">
   <label for="togglePass">Hiện mật khẩu</label>
  </div>

  <button id="loginBtn">Đăng nhập</button>
  <button class="try" onclick="tryExam()">📝 Thi thử (không cần đăng nhập)</button>

  <div class="note">
   • Học viên chỉ cần nhập mã hoặc tên<br>
   • Admin nhập thêm mật khẩu<br>
   • Chưa có mã học viên có thể Thi thử<br>
   • 
   <span class="zalo">
    📞 <strong>0973.306.802</strong>
    <img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Icon_of_Zalo.svg">
   </span>
  </div>

 </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
 apiKey:"AIzaSyBGivIEsyBLsLs0CqRvwmwceG26duZbWlM",
 authDomain:"thi-luat-giao-thong.firebaseapp.com",
 projectId:"thi-luat-giao-thong"
});
const db = firebase.firestore();

const ADMIN_HASH =
 "2e06d4d58006dd575764d8e348c653397cd2c33288d4fad146555ae04291824c";

/* SHOW/HIDE PASSWORD */
togglePass.onchange=()=>password.type=togglePass.checked?"text":"password";

/* EVENTS */
loginInput.addEventListener("keydown",e=>{if(e.key==="Enter")login();});
password.addEventListener("keydown",e=>{if(e.key==="Enter")login();});
loginBtn.onclick=login;

/* LOGIN */
function login(){
 const raw=loginInput.value.trim();
 const pass=password.value.trim();
 if(!raw){alert("Vui lòng nhập mã hoặc tên học viên");return;}

 if(pass){
  hashPassword(pass).then(hash=>{
   if(hash===ADMIN_HASH){
    localStorage.setItem("userType","admin");
    location.href="admin.html";
   }else alert("Sai mật khẩu admin");
  });
  return;
 }

 const digits=raw.replace(/\D/g,"");
 if(digits){findStudentByCode(digits.padStart(3,"0"));return;}
 findStudentByName(raw);
}

function hashPassword(str){
 return crypto.subtle.digest("SHA-256",new TextEncoder().encode(str))
 .then(b=>Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,"0")).join(""));
}

function normalize(s){
 return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

function findStudentByCode(code){
 db.collection("students").where("code","==",code).limit(1).get()
 .then(snap=>{
  if(snap.empty){alert("Không tìm thấy học viên");return;}
  loginStudent(snap.docs[0].data());
 });
}

function findStudentByName(input){
 const key=normalize(input);
 db.collection("students").get().then(snap=>{
  let found=null;
  snap.forEach(d=>{
   if(normalize(d.data().name||"").includes(key)) found=d.data();
  });
  if(!found){alert("Không tìm thấy học viên");return;}
  loginStudent(found);
 });
}

function loginStudent(s){
 localStorage.setItem("userType","student");
 localStorage.setItem("studentCode",s.code);
 localStorage.setItem("studentName",s.name||"");
 location.href="exam.html";
}

function tryExam(){
 localStorage.setItem("userType","guest");
 location.href="test.html";
}
</script>
</body>
</html>
