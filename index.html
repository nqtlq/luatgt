/* ===== HASH PASSWORD ===== */
function hashPassword(str){
 if(!crypto.subtle){
  alert("Trình duyệt không hỗ trợ bảo mật");
  return Promise.reject();
 }
 return crypto.subtle.digest(
  "SHA-256",
  new TextEncoder().encode(str)
 ).then(buf=>{
  return Array.from(new Uint8Array(buf))
   .map(b=>b.toString(16).padStart(2,"0"))
   .join("");
 });
}

/* ===== FIND BY CODE ===== */
function findStudentByCode(code){
 db.collection("students")
  .where("code","==",code)
  .limit(1)
  .get()
  .then(snap=>{
   if(snap.empty){
    alert("Không tìm thấy học viên");
    return;
   }
   loginStudent(snap.docs[0].data());
  });
}

/* ===== FIND BY NAME ===== */
function normalize(s){
 return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

function findStudentByName(input){
 const key = normalize(input);
 db.collection("students").get().then(snap=>{
  let found=null;
  snap.forEach(d=>{
   const name = normalize(d.data().name||"");
   if(name.includes(key)) found=d.data();
  });

  if(!found){
   alert("Không tìm thấy học viên");
   return;
  }
  loginStudent(found);
 });
}

/* ===== LOGIN SUCCESS ===== */
function loginStudent(s){
