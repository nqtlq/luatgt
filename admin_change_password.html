<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đổi mật khẩu Admin</title>

<style>
body{
 margin:0;
 font-family:Arial,Helvetica,sans-serif;
 background:#eef2f6;
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
}
.box{
 background:white;
 width:380px;
 padding:30px;
 border-radius:14px;
 box-shadow:0 6px 22px rgba(0,0,0,.2);
}
h2{
 margin-top:0;
 text-align:center;
 color:#1d3557;
}
.inputGroup{
 position:relative;
 margin-top:14px;
}
input{
 width:100%;
 padding:12px 40px 12px 12px;
 border-radius:8px;
 border:1px solid #ccc;
 font-size:15px;
}
.eye{
 position:absolute;
 right:10px;
 top:50%;
 transform:translateY(-50%);
 cursor:pointer;
 font-size:18px;
 color:#555;
}
button{
 width:100%;
 margin-top:18px;
 padding:13px;
 border:none;
 border-radius:8px;
 font-size:15px;
 cursor:pointer;
}
#saveBtn{background:#2a9d8f;color:white;}
#backBtn{background:#adb5bd;color:white;}
.note{
 font-size:13px;
 color:#666;
 margin-top:10px;
 text-align:center;
}
</style>
</head>

<body>

<div class="box">
 <h2>🔐 ĐỔI MẬT KHẨU ADMIN</h2>

 <div class="inputGroup">
  <input type="password" id="oldPass" placeholder="Mật khẩu hiện tại">
  <span class="eye" onclick="toggle('oldPass')">👁</span>
 </div>

 <div class="inputGroup">
  <input type="password" id="newPass" placeholder="Mật khẩu mới">
  <span class="eye" onclick="toggle('newPass')">👁</span>
 </div>

 <div class="inputGroup">
  <input type="password" id="confirmPass" placeholder="Nhập lại mật khẩu mới">
  <span class="eye" onclick="toggle('confirmPass')">👁</span>
 </div>

 <button id="saveBtn">💾 Lưu mật khẩu mới</button>
 <button id="backBtn">⬅ Quay lại</button>

 <div class="note">
  • Mật khẩu được mã hóa SHA-256<br>
  • Không lưu mật khẩu dạng rõ
 </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
/* ===== LOGIN CHECK ===== */
if(localStorage.getItem("userType")!=="admin"){
 location.href="index.html";
}

/* ===== FIREBASE ===== */
firebase.initializeApp({
 apiKey:"AIzaSyBGivIEsyBLsLs0CqRvwmwceG26duZbWlM",
 authDomain:"thi-luat-giao-thong.firebaseapp.com",
 projectId:"thi-luat-giao-thong"
});
const db=firebase.firestore();

/* ===== SHOW / HIDE ===== */
function toggle(id){
 const i=document.getElementById(id);
 i.type = i.type==="password" ? "text" : "password";
}

/* ===== HASH ===== */
async function hash(str){
 const buf=await crypto.subtle.digest(
  "SHA-256",
  new TextEncoder().encode(str)
 );
 return Array.from(new Uint8Array(buf))
  .map(b=>b.toString(16).padStart(2,"0"))
  .join("");
}

/* ===== SAVE ===== */
saveBtn.onclick=async()=>{
 const oldP=oldPass.value.trim();
 const newP=newPass.value.trim();
 const cf=confirmPass.value.trim();

 if(!oldP||!newP||!cf){
  alert("Nhập đầy đủ thông tin");
  return;
 }
 if(newP!==cf){
  alert("Mật khẩu xác nhận không khớp");
  return;
 }

 const oldHash=await hash(oldP);
 const newHash=await hash(newP);

 const doc=await db.collection("config").doc("admin").get();
 if(!doc.exists || doc.data().password!==oldHash){
  alert("❌ Mật khẩu hiện tại không đúng");
  return;
 }

 await db.collection("config").doc("admin").update({
  password:newHash,
  updatedAt:firebase.firestore.FieldValue.serverTimestamp()
 });

 alert("✅ Đổi mật khẩu thành công");
 location.href="admin.html";
};

/* ===== BACK ===== */
backBtn.onclick=()=>location.href="admin.html";
</script>

</body>
</html>
