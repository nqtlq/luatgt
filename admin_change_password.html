<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đổi mật khẩu Admin</title>
<style>
body{font-family:Arial;background:#f4f6fb;padding:40px}
.box{
 max-width:420px;margin:auto;background:white;
 padding:25px;border-radius:12px;
 box-shadow:0 4px 15px rgba(0,0,0,.15)
}
h2{text-align:center;color:#1d3557}
input,button{
 width:100%;padding:12px;margin-top:12px;
 font-size:15px;border-radius:8px;border:1px solid #ccc
}
button{
 background:#2a9d8f;color:white;
 border:none;cursor:pointer
}
button:hover{background:#21867a}
</style>
</head>
<body>

<div class="box">
 <h2>🔐 Đổi mật khẩu Admin</h2>

 <input id="oldPass" type="password" placeholder="Mật khẩu hiện tại">
 <input id="newPass" type="password" placeholder="Mật khẩu mới">
 <input id="confirmPass" type="password" placeholder="Nhập lại mật khẩu mới">

 <button onclick="changePassword()">Xác nhận đổi mật khẩu</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
 apiKey:"AIzaSyBGivIEsyBLsLs0CqRvwmwceG26duZbWlM",
 authDomain:"thi-luat-giao-thong.firebaseapp.com",
 projectId:"thi-luat-giao-thong"
});
const db=firebase.firestore();

if(localStorage.getItem("userType")!=="admin"){
 location.href="index.html";
}

async function hashPassword(str){
 const buf = await crypto.subtle.digest(
  "SHA-256",
  new TextEncoder().encode(str)
 );
 return Array.from(new Uint8Array(buf))
  .map(b=>b.toString(16).padStart(2,"0"))
  .join("");
}

async function changePassword(){
 const oldP=oldPass.value;
 const newP=newPass.value;
 const cf=confirmPass.value;

 if(!oldP||!newP||!cf){
  alert("Nhập đầy đủ thông tin");
  return;
 }
 if(newP!==cf){
  alert("Mật khẩu mới không khớp");
  return;
 }
 if(newP.length<6){
  alert("Mật khẩu tối thiểu 6 ký tự");
  return;
 }

 const snap=await db.collection("system").doc("admin").get();
 const currentHash=snap.data().passwordHash;

 const oldHash=await hashPassword(oldP);
 if(oldHash!==currentHash){
  alert("Mật khẩu hiện tại sai");
  return;
 }

 const newHash=await hashPassword(newP);
 await db.collection("system").doc("admin").update({
  passwordHash:newHash,
  updatedAt:firebase.firestore.FieldValue.serverTimestamp()
 });

 alert("✅ Đổi mật khẩu thành công");
 location.href="admin.html";
}
</script>
</body>
</html>
