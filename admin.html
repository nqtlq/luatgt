<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>ADMIN | Hệ thống thi luật giao thông</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <style>
        /* ===== CSS GIAO DIỆN (GIỮ NGUYÊN TỪ FILE CŨ) ===== */
        :root { --primary: #0d6efd; --success: #198754; --danger: #dc3545; --light: #f8f9fa; --dark: #1d3557; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f6; display: flex; flex-direction: column; height: 100vh; }
        
        header { background: var(--dark); color: white; padding: 0 20px; height: 60px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 100; }
        header b { font-size: 18px; }
        header button { background: #e63946; border: none; border-radius: 6px; padding: 8px 15px; color: white; cursor: pointer; font-weight: 500; }

        #layout { display: flex; flex: 1; overflow: hidden; }
        aside { width: 240px; background: white; border-right: 1px solid #ddd; padding: 20px 10px; display: flex; flex-direction: column; }
        main { flex: 1; padding: 20px; overflow-y: auto; }

        .menu button { width: 100%; padding: 12px 15px; margin-bottom: 5px; border: none; border-radius: 8px; background: transparent; text-align: left; cursor: pointer; color: #555; font-size: 15px; transition: 0.2s; }
        .menu button:hover { background: #e9ecef; }
        .menu button.active { background: #e7f1ff; color: var(--primary); font-weight: 600; }

        .box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Dashboard Stats */
        .statGrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .statBox { border-radius: 12px; padding: 20px; color: white; display: flex; flex-direction: column; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .statBox .num { font-size: 28px; font-weight: bold; margin-top: 5px; }
        .bg-blue { background: linear-gradient(135deg, #3b82f6, #0d6efd); }
        .bg-green { background: linear-gradient(135deg, #22c55e, #198754); }
        .bg-red { background: linear-gradient(135deg, #ef4444, #dc3545); }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; font-size: 14px; }
        th { background: #f8f9fa; font-weight: 600; cursor: pointer; }
        
        .status { padding: 4px 8px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .active-st { background: #d1e7dd; color: #0f5132; }
        .lock-st { background: #f8d7da; color: #842029; }

        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; color: white; transition: 0.2s; }
        .btn-success { background: var(--success); }
        .btn-primary { background: var(--primary); }
        .btn-danger { background: var(--danger); }
        .btn-secondary { background: #6c757d; }

        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 450px; max-width: 90%; }
        .modal-content input, .modal-content select { width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
    </style>
</head>

<body>

<header>
    <b>🛡️ ADMIN PANEL</b>
    <button onclick="logout()">Đăng xuất</button>
</header>

<div id="layout">
    <aside>
        <div class="menu">
            <button class="active" onclick="showPage('dashboard',this)">📊 Tổng quan</button>
            <button onclick="showPage('students',this)">👤 Học viên</button>
            <button onclick="showPage('stats',this)">📈 Thống kê</button>
        </div>
    </aside>

    <main>
        <div id="dashboard" class="page active">
            <div class="statGrid">
                <div class="statBox bg-blue">
                    <span>Tổng học viên</span>
                    <span class="num" id="dashTotal">0</span>
                </div>
                <div class="statBox bg-green">
                    <span>Đang hoạt động</span>
                    <span class="num" id="dashActive">0</span>
                </div>
                <div class="statBox bg-red">
                    <span>Đã khóa</span>
                    <span class="num" id="dashLock">0</span>
                </div>
            </div>
            <div class="box">
                <h3>🔔 Thông báo</h3>
                <p>Chào mừng Admin quay trở lại. Hệ thống đang hoạt động ổn định.</p>
            </div>
        </div>

        <div id="students" class="page">
            <div class="box">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
                    <h3 style="margin:0">👤 Quản lý học viên</h3>
                    <div style="display:flex; gap:10px">
                        <button class="btn btn-success" onclick="openStudentModal('add')">➕ Thêm mới</button>
                        <button class="btn btn-primary" onclick="openImportModal()">📂 Nhập Excel</button>
                    </div>
                </div>
                <input id="searchStudent" style="width:100%; padding:10px; border-radius:6px; border:1px solid #ddd" placeholder="🔍 Tìm theo tên hoặc mã số...">
                <table>
                    <thead>
                        <tr>
                            <th>Mã HV</th>
                            <th>Họ tên</th>
                            <th>Đơn vị</th>
                            <th>Đối tượng</th>
                            <th>Trạng thái</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="studentTable"></tbody>
                </table>
            </div>
        </div>

        <div id="stats" class="page">
            <div class="box">
                <h3>📈 Bảng xếp hạng kết quả thi</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Hạng</th>
                            <th>Học viên</th>
                            <th>Lượt thi</th>
                            <th>Số lượt đạt</th>
                            <th>Tỷ lệ (%)</th>
                        </tr>
                    </thead>
                    <tbody id="statTable"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<div id="studentModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Thêm học viên</h3>
        <input type="hidden" id="stMode">
        <input type="hidden" id="stCurrentCode">

        <label>Họ và tên</label>
        <input id="stName" placeholder="Nhập tên học viên...">

        <label>Đơn vị</label>
        <input id="stUnit" placeholder="Lớp/Đại đội...">

        <label>Đối tượng</label>
        <select id="stObjectType">
            <option value="HV">Học viên (HV)</option>
            <option value="SQ">Sĩ quan (SQ)</option>
            <option value="CN">Chuyên nghiệp (CN)</option>
            <option value="KH">Khác</option>
        </select>

        <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:10px">
            <button class="btn btn-secondary" onclick="closeModal('studentModal')">Hủy</button>
            <button class="btn btn-primary" onclick="saveStudent()">Lưu lại</button>
        </div>
    </div>
</div>

<script>
    // 1. Cấu hình Firebase (Giữ nguyên từ file của bạn)
    const firebaseConfig = {
        apiKey: "AIzaSyBGivIEsyBLsLs0CqRvwmwceG26duZbWlM",
        authDomain: "thi-luat-giao-thong.firebaseapp.com",
        projectId: "thi-luat-giao-thong"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let allStudents = [];
    let studentMap = {};

    // 2. Tải dữ liệu ban đầu
    window.onload = function() {
        fetchAllStudents();
    };

    async function fetchAllStudents() {
        const table = document.getElementById("studentTable");
        table.innerHTML = "<tr><td colspan='6'>Đang tải dữ liệu...</td></tr>";

        try {
            const snap = await db.collection("students").get();
            allStudents = [];
            let counts = { total: 0, active: 0, lock: 0 };

            snap.forEach(doc => {
                const s = doc.data();
                allStudents.push(s);
                studentMap[s.code] = s.name;
                
                counts.total++;
                if (s.status === 'active') counts.active++; else counts.lock++;
            });

            // Cập nhật Dashboard
            document.getElementById("dashTotal").innerText = counts.total;
            document.getElementById("dashActive").innerText = counts.active;
            document.getElementById("dashLock").innerText = counts.lock;

            renderTable(allStudents);
        } catch (err) {
            alert("Lỗi tải dữ liệu: " + err.message);
        }
    }

    function renderTable(data) {
        const table = document.getElementById("studentTable");
        table.innerHTML = "";
        data.forEach(s => {
            const isAct = s.status === 'active';
            table.innerHTML += `
                <tr>
                    <td><b>${s.code}</b></td>
                    <td>${s.name}</td>
                    <td>${s.unit || ''}</td>
                    <td>${s.objectCode || 'KH'}</td>
                    <td><span class="status ${isAct ? 'active-st' : 'lock-st'}">${isAct ? 'Hoạt động' : 'Đã khóa'}</span></td>
                    <td>
                        <button class="btn btn-primary" style="padding:4px 8px" onclick="openStudentModal('edit', '${s.code}')">✏️</button>
                        <button class="btn btn-danger" style="padding:4px 8px" onclick="deleteStudent('${s.code}')">🗑️</button>
                    </td>
                </tr>`;
        });
    }

    // 3. Xử lý Thêm/Sửa (BỔ SUNG QUAN TRỌNG)
    function openStudentModal(mode, code = '') {
        document.getElementById("stMode").value = mode;
        document.getElementById("studentModal").classList.add("show");
        
        if (mode === 'add') {
            document.getElementById("modalTitle").innerText = "Thêm học viên mới";
            document.getElementById("stName").value = "";
            document.getElementById("stUnit").value = "";
        } else {
            const s = allStudents.find(x => x.code === code);
            document.getElementById("modalTitle").innerText = "Sửa: " + code;
            document.getElementById("stCurrentCode").value = code;
            document.getElementById("stName").value = s.name;
            document.getElementById("stUnit").value = s.unit;
            document.getElementById("stObjectType").value = s.objectCode || 'HV';
        }
    }

    async function saveStudent() {
        const mode = document.getElementById("stMode").value;
        const name = document.getElementById("stName").value.trim();
        const unit = document.getElementById("stUnit").value.trim();
        const objType = document.getElementById("stObjectType").value;

        if (!name || !unit) return alert("Vui lòng nhập đầy đủ thông tin!");

        try {
            if (mode === 'add') {
                // Sinh mã tự động: Prefix + Timestamp ngắn
                const code = objType + Date.now().toString().slice(-6);
                await db.collection("students").doc(code).set({
                    code, name, unit, objectCode: objType, status: 'active', createdAt: new Date()
                });
                alert("Đã thêm học viên: " + code);
            } else {
                const code = document.getElementById("stCurrentCode").value;
                await db.collection("students").doc(code).update({
                    name, unit, objectCode: objType
                });
                alert("Cập nhật thành công!");
            }
            closeModal('studentModal');
            fetchAllStudents(); // Tải lại để cập nhật dashboard
        } catch (e) {
            alert("Lỗi Firebase: " + e.message);
        }
    }

    async function deleteStudent(code) {
        if (!confirm("Bạn có chắc chắn muốn xóa học viên " + code + "?")) return;
        await db.collection("students").doc(code).delete();
        fetchAllStudents();
    }

    // 4. Thống kê (Huy chương 🥇🥈🥉)
    async function loadStats() {
        const statBody = document.getElementById("statTable");
        statBody.innerHTML = "<tr><td colspan='5'>Đang tính toán...</td></tr>";

        const logs = await db.collection("exam_logs").get();
        let map = {};

        logs.forEach(doc => {
            const log = doc.data();
            if (!map[log.studentCode]) map[log.studentCode] = { attempts: 0, pass: 0 };
            map[log.studentCode].attempts++;
            if (log.pass) map[log.studentCode].pass++;
        });

        let data = Object.keys(map).map(code => ({
            code,
            name: studentMap[code] || code,
            attempts: map[code].attempts,
            pass: map[code].pass,
            rate: Math.round((map[code].pass / map[code].attempts) * 100)
        }));

        data.sort((a, b) => b.rate - a.rate);

        statBody.innerHTML = "";
        data.forEach((item, i) => {
            let medal = i === 0 ? "🥇" : (i === 1 ? "🥈" : (i === 2 ? "🥉" : i + 1));
            statBody.innerHTML += `
                <tr>
                    <td>${medal}</td>
                    <td><b>${item.name}</b> <small>(${item.code})</small></td>
                    <td>${item.attempts}</td>
                    <td>${item.pass}</td>
                    <td style="color:${item.rate >= 80 ? 'green' : 'red'}; font-weight:bold">${item.rate}%</td>
                </tr>`;
        });
    }

    // 5. Điều hướng
    function showPage(pageId, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        
        document.querySelectorAll('.menu button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        if (pageId === 'stats') loadStats();
    }

    function closeModal(id) { document.getElementById(id).classList.remove('show'); }
</script>

</body>
</html>
