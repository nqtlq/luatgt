<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>ADMIN | Thi luật giao thông</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#eef2f6}
header{
 background:#1d3557;color:white;
 padding:16px 24px;
 display:flex;justify-content:space-between;align-items:center
}
#layout{display:flex;min-height:calc(100vh - 60px)}
aside{
 width:250px;background:#fff;
 box-shadow:4px 0 12px rgba(0,0,0,.08);
 padding:20px
}
aside h3{margin-top:0;color:#1d3557}
.menu button{
 width:100%;padding:12px;margin-bottom:8px;
 border:none;border-radius:8px;
 background:#f1f4fb;text-align:left;cursor:pointer
}
.menu button.active{background:#dbe6ff}
main{flex:1;padding:24px}
.page{display:none}
.page.active{display:block}
.box{
 background:#fff;padding:20px;border-radius:14px;
 box-shadow:0 4px 12px rgba(0,0,0,.1);
 margin-bottom:20px
}

/* ===== STATS ===== */
.statGrid{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
 gap:16px;margin-bottom:20px
}
.statBox{
 padding:16px;border-radius:12px;
 text-align:center;font-size:14px
}
.statBox b{font-size:26px}
.stat-total{background:#e3f2fd}
.stat-pass{background:#e8f7f0}
.stat-fail{background:#fdecea}

/* ===== FILTER ===== */
.filterRow{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
 gap:12px;margin-bottom:16px
}
.filterRow select{
 padding:10px;border-radius:8px;border:1px solid #ccc
}

/* ===== TABLE ===== */
.tableWrap{overflow-x:auto}
table{
 width:100%;border-collapse:collapse;
 table-layout:fixed;font-size:14px
}
th,td{
 padding:10px;border-bottom:1px solid #eee;
 text-align:center;white-space:nowrap
}
th{background:#f1f4fb;cursor:pointer}

/* ===== RATE ===== */
.rate{
 padding:4px 8px;border-radius:8px;color:white;font-weight:bold
}
.rate.high{background:#2ecc71}
.rate.mid{background:#f1c40f;color:black}
.rate.low{background:#e74c3c}

.medal{font-size:18px}
</style>
</head>

<body>

<header>
 <b>🛠️ ADMIN – HỆ THỐNG THI</b>
 <button onclick="logout()">Đăng xuất</button>
</header>

<div id="layout">
<aside>
 <h3>📂 Quản trị</h3>
 <div class="menu">
  <button class="active" onclick="showPage('dashboard',this)">📊 Tổng quan</button>
  <button onclick="showPage('students',this)">👤 Học viên</button>
  <button onclick="showPage('stats',this)">📈 Thống kê</button>
 </div>
</aside>

<main>

<div id="dashboard" class="page active">
 <div class="box">
  <h3>📊 Tổng quan</h3>
  <p>Quản lý – Thống kê – Xếp hạng</p>
 </div>
</div>

<div id="students" class="page">
 <div class="box">
  <h3>👤 Quản lý học viên</h3>
  <input id="searchStudent" placeholder="🔍 Tìm học viên">
  <button onclick="openAddStudent()">➕ Thêm</button>
  <table>
   <thead><tr><th>Mã</th><th>Tên</th><th></th></tr></thead>
   <tbody id="studentTable"></tbody>
  </table>
 </div>
</div>

<div id="stats" class="page">
 <div class="box">
  <h3>📈 Thống kê kết quả</h3>

  <div class="statGrid">
   <div class="statBox stat-total">Tổng lượt thi<br><b id="sumTotal">0</b></div>
   <div class="statBox stat-pass">Đạt<br><b id="sumPass">0</b></div>
   <div class="statBox stat-fail">Không đạt<br><b id="sumFail">0</b></div>
  </div>

  <div class="filterRow">
   <select id="filterExam">
    <option value="all">Tất cả bộ đề</option>
   </select>
   <select id="filterTime">
    <option value="all">Tất cả thời gian</option>
    <option value="week">Tuần này</option>
    <option value="month">Tháng này</option>
   </select>
   <button onclick="loadStats()">Lọc</button>
  </div>

  <div class="tableWrap">
   <table>
    <thead>
     <tr>
      <th>🏅</th>
      <th>Mã HV</th>
      <th>Họ tên</th>
      <th onclick="sortBy('total')">Lượt thi</th>
      <th onclick="sortBy('pass')">Đạt</th>
      <th onclick="sortBy('rate')">% đạt</th>
      <th>Gần nhất</th>
     </tr>
    </thead>
    <tbody id="statTable"></tbody>
   </table>
  </div>
 </div>
</div>

</main>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
 apiKey:"AIzaSyBGivIEsyBLsLs0CqRvwmwceG26duZbWlM",
 authDomain:"thi-luat-giao-thong.firebaseapp.com",
 projectId:"thi-luat-giao-thong"
});
const db=firebase.firestore();

function showPage(id,btn){
 document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
 document.getElementById(id).classList.add("active");
 document.querySelectorAll(".menu button").forEach(b=>b.classList.remove("active"));
 btn.classList.add("active");
}
function logout(){localStorage.clear();location.href="index.html"}

let statData=[],sortKey="rate",sortDir="desc";

function rateClass(r){
 return r>=80?"high":r>=50?"mid":"low";
}

function loadStats(){
 statTable.innerHTML="";
 let total=0,pass=0;
 statData=[];
 const students={};

 db.collection("students").get().then(snap=>{
  snap.forEach(d=>{
   students[d.data().code]={...d.data(),total:0,pass:0,last:null};
  });

  db.collection("exam_logs").get().then(logs=>{
   logs.forEach(d=>{
    const l=d.data();
    const hv=l.studentCode||("HV"+l.code);
    if(!students[hv]) return;

    if(filterExam.value!=="all" && l.examId!==filterExam.value) return;

    const t=l.createdAt?.toDate();
    if(filterTime.value==="week" && t && Date.now()-t>7*86400000) return;
    if(filterTime.value==="month" && t && new Date().getMonth()!=t.getMonth()) return;

    total++; l.pass&&pass++;
    students[hv].total++; l.pass&&students[hv].pass++;
    if(!students[hv].last||t>students[hv].last) students[hv].last=t;
   });

   sumTotal.innerText=total;
   sumPass.innerText=pass;
   sumFail.innerText=total-pass;

   Object.values(students).forEach(s=>{
    if(!s.total) return;
    s.rate=Math.round(s.pass/s.total*100);
    statData.push(s);
   });
   renderStats();
  });
 });
}

function sortBy(k){
 sortDir=(sortKey===k&&sortDir==="desc")?"asc":"desc";
 sortKey=k;renderStats();
}

function renderStats(){
 statTable.innerHTML="";
 statData.sort((a,b)=>sortDir==="desc"?b[sortKey]-a[sortKey]:a[sortKey]-b[sortKey]);
 statData.forEach((s,i)=>{
  const medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":"";
  statTable.innerHTML+=`
   <tr>
    <td class="medal">${medal}</td>
    <td>${s.code}</td>
    <td>${s.name}</td>
    <td>${s.total}</td>
    <td>${s.pass}</td>
    <td><span class="rate ${rateClass(s.rate)}">${s.rate}%</span></td>
    <td>${s.last?s.last.toLocaleString():""}</td>
   </tr>`;
 });
}
</script>
</body>
</html>
