<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>ADMIN | Hệ thống thi luật giao thông</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
 margin:0;
 font-family:Arial,Helvetica,sans-serif;
 background:#eef2f6;
}

/* ===== HEADER ===== */
header{
 background:linear-gradient(90deg,#1d3557,#264a8a);
 color:white;
 padding:14px 22px;
 display:flex;
 justify-content:space-between;
 align-items:center;
 box-shadow:0 4px 14px rgba(0,0,0,.25);
 position:sticky;
 top:0;
 z-index:100;
}
header b{font-size:17px}
header button{
 background:#e63946;
 border:none;
 border-radius:8px;
 padding:7px 12px;
 color:white;
 cursor:pointer;
}

/* ===== LAYOUT ===== */
#layout{
 display:flex;
 min-height:calc(100vh - 64px);
 overflow:hidden;
}

/* ===== SIDEBAR ===== */
aside{
 width:240px;
 background:white;
 box-shadow:4px 0 15px rgba(0,0,0,.08);
 padding:20px;
 flex-shrink:0;
}
.menu button{
 width:100%;
 margin-bottom:8px;
 padding:10px 14px;
 border:none;
 border-radius:10px;
 background:#f1f4fb;
 cursor:pointer;
 text-align:left;
}
.menu button.active,
.menu button:hover{
 background:#dbe6ff;
}

/* ===== MAIN ===== */
main{
 flex:1;
 padding:20px;
 overflow-y:auto;
}

/* ===== BOX ===== */
.box{
 background:white;
 padding:18px;
 border-radius:14px;
 box-shadow:0 4px 14px rgba(0,0,0,.12);
 margin-bottom:18px;
}
.box h3{
 margin-top:0;
 color:#1d3557;
 font-size:16px;
}

/* ===== TOOLBAR ===== */
.toolbar{
 display:flex;
 gap:10px;
 flex-wrap:wrap;
 margin-bottom:14px;
 align-items:center;
}
.toolbar label{
 font-size:13px;
 color:#333;
}
.toolbar input,
.toolbar select{
 padding:8px 10px;
 border-radius:8px;
 border:1px solid #ccc;
 font-size:13px;
}
.toolbar button{
 background:#198754;
 color:white;
 border:none;
 border-radius:8px;
 padding:8px 14px;
 cursor:pointer;
 font-size:13px;
}

/* ===== TABLE ===== */
.tableWrap{
 overflow-x:auto;
}
table{
 width:100%;
 border-collapse:collapse;
 font-size:13px;
 min-width:820px;
}
th,td{
 padding:9px;
 border-bottom:1px solid #eee;
 text-align:center;
}
th{
 background:#f1f4fb;
 color:#1d3557;
 cursor:pointer;
 user-select:none;
}
.sort-icon{
 font-size:11px;
 margin-left:4px;
}

/* ===== STATS SUMMARY ===== */
.statGrid{
 display:grid;
 grid-template-columns:repeat(3,1fr);
 gap:12px;
 margin-bottom:14px;
}
.statBox{
 border-radius:12px;
 padding:12px;
 color:white;
 text-align:center;
 font-size:13px;
}
.statBox b{
 font-size:20px;
 display:block;
 margin-bottom:4px;
}
.total{background:#0d6efd}
.pass{background:#198754}
.fail{background:#e63946}

/* ===== RATE ===== */
.rate{
 padding:5px 8px;
 border-radius:7px;
 font-weight:bold;
 display:inline-block;
 font-size:12px;
}
.good{background:#d1e7dd;color:#0f5132}
.mid{background:#fff3cd;color:#664d03}
.bad{background:#f8d7da;color:#842029}

/* ===== PAGE ===== */
.page{display:none}
.page.active{display:block}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
 #layout{flex-direction:column}
 aside{width:100%;box-shadow:none;border-bottom:1px solid #ddd}
 main{padding:14px}
 .statGrid{grid-template-columns:1fr}
 table{font-size:12px}
}
</style>
</head>

<body>

<header>
 <b>🛠️ ADMIN – HỆ THỐNG THI LUẬT GIAO THÔNG</b>
 <button onclick="logout()">Đăng xuất</button>
</header>

<div id="layout">

<aside>
 <div class="menu">
  <button class="active" onclick="showPage('dashboard',this)">📊 Tổng quan</button>
  <button onclick="showPage('students',this)">👤 Học viên</button>
  <button onclick="showPage('stats',this)">📈 Thống kê</button>
 </div>
</aside>

<main>

<!-- DASHBOARD -->
<div id="dashboard" class="page active">
 <div class="box">
  <h3>📊 Tổng quan</h3>
  <p>• Quản lý học viên</p>
  <p>• Thống kê kết quả thi</p>
  <p>• Xếp hạng & đánh giá</p>
 </div>
</div>

<!-- STUDENTS -->
<div id="students" class="page">
 <div class="box">
  <h3>👤 Danh sách học viên</h3>
  <div class="toolbar">
   <input id="searchStudent" placeholder="🔍 Tìm theo mã / tên">
  </div>
  <div class="tableWrap">
   <table>
    <thead><tr><th>Mã</th><th>Họ tên</th></tr></thead>
    <tbody id="studentTable"></tbody>
   </table>
  </div>
 </div>
</div>

<!-- STATS -->
<div id="stats" class="page">

 <div class="statGrid">
  <div class="statBox total"><b id="tTotal">0</b>Tổng lượt thi</div>
  <div class="statBox pass"><b id="tPass">0</b>Lượt đạt</div>
  <div class="statBox fail"><b id="tFail">0</b>Không đạt</div>
 </div>

 <div class="box">
  <h3>📈 Thống kê chi tiết</h3>

  <div class="toolbar">
   <select id="filterSet"><option value="">Tất cả bộ đề</option></select>
   <select id="filterTime">
    <option value="">Toàn bộ thời gian</option>
    <option value="thisWeek">Tuần này</option>
    <option value="lastWeek">Tuần trước</option>
    <option value="thisMonth">Tháng này</option>
    <option value="lastMonth">Tháng trước</option>
    <option value="custom">Tùy chọn</option>
   </select>

   <label>Từ</label><input type="date" id="fromDate">
   <label>Đến</label><input type="date" id="toDate">

   <button onclick="loadStats()">🔍 Áp dụng</button>
  </div>

  <div class="tableWrap">
   <table>
    <thead>
     <tr>
      <th>#</th>
      <th>Học viên</th>
      <th onclick="sortTable('attempts',this)">Lượt thi<span class="sort-icon"></span></th>
      <th onclick="sortTable('pass',this)">Lượt đạt<span class="sort-icon"></span></th>
      <th onclick="sortTable('rate',this)">% đạt<span class="sort-icon"></span></th>
     </tr>
    </thead>
    <tbody id="statTable"></tbody>
   </table>
  </div>
 </div>

</div>

</main>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
 apiKey:"AIzaSyBGivIEsyBLsLs0CqRvwmwceG26duZbWlM",
 authDomain:"thi-luat-giao-thong.firebaseapp.com",
 projectId:"thi-luat-giao-thong"
});
const db=firebase.firestore();

if(localStorage.getItem("userType")!=="admin") location.href="index.html";

/* MENU */
function showPage(id,btn){
 document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
 document.getElementById(id).classList.add("active");
 document.querySelectorAll(".menu button").forEach(b=>b.classList.remove("active"));
 btn.classList.add("active");
}
function logout(){localStorage.clear();location.href="index.html";}

/* STUDENTS */
function loadStudents(k=""){
 studentTable.innerHTML="";
 db.collection("students").orderBy("code").get().then(s=>{
  s.forEach(d=>{
   const st=d.data();
   if(k && !st.nameSearch?.includes(k.toLowerCase()) && !st.code.includes(k)) return;
   studentTable.innerHTML+=`<tr><td>${st.code}</td><td>${st.name}</td></tr>`;
  });
 });
}
loadStudents();
searchStudent.oninput=e=>loadStudents(e.target.value);

/* ===== STATS ===== */
let stats=[],sortKey="",sortDir=1;

function clearSortIcons(){
 document.querySelectorAll(".sort-icon").forEach(i=>i.innerHTML="");
}

function sortTable(key,th){
 if(sortKey===key) sortDir*=-1;
 else{sortKey=key;sortDir=1;}
 clearSortIcons();
 th.querySelector(".sort-icon").innerHTML=sortDir===1?"▲":"▼";
 renderStats();
}

function getTimeRange(){
 const now=new Date();
 let from=null,to=null;
 const monday=d=>{
  const x=new Date(d);const day=x.getDay()||7;
  x.setDate(x.getDate()-day+1);x.setHours(0,0,0,0);return x;
 };
 if(filterTime.value==="thisWeek"){from=monday(now);to=now;}
 if(filterTime.value==="lastWeek"){
  to=monday(now);to.setMilliseconds(-1);from=monday(to);
 }
 if(filterTime.value==="thisMonth"){from=new Date(now.getFullYear(),now.getMonth(),1);to=now;}
 if(filterTime.value==="lastMonth"){
  from=new Date(now.getFullYear(),now.getMonth()-1,1);
  to=new Date(now.getFullYear(),now.getMonth(),0,23,59,59);
 }
 if(filterTime.value==="custom"&&fromDate.value&&toDate.value){
  from=new Date(fromDate.value);
  to=new Date(toDate.value+"T23:59:59");
 }
 return{from,to};
}

function loadStats(){
 stats=[];
 let map={},total=0,pass=0;
 const {from,to}=getTimeRange();

 db.collection("exam_logs").get().then(s=>{
  s.forEach(d=>{
   const e=d.data();
   if(filterSet.value && e.setId!==filterSet.value) return;
   if(from&&to){
    const t=e.time.toDate();
    if(t<from||t>to) return;
   }
   total++; if(e.pass) pass++;
   if(!map[e.studentCode]) map[e.studentCode]={a:0,p:0};
   map[e.studentCode].a++;
   if(e.pass) map[e.studentCode].p++;
  });

  tTotal.innerText=total;
  tPass.innerText=pass;
  tFail.innerText=total-pass;

  stats=Object.entries(map).map(([c,v])=>({
   code:c,
   attempts:v.a,
   pass:v.p,
   rate:Math.round(v.p/v.a*100)
  }));
  renderStats();
 });
}

function renderStats(){
 statTable.innerHTML="";
 if(sortKey) stats.sort((a,b)=>(a[sortKey]-b[sortKey])*sortDir);
 stats.forEach((s,i)=>{
  let cls=s.rate>=80?"good":s.rate>=50?"mid":"bad";
  statTable.innerHTML+=`
   <tr>
    <td>${i+1}</td>
    <td>${s.code}</td>
    <td>${s.attempts}</td>
    <td>${s.pass}</td>
    <td><span class="rate ${cls}">${s.rate}%</span></td>
   </tr>`;
 });
}

/* LOAD SETS */
db.collection("exam_logs").get().then(s=>{
 const sets=new Set();
 s.forEach(d=>sets.add(d.data().setId||"DEFAULT"));
 sets.forEach(id=>filterSet.innerHTML+=`<option value="${id}">${id}</option>`);
});
</script>

</body>
</html>
