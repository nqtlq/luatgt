<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>ADMIN | Hệ thống thi luật giao thông</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <style>
        /* GIỮ NGUYÊN FORM CSS CỦA BẠN */
        body { margin: 0; font-family: Arial, sans-serif; background: #eef2f6; }
        header { background: #1d3557; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        #layout { display: flex; min-height: calc(100vh - 60px); }
        aside { width: 220px; background: white; border-right: 1px solid #ddd; padding: 20px; flex-shrink: 0; }
        .menu button { width: 100%; padding: 12px; margin-bottom: 5px; border: none; border-radius: 8px; background: transparent; text-align: left; cursor: pointer; color: #555; }
        .menu button.active { background: #e7f1ff; color: #0d6efd; font-weight: bold; }
        main { flex: 1; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .statGrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .statCard { padding: 20px; border-radius: 12px; color: white; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; font-size: 14px; }
        th { background: #f8f9fa; font-weight: bold; }
        .status { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .activeStatus { background: #d1e7dd; color: #0f5132; }
        .lockStatus { background: #f8d7da; color: #842029; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 400px; }
    </style>
</head>
<body>

<header>
    <b>🛡️ QUẢN TRỊ VIÊN</b>
    <button onclick="location.reload()" style="background:#457b9d; border:none; color:white; padding:7px 15px; border-radius:5px; cursor:pointer">Làm mới dữ liệu</button>
</header>

<div id="layout">
    <aside>
        <div class="menu">
            <button class="active" onclick="showPage('dashboard', this)">📊 Tổng quan</button>
            <button onclick="showPage('students', this)">👤 Học viên</button>
            <button onclick="showPage('stats', this)">📈 Thống kê thi</button>
        </div>
    </aside>

    <main>
        <div id="dashboard" class="page">
            <div class="statGrid">
                <div class="statCard" style="background:#0d6efd">Tổng học viên: <h2 id="totalHV" style="margin:5px 0">0</h2></div>
                <div class="statCard" style="background:#198754">Hoạt động: <h2 id="activeHV" style="margin:5px 0">0</h2></div>
                <div class="statCard" style="background:#dc3545">Đã khóa: <h2 id="lockHV" style="margin:5px 0">0</h2></div>
            </div>
            <div class="box">
                <h3>🔔 Tin nhắn hệ thống</h3>
                <p>Tổng số lượt thi đã thực hiện: <b id="totalExams">0</b></p>
            </div>
        </div>

        <div id="students" class="page" style="display:none">
            <div class="box">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
                    <h3 style="margin:0">Quản lý danh sách</h3>
                    <button onclick="openModal()" style="background:#198754; color:white; border:none; padding:8px 15px; border-radius:6px; cursor:pointer">➕ Thêm học viên</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Mã số</th>
                            <th>Họ tên</th>
                            <th>Đơn vị</th>
                            <th>Trạng thái</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="studentTable"></tbody>
                </table>
            </div>
        </div>

        <div id="stats" class="page" style="display:none">
            <div class="box">
                <h3>📈 Xếp hạng kết quả thi</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Học viên</th>
                            <th>Lượt thi</th>
                            <th>Đạt</th>
                            <th>Tỷ lệ</th>
                        </tr>
                    </thead>
                    <tbody id="statTable"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<div id="studentModal" class="modal">
    <div class="modal-content">
        <h3>Thêm học viên mới</h3>
        <input type="text" id="stName" placeholder="Nhập họ và tên..." style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:5px; box-sizing:border-box">
        <input type="text" id="stUnit" placeholder="Nhập đơn vị..." style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:5px; box-sizing:border-box">
        <select id="stType" style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ddd; border-radius:5px">
            <option value="HV">Học viên (HV)</option>
            <option value="SQ">Sĩ quan (SQ)</option>
            <option value="CN">Chuyên nghiệp (CN)</option>
        </select>
        <div style="display:flex; justify-content:flex-end; gap:10px">
            <button onclick="closeModal()" style="padding:8px 15px; background:#ddd; border:none; border-radius:5px">Hủy</button>
            <button onclick="saveStudent()" style="padding:8px 15px; background:#0d6efd; color:white; border:none; border-radius:5px">Lưu lại</button>
        </div>
    </div>
</div>

<script>
    // 1. CẤU HÌNH FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyBGivIEsyBLsLs0CqRvwmwceG26duZbWlM",
        authDomain: "thi-luat-giao-thong.firebaseapp.com",
        projectId: "thi-luat-giao-thong"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let allStudents = [];

    // 2. TẢI DỮ LIỆU TỪ FIREBASE
    async function loadData() {
        // Tải học viên
        const studentSnap = await db.collection("students").get();
        allStudents = [];
        let counts = { total: 0, active: 0, lock: 0 };
        const tbody = document.getElementById('studentTable');
        tbody.innerHTML = "";

        studentSnap.forEach(doc => {
            const s = doc.data();
            allStudents.push(s);
            counts.total++;
            if(s.status === 'active') counts.active++; else counts.lock++;

            tbody.innerHTML += `
                <tr>
                    <td><b>${s.code}</b></td>
                    <td>${s.name}</td>
                    <td>${s.unit}</td>
                    <td><span class="status ${s.status === 'active' ? 'activeStatus' : 'lockStatus'}" onclick="toggleStatus('${s.code}','${s.status}')">${s.status === 'active' ? 'Hoạt động' : 'Đã khóa'}</span></td>
                    <td><button onclick="deleteStudent('${s.code}')" style="color:red; background:none; border:none; cursor:pointer">Xóa</button></td>
                </tr>
            `;
        });

        document.getElementById('totalHV').innerText = counts.total;
        document.getElementById('activeHV').innerText = counts.active;
        document.getElementById('lockHV').innerText = counts.lock;

        // Tải thống kê lượt thi
        const examSnap = await db.collection("exam_logs").get();
        document.getElementById('totalExams').innerText = examSnap.size;
        renderStats(examSnap);
    }

    // 3. SINH MÃ TỰ ĐỘNG
    function generateNextCode(prefix) {
        const list = allStudents.filter(s => s.code.startsWith(prefix));
        if (list.length === 0) return prefix + "0001";
        const nums = list.map(s => parseInt(s.code.replace(prefix, "")) || 0);
        return prefix + (Math.max(...nums) + 1).toString().padStart(4, '0');
    }

    // 4. LƯU HỌC VIÊN MỚI
    async function saveStudent() {
        const name = document.getElementById('stName').value.trim();
        const unit = document.getElementById('stUnit').value.trim();
        const type = document.getElementById('stType').value;

        if(!name || !unit) return alert("Vui lòng nhập đủ thông tin!");

        try {
            const code = generateNextCode(type);
            await db.collection("students").doc(code).set({
                code, name, unit, status: 'active', objectCode: type, createdAt: new Date()
            });
            alert("Đã thêm: " + code);
            closeModal();
            loadData();
        } catch (e) { alert("Lỗi lưu: " + e.message); }
    }

    // 5. THỐNG KÊ KẾT QUẢ
    function renderStats(examSnap) {
        const stats = {};
        examSnap.forEach(doc => {
            const log = doc.data();
            if(!stats[log.studentCode]) stats[log.studentCode] = { name: log.studentName, total: 0, pass: 0 };
            stats[log.studentCode].total++;
            if(log.pass) stats[log.studentCode].pass++;
        });

        const statBody = document.getElementById('statTable');
        statBody.innerHTML = "";
        for(let code in stats) {
            const item = stats[code];
            const rate = Math.round((item.pass / item.total) * 100);
            statBody.innerHTML += `
                <tr>
                    <td><b>${item.name}</b><br><small>${code}</small></td>
                    <td>${item.total}</td>
                    <td>${item.pass}</td>
                    <td style="font-weight:bold; color:${rate >= 80 ? 'green' : 'red'}">${rate}%</td>
                </tr>
            `;
        }
    }

    async function toggleStatus(code, cur) {
        await db.collection("students").doc(code).update({ status: cur === 'active' ? 'locked' : 'active' });
        loadData();
    }

    async function deleteStudent(code) {
        if(confirm("Xóa học viên này?")) {
            await db.collection("students").doc(code).delete();
            loadData();
        }
    }

    function showPage(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.menu button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function openModal() { document.getElementById('studentModal').classList.add('show'); }
    function closeModal() { document.getElementById('studentModal').classList.remove('show'); }

    window.onload = loadData;
</script>
</body>
</html>
