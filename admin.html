<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>ADMIN | Hệ thống thi luật giao thông</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <style>
        /* GIỮ NGUYÊN FORM CSS CỦA BẠN */
        body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: #eef2f6; }
        .status { padding: 5px 8px; border-radius: 8px; font-size: 12px; font-weight: bold; border: 1px solid #ccc; cursor: pointer;}
        .activeStatus { background: #d1e7dd; color: #0f5132 }
        .lockStatus { background: #f8d7da; color: #842029 }
        .rate { padding: 5px 8px; border-radius: 7px; font-weight: bold; display: inline-block; font-size: 12px; }
        .good { background: #d1e7dd; color: #0f5132 }
        .bad { background: #f8d7da; color: #842029 }

        header { background: #1d3557; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        #layout { display: flex; min-height: calc(100vh - 50px); }
        aside { width: 220px; background: white; border-right: 1px solid #ddd; padding: 15px; flex-shrink: 0; }
        .menu button { width: 100%; padding: 12px; margin-bottom: 5px; border: none; border-radius: 8px; background: transparent; text-align: left; cursor: pointer; color: #555; font-size: 14px; }
        .menu button.active { background: #e7f1ff; color: #0d6efd; font-weight: bold; }
        main { flex: 1; padding: 20px; overflow-y: auto; }
        .box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        .statGrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .statCard { padding: 20px; border-radius: 12px; color: white; }
        .bg-blue { background: #0d6efd; } .bg-green { background: #198754; } .bg-red { background: #dc3545; }

        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; font-size: 14px; }
        th { background: #f8f9fa; color: #666; font-weight: 600; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 450px; max-width: 90%; }
    </style>
</head>
<body>

<header>
    <b>🛡️ QUẢN TRỊ VIÊN</b>
    <button onclick="location.href='index.html'" style="background:#e63946; border:none; color:white; padding:7px 15px; border-radius:5px; cursor:pointer">Đăng xuất</button>
</header>

<div id="layout">
    <aside>
        <div class="menu">
            <button class="active" onclick="showPage('dashboard', this)">📊 Tổng quan</button>
            <button onclick="showPage('students', this)">👤 Học viên</button>
            <button onclick="showPage('stats', this)">📈 Thống kê</button>
        </div>
    </aside>

    <main>
        <div id="dashboard" class="page active">
            <div class="statGrid">
                <div class="statCard bg-blue">
                    <small>Tổng học viên</small>
                    <h2 id="totalCount">0</h2>
                </div>
                <div class="statCard bg-green">
                    <small>Đang hoạt động</small>
                    <h2 id="activeCount">0</h2>
                </div>
                <div class="statCard bg-red">
                    <small>Đã khóa</small>
                    <h2 id="lockCount">0</h2>
                </div>
            </div>
            <div class="box">
                <h3>Chào mừng trở lại!</h3>
                <p>Hệ thống hoạt động bình thường. Mọi dữ liệu đã được đồng bộ với Firebase.</p>
            </div>
        </div>

        <div id="students" class="page" style="display:none">
            <div class="box">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px">
                    <h3 style="margin:0">Danh sách học viên</h3>
                    <div>
                        <button onclick="openStudentModal('add')" style="background:#198754; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer">➕ Thêm mới</button>
                    </div>
                </div>
                <input type="text" id="searchBox" oninput="filterTable()" placeholder="🔍 Tìm kiếm tên hoặc mã..." style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ddd; border-radius:6px; box-sizing:border-box">
                <table>
                    <thead>
                        <tr>
                            <th>Mã số</th>
                            <th>Họ và Tên</th>
                            <th>Đơn vị</th>
                            <th>Đối tượng</th>
                            <th>Trạng thái</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="studentTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="stats" class="page" style="display:none">
            <div class="box">
                <h3>Thống kê kết quả thi</h3>
                <div id="statsContent">Đang tải dữ liệu...</div>
            </div>
        </div>
    </main>
</div>

<div id="studentModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Thông tin học viên</h3>
        <input type="hidden" id="stMode">
        <input type="hidden" id="stCurrentCode">
        
        <div style="margin-bottom:15px">
            <label style="display:block; font-size:13px; margin-bottom:5px">Họ và tên:</label>
            <input type="text" id="stName" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:5px; box-sizing:border-box">
        </div>
        <div style="margin-bottom:15px">
            <label style="display:block; font-size:13px; margin-bottom:5px">Đơn vị:</label>
            <input type="text" id="stUnit" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:5px; box-sizing:border-box">
        </div>
        <div style="margin-bottom:15px">
            <label style="display:block; font-size:13px; margin-bottom:5px">Đối tượng:</label>
            <select id="stObject" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:5px">
                <option value="HV">Học viên (HV)</option>
                <option value="SQ">Sĩ quan (SQ)</option>
                <option value="CN">Chuyên nghiệp (CN)</option>
            </select>
        </div>
        <div style="display:flex; justify-content:flex-end; gap:10px">
            <button onclick="closeStudentModal()" style="padding:8px 20px; border:1px solid #ccc; background:none; border-radius:5px; cursor:pointer">Hủy</button>
            <button onclick="saveStudent()" style="padding:8px 20px; background:#0d6efd; color:white; border:none; border-radius:5px; cursor:pointer">Lưu lại</button>
        </div>
    </div>
</div>

<script>
    // 1. Cấu hình Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBGivIEsyBLsLs0CqRvwmwceG26duZbWlM",
        authDomain: "thi-luat-giao-thong.firebaseapp.com",
        projectId: "thi-luat-giao-thong"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let allStudents = [];

    // 2. Tải dữ liệu
    async function fetchAllStudents() {
        const snap = await db.collection("students").get();
        allStudents = [];
        let counts = { total: 0, active: 0, lock: 0 };

        snap.forEach(doc => {
            const data = doc.data();
            allStudents.push(data);
            counts.total++;
            if(data.status === 'active') counts.active++; else counts.lock++;
        });

        // Cập nhật Dashboard
        document.getElementById('totalCount').innerText = counts.total;
        document.getElementById('activeCount').innerText = counts.active;
        document.getElementById('lockCount').innerText = counts.lock;

        renderTable(allStudents);
    }

    function renderTable(data) {
        const tbody = document.getElementById('studentTableBody');
        tbody.innerHTML = '';
        data.forEach(s => {
            tbody.innerHTML += `
                <tr>
                    <td><b>${s.code}</b></td>
                    <td>${s.name}</td>
                    <td>${s.unit}</td>
                    <td>${s.object || 'Học viên'}</td>
                    <td><span class="status ${s.status === 'active' ? 'activeStatus' : 'lockStatus'}" onclick="toggleStatus('${s.code}', '${s.status}')">${s.status === 'active' ? 'Hoạt động' : 'Đã khóa'}</span></td>
                    <td>
                        <button onclick="openStudentModal('edit', '${s.code}')" style="color:#0d6efd; background:none; border:none; cursor:pointer">Sửa</button> |
                        <button onclick="deleteStudent('${s.code}')" style="color:#dc3545; background:none; border:none; cursor:pointer">Xóa</button>
                    </td>
                </tr>
            `;
        });
    }

    // 3. Xử lý Thêm/Sửa/Xóa
    function openStudentModal(mode, code = '') {
        document.getElementById('stMode').value = mode;
        document.getElementById('studentModal').classList.add('show');
        if(mode === 'edit') {
            const s = allStudents.find(x => x.code === code);
            document.getElementById('stCurrentCode').value = code;
            document.getElementById('stName').value = s.name;
            document.getElementById('stUnit').value = s.unit;
            document.getElementById('stObject').value = s.objectCode || 'HV';
        } else {
            document.getElementById('stName').value = '';
            document.getElementById('stUnit').value = '';
        }
    }

    function closeStudentModal() {
        document.getElementById('studentModal').classList.remove('show');
    }

    async function saveStudent() {
        const mode = document.getElementById('stMode').value;
        const name = document.getElementById('stName').value.trim();
        const unit = document.getElementById('stUnit').value.trim();
        const objType = document.getElementById('stObject').value;
        
        if(!name || !unit) return alert("Vui lòng nhập đủ thông tin!");

        try {
            if(mode === 'add') {
                const code = objType + Date.now().toString().slice(-6);
                await db.collection("students").doc(code).set({
                    code, name, unit, status: 'active', 
                    objectCode: objType, object: document.getElementById('stObject').options[document.getElementById('stObject').selectedIndex].text.split(' ')[0]
                });
            } else {
                const code = document.getElementById('stCurrentCode').value;
                await db.collection("students").doc(code).update({ name, unit, objectCode: objType });
            }
            closeStudentModal();
            fetchAllStudents();
        } catch (e) { alert("Lỗi: " + e.message); }
    }

    async function toggleStatus(code, current) {
        const next = current === 'active' ? 'locked' : 'active';
        await db.collection("students").doc(code).update({ status: next });
        fetchAllStudents();
    }

    async function deleteStudent(code) {
        if(confirm("Xóa học viên này?")) {
            await db.collection("students").doc(code).delete();
            fetchAllStudents();
        }
    }

    // 4. Điều hướng và Tiện ích
    function showPage(pageId, btn) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById(pageId).style.display = 'block';
        document.querySelectorAll('.menu button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function filterTable() {
        const val = document.getElementById('searchBox').value.toLowerCase();
        const filtered = allStudents.filter(s => s.name.toLowerCase().includes(val) || s.code.toLowerCase().includes(val));
        renderTable(filtered);
    }

    window.onload = fetchAllStudents;
</script>
</body>
</html>
