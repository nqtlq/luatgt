<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>ADMIN | Hệ thống thi luật giao thông</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- CHART -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* ===== GIỮ NGUYÊN + BỔ SUNG ===== */
body{margin:0;font-family:Arial;background:#eef2f6}
header{background:linear-gradient(90deg,#1d3557,#264a8a);color:#fff;padding:14px 22px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
header button{background:#e63946;border:none;border-radius:8px;padding:7px 12px;color:#fff;cursor:pointer}

#layout{display:flex;min-height:calc(100vh - 60px)}
aside{width:240px;background:#fff;padding:20px;box-shadow:4px 0 15px rgba(0,0,0,.08)}
.menu button{width:100%;margin-bottom:8px;padding:10px;border:none;border-radius:10px;background:#f1f4fb;text-align:left;cursor:pointer}
.menu button.active,.menu button:hover{background:#dbe6ff}

main{flex:1;padding:20px;overflow:auto}
.box{background:#fff;padding:18px;border-radius:14px;box-shadow:0 4px 14px rgba(0,0,0,.12);margin-bottom:18px}
.box h3{margin:0 0 12px;color:#1d3557}

.tableWrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:820px}
th,td{padding:9px;border-bottom:1px solid #eee;text-align:center}
th{background:#f1f4fb;cursor:pointer}

.statGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}
.statBox{border-radius:12px;padding:12px;color:#fff;text-align:center;font-size:13px}
.statBox b{font-size:20px}
.total{background:#0d6efd}
.pass{background:#198754}
.fail{background:#e63946}

.rate{padding:5px 8px;border-radius:7px;font-weight:bold}
.good{background:#d1e7dd;color:#0f5132}
.mid{background:#fff3cd;color:#664d03}
.bad{background:#f8d7da;color:#842029}

.page{display:none}
.page.active{display:block}

/* ===== STUDENT DETAIL ===== */
#studentDetail{
 position:fixed;top:0;right:-100%;width:100%;max-width:420px;
 height:100%;background:#fff;box-shadow:-4px 0 20px rgba(0,0,0,.3);
 padding:18px;transition:.3s;overflow:auto;z-index:20
}
#studentDetail.active{right:0}
#studentDetail h3{margin-top:0}
.closeBtn{float:right;background:#e63946;color:#fff;border:none;border-radius:6px;padding:5px 10px;cursor:pointer}

@media(max-width:768px){
 #layout{flex-direction:column}
 aside{width:100%}
 table{font-size:12px}
}
</style>
</head>

<body>

<header>
 <b>🛠️ ADMIN – HỆ THỐNG THI LUẬT GIAO THÔNG</b>
 <button onclick="logout()">Đăng xuất</button>
</header>

<div id="layout">
<aside>
 <div class="menu">
  <button class="active" onclick="showPage('stats',this)">📈 Thống kê</button>
 </div>
</aside>

<main>

<!-- STATS -->
<div id="stats" class="page active">

 <div class="statGrid">
  <div class="statBox total"><b id="tTotal">0</b>Tổng lượt thi</div>
  <div class="statBox pass"><b id="tPass">0</b>Lượt đạt</div>
  <div class="statBox fail"><b id="tFail">0</b>Không đạt</div>
 </div>

 <div class="box">
  <h3>📊 Danh sách học viên</h3>

  <div class="tableWrap">
   <table>
    <thead>
     <tr>
      <th>#</th>
      <th>Học viên</th>
      <th>Lượt thi</th>
      <th>Lượt đạt</th>
      <th>% đạt</th>
     </tr>
    </thead>
    <tbody id="statTable"></tbody>
   </table>
  </div>
 </div>

</div>
</main>
</div>

<!-- ===== STUDENT DETAIL PANEL ===== -->
<div id="studentDetail">
 <button class="closeBtn" onclick="closeDetail()">✖</button>
 <h3 id="dName"></h3>
 <p><b>Tổng lượt thi:</b> <span id="dAttempt"></span></p>
 <p><b>Lượt đạt:</b> <span id="dPass"></span></p>
 <p><b>% đạt:</b> <span id="dRate"></span></p>

 <canvas id="chartResult" height="180"></canvas>

 <h4>Lịch sử thi</h4>
 <table>
  <thead>
   <tr><th>Bộ đề</th><th>Điểm</th><th>KQ</th><th>Thời gian</th></tr>
  </thead>
  <tbody id="historyTable"></tbody>
 </table>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
 apiKey:"AIzaSyBGivIEsyBLsLs0CqRvwmwceG26duZbWlM",
 authDomain:"thi-luat-giao-thong.firebaseapp.com",
 projectId:"thi-luat-giao-thong"
});
const db=firebase.firestore();

/* ===== LOAD STATS ===== */
let statsMap={};

db.collection("exam_logs").get().then(s=>{
 let total=0,pass=0;
 s.forEach(d=>{
  const e=d.data();
  total++; if(e.pass) pass++;
  if(!statsMap[e.studentCode]) statsMap[e.studentCode]={a:0,p:0,logs:[]};
  statsMap[e.studentCode].a++;
  if(e.pass) statsMap[e.studentCode].p++;
  statsMap[e.studentCode].logs.push(e);
 });

 tTotal.innerText=total;
 tPass.innerText=pass;
 tFail.innerText=total-pass;

 let i=1;
 for(const k in statsMap){
  const v=statsMap[k];
  const rate=Math.round(v.p/v.a*100);
  const cls=rate>=80?"good":rate>=50?"mid":"bad";
  statTable.innerHTML+=`
   <tr onclick="openDetail('${k}')">
    <td>${i++}</td>
    <td>${k}</td>
    <td>${v.a}</td>
    <td>${v.p}</td>
    <td><span class="rate ${cls}">${rate}%</span></td>
   </tr>`;
 }
});

/* ===== DETAIL ===== */
let chart;

function openDetail(code){
 const d=statsMap[code];
 dName.innerText="Học viên: "+code;
 dAttempt.innerText=d.a;
 dPass.innerText=d.p;
 dRate.innerText=Math.round(d.p/d.a*100)+"%";

 historyTable.innerHTML="";
 let byMonth={};

 d.logs.forEach(l=>{
  const t=l.time.toDate();
  const m=t.getFullYear()+"-"+(t.getMonth()+1);
  byMonth[m]=(byMonth[m]||0)+(l.pass?1:0);
  historyTable.innerHTML+=`
   <tr>
    <td>${l.setId||""}</td>
    <td>${l.score}/${l.total}</td>
    <td>${l.pass?"✔":"✖"}</td>
    <td>${t.toLocaleString()}</td>
   </tr>`;
 });

 if(chart) chart.destroy();
 chart=new Chart(chartResult,{
  type:"bar",
  data:{
   labels:Object.keys(byMonth),
   datasets:[{
    label:"Số lượt đạt",
    data:Object.values(byMonth),
    backgroundColor:"#198754"
   }]
  }
 });

 studentDetail.classList.add("active");
}
function closeDetail(){studentDetail.classList.remove("active")}
function logout(){localStorage.clear();location.href="index.html"}
</script>

</body>
</html>
