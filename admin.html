<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>ADMIN | Hệ thống thi luật giao thông</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- SheetJS for Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-content {
            animation: fadeIn 0.3s ease-out;
        }

        /* Loading spinner */
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }

    </style>
</head>

<body class="bg-gray-100">
    <div id="app"></div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBGivIEsyBLsLs0CqRvwmwceG26duZbWlM",
            authDomain: "thi-luat-giao-thong.firebaseapp.com",
            projectId: "thi-luat-giao-thong"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Check authentication
        if(localStorage.getItem("userType") !== "admin") {
            location.href = "index.html";
        }

        // State Management
        const state = {
            currentPage: 'dashboard',
            students: [],
            filteredStudents: [],
            searchQuery: '',
            studentModal: false,
            importModal: false,
            deleteModal: false,
            examModal: false,
            mode: 'add',
            currentCode: '',
            deleteTarget: null,
            currentExam: null,
            statsData: [],
            examLogs: [],
            sortKey: '',
            sortDir: 1,
            currentStudent: null,
            studentExams: [],
            chartPeriod: 'week',
            examSets: [],
            filterSet: '',
            filterTime: '',
            fromDate: '',
            toDate: '',
            formData: {
                name: '',
                unit: '',
                objectType: 'HV',
                objectOther: ''
            },
            loading: true,
            statsLoading: false,
            chartInstance: null
        };

        // Utility Functions
        function formatDateTime(date) {
            const d = new Date(date);
            const dd = String(d.getDate()).padStart(2, '0');
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const yy = d.getFullYear();
            const hh = String(d.getHours()).padStart(2, '0');
            const min = String(d.getMinutes()).padStart(2, '0');
            return `${dd}/${mm}/${yy} ${hh}:${min}`;
        }

        // Data Fetching
        async function fetchStudents() {
            state.loading = true;
            render();
            
            try {
                const querySnapshot = await db.collection('students').get();
                const studentList = [];
                querySnapshot.forEach((doc) => {
                    studentList.push(doc.data());
                });
                studentList.sort((a, b) => a.code.localeCompare(b.code));
                state.students = studentList;
                state.filteredStudents = studentList;
            } catch (error) {
                console.error('Error fetching students:', error);
                alert('Lỗi tải dữ liệu học viên!');
            } finally {
                state.loading = false;
                render();
            }
        }

        async function fetchExamLogs() {
            try {
                const querySnapshot = await db.collection('exam_logs').get();
                const logs = [];
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    logs.push({
                        ...data,
                        time: data.time?.toDate() || new Date()
                    });
                });
                state.examLogs = logs;

                const sets = new Set();
                logs.forEach(log => sets.add(log.setId || 'DEFAULT'));
                state.examSets = Array.from(sets);
                render();
            } catch (error) {
                console.error('Error fetching exam logs:', error);
            }
        }

        // Search and Filter
        function handleSearch(query) {
            state.searchQuery = query;
            if (query.trim() === '') {
                state.filteredStudents = state.students;
            } else {
                const q = query.toLowerCase();
                state.filteredStudents = state.students.filter(st => 
                    st.nameSearch?.includes(q) || 
                    st.code.toLowerCase().includes(q) || 
                    st.object.toLowerCase().includes(q)
                );
            }
            render();
        }

        // Generate Next Code
        function generateNextCode(prefix) {
            const relevantCodes = state.students
                .filter(s => s.code.startsWith(prefix))
                .map(s => parseInt(s.code.replace(prefix, '')))
                .filter(n => !isNaN(n));

            const maxNum = relevantCodes.length > 0 ? Math.max(...relevantCodes) : 0;
            const nextNum = maxNum + 1;
            return prefix + String(nextNum).padStart(4, '0');
        }

        // Modal Functions
        function openAddStudent() {
            state.mode = 'add';
            state.formData = {
                name: '',
                unit: '',
                objectType: 'HV',
                objectOther: ''
            };
            state.studentModal = true;
            render();
        }

        function openEditStudent(code) {
            const student = state.students.find(s => s.code === code);
            if (!student) {
                alert('Không tìm thấy học viên!');
                return;
            }

            state.mode = 'edit';
            state.currentCode = code;
            state.formData = {
                name: student.name,
                unit: student.unit,
                objectType: student.objectCode || 'HV',
                objectOther: student.objectCode === 'OTHER' ? student.object : ''
            };
            state.studentModal = true;
            render();
        }

        function openDeleteModal(code, name) {
            state.deleteTarget = { code, name };
            state.deleteModal = true;
            render();
        }

        function openImportModal() {
            state.importModal = true;
            render();
        }

        function closeModal(type) {
            if (type === 'student') state.studentModal = false;
            else if (type === 'import') state.importModal = false;
            else if (type === 'delete') state.deleteModal = false;
            else if (type === 'exam') state.examModal = false;
            render();
        }

        // Student Operations
        async function saveStudent() {
            const { name, unit, objectType, objectOther } = state.formData;
            let objName = '', objPrefix = '';

            if (objectType === 'HV') { objName = 'Học viên'; objPrefix = 'HV'; }
            else if (objectType === 'SQ') { objName = 'Sĩ quan'; objPrefix = 'SQ'; }
            else if (objectType === 'CN') { objName = 'Chuyên nghiệp'; objPrefix = 'CN'; }
            else {
                objName = objectOther.trim();
                objPrefix = 'KH';
            }

            if (!name.trim() || !unit.trim() || !objName.trim()) {
                alert('Vui lòng nhập đầy đủ thông tin!');
                return;
            }

            try {
                if (state.mode === 'add') {
                    const code = generateNextCode(objPrefix);
                    await db.collection('students').doc(code).set({
                        code,
                        name: name.trim(),
                        unit: unit.trim(),
                        object: objName,
                        objectCode: objectType,
                        status: 'active',
                        nameSearch: name.toLowerCase()
                    });
                    alert(`✅ Đã thêm: ${code}`);
                } else {
                    await db.collection('students').doc(state.currentCode).update({
                        name: name.trim(),
                        unit: unit.trim(),
                        object: objName,
                        objectCode: objectType,
                        nameSearch: name.toLowerCase()
                    });
                    alert('✅ Cập nhật thành công!');
                }
                closeModal('student');
                fetchStudents();
            } catch (error) {
                console.error('Error saving student:', error);
                alert('❌ Lỗi lưu dữ liệu!');
            }
        }

        async function deleteStudent() {
            if (!state.deleteTarget) return;
            
            try {
                await db.collection('students').doc(state.deleteTarget.code).delete();
                
                const querySnapshot = await db.collection('exam_logs')
                    .where('studentCode', '==', state.deleteTarget.code).get();
                
                const batch = db.batch();
                querySnapshot.forEach((doc) => {
                    batch.delete(doc.ref);
                });
                await batch.commit();

                alert('✅ Đã xóa học viên và dữ liệu liên quan.');
                closeModal('delete');
                fetchStudents();
            } catch (error) {
                console.error('Error deleting student:', error);
                alert('❌ Lỗi khi xóa!');
            }
        }

        async function changeStatus(code, newStatus) {
            try {
                await db.collection('students').doc(code).update({ status: newStatus });
                alert('✅ Đã cập nhật trạng thái!');
                fetchStudents();
            } catch (error) {
                console.error('Error changing status:', error);
                alert('❌ Lỗi cập nhật trạng thái!');
            }
        }

        // Excel Import/Export
        function downloadTemplate() {
            const ws = XLSX.utils.json_to_sheet([
                { "HoTen": "Nguyễn Văn A", "DonVi": "Lớp A1", "DoiTuong": "HV" },
                { "HoTen": "Trần Văn B", "DonVi": "Phòng Tham Mưu", "DoiTuong": "SQ" },
                { "HoTen": "Lê Thị C", "DonVi": "Ban Hậu Cần", "DoiTuong": "CN" }
            ]);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Mau_Nhap_Lieu");
            XLSX.writeFile(wb, "Mau_Them_Hoc_Vien.xlsx");
        }

        async function processExcel(file) {
            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(firstSheet);

                    if(json.length === 0) {
                        alert("File rỗng!");
                        return;
                    }

                    let tempCounters = { HV: 0, SQ: 0, CN: 0, KH: 0 };
                    
                    state.students.forEach(s => {
                        const p = s.code.substring(0, 2);
                        const n = parseInt(s.code.substring(2));
                        if(!isNaN(n) && n > (tempCounters[p] || 0)) tempCounters[p] = n;
                    });

                    const promises = [];

                    json.forEach(row => {
                        if(!row.HoTen) return;

                        let objCode = row.DoiTuong ? row.DoiTuong.toUpperCase() : "KH";
                        let prefix = "KH";
                        let objName = "Khác";

                        if(objCode === "HV") { prefix = "HV"; objName = "Học viên"; }
                        else if(objCode === "SQ") { prefix = "SQ"; objName = "Sĩ quan"; }
                        else if(objCode === "CN") { prefix = "CN"; objName = "Chuyên nghiệp"; }
                        
                        tempCounters[prefix] = (tempCounters[prefix] || 0) + 1;
                        let nextNum = tempCounters[prefix];
                        let newCode = prefix + String(nextNum).padStart(4, '0');

                        promises.push(
                            db.collection('students').doc(newCode).set({
                                code: newCode,
                                name: row.HoTen,
                                unit: row.DonVi || "",
                                object: objName,
                                objectCode: objCode,
                                status: "active",
                                nameSearch: row.HoTen.toLowerCase()
                            })
                        );
                    });

                    await Promise.all(promises);
                    alert(`✅ Đã nhập thành công ${promises.length} học viên!`);
                    closeModal('import');
                    fetchStudents();
                } catch(err) {
                    console.error('Error processing Excel:', err);
                    alert("❌ Lỗi xử lý file: " + err.message);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // Statistics Functions
        function getTimeRange() {
            const now = new Date();
            let from = null, to = null;
            
            const monday = d => {
                const x = new Date(d);
                const day = x.getDay() || 7;
                x.setDate(x.getDate() - day + 1);
                x.setHours(0, 0, 0, 0);
                return x;
            };
            
            if(state.filterTime === 'thisWeek') {
                from = monday(now); to = now;
            } else if(state.filterTime === 'lastWeek') {
                to = monday(now); to.setMilliseconds(-1); from = monday(to);
            } else if(state.filterTime === 'thisMonth') {
                from = new Date(now.getFullYear(), now.getMonth(), 1); to = now;
            } else if(state.filterTime === 'lastMonth') {
                from = new Date(now.getFullYear(), now.getMonth() - 1, 1);
                to = new Date(now.getFullYear(), now.getMonth(), 0, 23, 59, 59);
            } else if(state.filterTime === 'custom' && state.fromDate && state.toDate) {
                from = new Date(state.fromDate);
                to = new Date(state.toDate + "T23:59:59");
            }
            
            return { from, to };
        }

        function loadStats() {
            state.statsLoading = true;
            state.statsData = [];
            render();

            let map = {}, total = 0, pass = 0;
            const { from, to } = getTimeRange();

            state.examLogs.forEach(e => {
                if(state.filterSet && e.setId !== state.filterSet) return;
                if(from && to) {
                    const t = new Date(e.time);
                    if(t < from || t > to) return;
                }
                total++; 
                if(e.pass) pass++;
                if(!map[e.studentCode]) map[e.studentCode] = { a: 0, p: 0 };
                map[e.studentCode].a++;
                if(e.pass) map[e.studentCode].p++;
            });
            
            state.statsData = Object.entries(map).map(([c, v]) => ({ 
                code: c, 
                attempts: v.a, 
                pass: v.p, 
                rate: Math.round((v.p / v.a) * 100) 
            }));

            state.statsLoading = false;
            render();
        }

        function sortStats(key) {
            if(state.sortKey === key) {
                state.sortDir *= -1;
            } else {
                state.sortKey = key;
                state.sortDir = 1;
            }
            
            state.statsData.sort((a, b) => (a[key] - b[key]) * state.sortDir);
            render();
        }

        // Student Detail Functions
        async function viewStudentDetail(code, name) {
            state.currentStudent = { code, name };
            state.currentPage = 'studentDetail';
            
            try {
                const querySnapshot = await db.collection('exam_logs')
                    .where('studentCode', '==', code).get();
                
                const exams = [];
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    exams.push({
                        ...data,
                        time: data.time?.toDate() || new Date()
                    });
                });
                
                exams.sort((a, b) => b.time - a.time);
                state.studentExams = exams;
                render();
                renderChart();
            } catch (error) {
                console.error('Error loading student exams:', error);
            }
        }

        function showExamDetail(exam) {
            state.currentExam = exam;
            state.examModal = true;
            render();
        }

        // Chart Functions
        function getChartData() {
            const now = new Date();
            const labels = [];
            const scores = [];
            
            if (state.chartPeriod === 'week') {
                for(let i = 6; i >= 0; i--) {
                    const d = new Date(now);
                    d.setDate(d.getDate() - i);
                    const dateStr = d.toLocaleDateString('vi-VN');
                    labels.push(dateStr);
                    
                    const exams = state.studentExams.filter(e => {
                        const eDate = new Date(e.time).toLocaleDateString('vi-VN');
                        return eDate === dateStr;
                    });
                    
                    const avg = exams.length > 0 ? Math.round(exams.reduce((sum, e) => sum + e.score, 0) / exams.length) : 0;
                    scores.push(avg);
                }
            } else if (state.chartPeriod === 'month') {
                for(let i = 29; i >= 0; i--) {
                    const d = new Date(now);
                    d.setDate(d.getDate() - i);
                    labels.push(d.getDate() + "/" + (d.getMonth() + 1));
                    
                    const dateStr = d.toLocaleDateString('vi-VN');
                    const exams = state.studentExams.filter(e => {
                        const eDate = new Date(e.time).toLocaleDateString('vi-VN');
                        return eDate === dateStr;
                    });
                    
                    const avg = exams.length > 0 ? Math.round(exams.reduce((sum, e) => sum + e.score, 0) / exams.length) : 0;
                    scores.push(avg);
                }
            } else if (state.chartPeriod === 'year') {
                for(let i = 11; i >= 0; i--) {
                    const d = new Date(now);
                    d.setMonth(d.getMonth() - i);
                    const month = d.getMonth() + 1;
                    const year = d.getFullYear();
                    labels.push(`T${month}/${year}`);
                    
                    const exams = state.studentExams.filter(e => {
                        const et = new Date(e.time);
                        return et.getMonth() === d.getMonth() && et.getFullYear() === d.getFullYear();
                    });
                    
                    const avg = exams.length > 0 ? Math.round(exams.reduce((sum, e) => sum + e.score, 0) / exams.length) : 0;
                    scores.push(avg);
                }
            }
            
            return { labels, scores };
        }

        function renderChart() {
            setTimeout(() => {
                const canvas = document.getElementById('performanceChart');
                if (!canvas) return;

                const ctx = canvas.getContext('2d');
                
                if(state.chartInstance) {
                    state.chartInstance.destroy();
                }
                
                const data = getChartData();
                
                state.chartInstance = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.labels,
                        datasets: [{
                            label: 'Điểm trung bình',
                            data: data.scores,
                            borderColor: '#3b82f6',
                            backgroundColor: 'rgba(59,130,246,0.1)',
                            tension: 0.3,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: true },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        return 'Điểm TB: ' + context.parsed.y;
                                    }
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                max: 100,
                                ticks: { stepSize: 10 }
                            }
                        }
                    }
                });
            }, 100);
        }

        // Calculate Stats
        function getStudentStats() {
            const totalCount = state.students.length;
            const activeCount = state.students.filter(s => s.status === 'active').length;
            const lockCount = state.students.filter(s => s.status === 'lock').length;

            const objectCounts = {};
            state.students.forEach(s => {
                const obj = s.object || 'Khác';
                objectCounts[obj] = (objectCounts[obj] || 0) + 1;
            });

            return { totalCount, activeCount, lockCount, objectCounts };
        }

        function getExamStats() {
            const total = state.examLogs.length;
            const pass = state.examLogs.filter(e => e.pass).length;
            const fail = total - pass;
            return { total, pass, fail };
        }

        function getMiniStats() {
            const total = state.studentExams.length;
            const pass = state.studentExams.filter(e => e.pass).length;
            const avg = total > 0 ? Math.round(state.studentExams.reduce((sum, e) => sum + e.score, 0) / total) : 0;
            const rate = total > 0 ? Math.round(pass / total * 100) : 0;
            return { total, pass, avg, rate };
        }

        // Render Functions
        function render() {
            const app = document.getElementById('app');
            if (!app) return;

            app.innerHTML = `
                <!-- Header -->
                <header class="bg-gradient-to-r from-blue-900 to-blue-700 text-white shadow-lg sticky top-0 z-40">
                    <div class="container mx-auto px-4 py-4 flex justify-between items-center">
                        <h1 class="text-xl font-bold">🛠️ ADMIN – HỆ THỐNG THI LUẬT GIAO THÔNG</h1>
                        <button 
                            onclick="logout()" 
                            class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg transition">
                            Đăng xuất
                        </button>
                    </div>
                </header>

                <!-- Layout -->
                <div class="flex min-h-screen">
                    <!-- Sidebar -->
                    <aside class="w-64 bg-white shadow-lg">
                        <nav class="p-4 space-y-2">
                            ${renderMenuButton('dashboard', '📊 Tổng quan')}
                            ${renderMenuButton('students', '👤 Quản lý Học viên')}
                            ${renderMenuButton('question_sets', '📝 Quản lý đề thi')}
                            ${renderMenuButton('stats', '📈 Thống kê')}
                            ${renderMenuButton('system', '⚙️ Cài đặt')}
                        </nav>
                    </aside>

                    <!-- Main Content -->
                    <main class="flex-1 p-6 overflow-y-auto">
                        ${renderPage()}
                    </main>
                </div>

                <!-- Modals -->
                ${renderStudentModal()}
                ${renderImportModal()}
                ${renderDeleteModal()}
                ${renderExamModal()}
            `;
        }

        function renderMenuButton(page, label) {
            const isActive = state.currentPage === page;
            return `
                <button 
                    onclick="changePage('${page}')" 
                    class="w-full text-left px-4 py-3 rounded-lg transition ${
                        isActive 
                            ? 'bg-blue-100 text-blue-600 font-bold' 
                            : 'bg-gray-50 hover:bg-gray-100'
                    }">
                    ${label}
                </button>
            `;
        }

        function renderPage() {
            switch(state.currentPage) {
                case 'dashboard':
                    return renderDashboard();
                case 'students':
                    return renderStudents();
                case 'question_sets':
                    return renderQuestionSets();
                case 'stats':
                    return renderStats();
                case 'system':
                    return renderSystem();
                case 'studentDetail':
                    return renderStudentDetail();
                default:
                    return renderDashboard();
            }
        }

        function renderDashboard() {
            return `
                <div class="bg-white rounded-xl shadow-lg p-6">
                    <h2 class="text-2xl font-bold text-blue-900 mb-4">📊 Hệ thống quản trị</h2>
                    <p class="text-gray-700 mb-2">Chào mừng Admin. Sử dụng menu bên trái để quản lý học viên và xem báo cáo kết quả thi.</p>
                    <ul class="list-disc list-inside text-gray-700 space-y-1">
                        <li>Quản lý học viên</li>
                        <li>Quản lý đề thi</li>
                        <li>Thống kê kết quả thi</li>
                        <li>Chi tiết thành tích từng học viên</li>
                    </ul>
                </div>
            `;
        }

        function renderStudents() {
            const { totalCount, activeCount, lockCount, objectCounts } = getStudentStats();
            
            return `
                <!-- Stats Cards -->
                <div class="grid grid-cols-3 gap-4 mb-6">
                    <div class="bg-blue-500 text-white rounded-xl p-6 shadow-lg">
                        <div class="text-sm mb-2">Tổng học viên</div>
                        <div class="text-4xl font-bold mb-3">${totalCount}</div>
                        <div class="text-xs opacity-90 border-t border-white/30 pt-2">
                            ${Object.entries(objectCounts).map(([k, v]) => `<div>• ${k}: ${v}</div>`).join('')}
                        </div>
                    </div>

                                        answer.correct ? 'bg-green-100' : 'bg-red-100'
                                    }">
                                        <span>
                                            <b>Câu ${index + 1}:</b> ${answer.userAnswer || 'Không trả lời'}
                                        </span>
                                        <span>${answer.correct ? '✓' : '✗'}</span>
                                    </div>
                                `).join('')}
                            </div>
                        ` : `
                            <p class="text-gray-500">Không có dữ liệu chi tiết câu trả lời</p>
                        `}

                        <button 
                            onclick="closeModal('exam')"
                            class="w-full mt-4 bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded-lg transition">
                            Đóng
                        </button>
                    </div>
                </div>
            `;
        }

        // Page Navigation
        function changePage(page) {
            state.currentPage = page;
            
            if (page === 'students') {
                fetchStudents();
            } else if (page === 'stats') {
                loadStats();
            }
            
            render();
        }

        async function viewStudentDetailFromCode(code) {
            const student = state.students.find(s => s.code === code);
            if (student) {
                await viewStudentDetail(code, student.name);
            } else {
                alert('Không tìm thấy học viên!');
            }
        }

        function logout() {
            localStorage.clear();
            location.href = 'index.html';
        }

        // Initialize App
        (async function init() {
            await fetchStudents();
            await fetchExamLogs();
            render();
        })();
    </script>
</body>
</html>
