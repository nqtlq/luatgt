<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>ADMIN | Hệ thống thi luật giao thông</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ===== GLOBAL ===== */
body{
 margin:0;
 font-family:Arial,Helvetica,sans-serif;
 background:#eef2f6;
}

/* ===== HEADER ===== */
header{
 background:linear-gradient(90deg,#1d3557,#264a8a);
 color:white;
 padding:14px 22px;
 display:flex;
 justify-content:space-between;
 align-items:center;
 box-shadow:0 4px 14px rgba(0,0,0,.25);
 position:sticky;
 top:0;
 z-index:100;
}
header b{font-size:17px}
header button{
 background:#e63946;
 border:none;
 border-radius:8px;
 padding:7px 12px;
 color:white;
 cursor:pointer;
}

/* ===== LAYOUT ===== */
#layout{
 display:flex;
 min-height:calc(100vh - 64px);
}

/* ===== SIDEBAR ===== */
aside{
 width:240px;
 background:white;
 box-shadow:4px 0 15px rgba(0,0,0,.08);
 padding:20px;
}
.menu button{
 width:100%;
 margin-bottom:8px;
 padding:10px 14px;
 border:none;
 border-radius:10px;
 background:#f1f4fb;
 cursor:pointer;
 text-align:left;
}
.menu button.active,
.menu button:hover{
 background:#dbe6ff;
}

/* ===== MAIN ===== */
main{
 flex:1;
 padding:20px;
 overflow-y:auto;
}

/* ===== BOX ===== */
.box{
 background:white;
 padding:18px;
 border-radius:14px;
 box-shadow:0 4px 14px rgba(0,0,0,.12);
 margin-bottom:18px;
}
.box h3{
 margin-top:0;
 color:#1d3557;
 font-size:16px;
}

/* ===== TOOLBAR ===== */
.toolbar{
 display:flex;
 gap:10px;
 flex-wrap:wrap;
 margin-bottom:14px;
}
.toolbar input,
.toolbar select{
 padding:8px 10px;
 border-radius:8px;
 border:1px solid #ccc;
 font-size:13px;
}
.toolbar button{
 background:#198754;
 color:white;
 border:none;
 border-radius:8px;
 padding:8px 14px;
 cursor:pointer;
 font-size:13px;
}

/* ===== TABLE ===== */
table{
 width:100%;
 border-collapse:collapse;
 font-size:13px;
}
th,td{
 padding:9px;
 border-bottom:1px solid #eee;
 text-align:center;
}
th{
 background:#f1f4fb;
 color:#1d3557;
}

/* ===== PAGE ===== */
.page{display:none}
.page.active{display:block}

/* ===== RATE ===== */
.rate{
 padding:5px 8px;
 border-radius:7px;
 font-weight:bold;
 font-size:12px;
}
.good{background:#d1e7dd;color:#0f5132}
.bad{background:#f8d7da;color:#842029}

/* ===== MODAL ===== */
.modal{
 display:none;
 position:fixed;
 top:0;left:0;right:0;bottom:0;
 background:rgba(0,0,0,.7);
 z-index:200;
 align-items:center;
 justify-content:center;
}
.modal.show{display:flex}
.modalContent{
 background:white;
 border-radius:14px;
 padding:24px;
 max-width:800px;
 width:90%;
 max-height:90vh;
 overflow:auto;
 position:relative;
}
.closeModal{
 position:absolute;
 top:10px;
 right:10px;
 background:#e63946;
 color:white;
 border:none;
 border-radius:50%;
 width:32px;
 height:32px;
 cursor:pointer;
}

/* ===== ANSWER ===== */
.answerRow{
 display:flex;
 justify-content:space-between;
 padding:10px;
 border-radius:8px;
 margin-bottom:6px;
}
.answerRow.correct{background:#d1e7dd}
.answerRow.wrong{background:#f8d7da}
</style>
</head>

<body>

<header>
 <b>🛠️ ADMIN – HỆ THỐNG THI LUẬT GIAO THÔNG</b>
 <button onclick="logout()">Đăng xuất</button>
</header>

<div id="layout">

<aside>
 <div class="menu">
  <button class="active" onclick="showPage('students',this)">👤 Học viên</button>
 </div>
</aside>

<main>

<!-- STUDENTS -->
<div id="students" class="page active">
 <div class="box">
  <h3>👤 Danh sách học viên</h3>
  <table>
   <thead>
    <tr><th>Mã</th><th>Họ tên</th><th>Chi tiết</th></tr>
   </thead>
   <tbody id="studentTable"></tbody>
  </table>
 </div>
</div>

<!-- STUDENT DETAIL -->
<div id="studentDetail" class="page">
 <button onclick="showPage('students')">← Quay lại</button>

 <div class="box">
  <h3 id="detailName"></h3>
  <p>Mã: <b id="detailCode"></b></p>
 </div>

 <div class="box">
  <h3>Lịch sử thi</h3>
  <table>
   <thead>
    <tr>
     <th>#</th>
     <th>Thời gian</th>
     <th>Bộ đề</th>
     <th>Điểm</th>
     <th>Kết quả</th>
     <th>Chi tiết</th>
    </tr>
   </thead>
   <tbody id="historyTable"></tbody>
  </table>
 </div>
</div>

</main>
</div>

<!-- MODAL -->
<div id="examModal" class="modal">
 <div class="modalContent">
  <button class="closeModal" onclick="closeExamModal()">✕</button>
  <h3>Chi tiết bài thi</h3>
  <div id="examDetailContent"></div>
 </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
 apiKey:"AIzaSyBGivIEsyBLsLs0CqRvwmwceG26duZbWlM",
 authDomain:"thi-luat-giao-thong.firebaseapp.com",
 projectId:"thi-luat-giao-thong"
});
const db=firebase.firestore();

if(localStorage.getItem("userType")!=="admin") location.href="index.html";

let studentExams=[];
let currentStudent=null;

/* PAGE */
function showPage(id,btn){
 document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
 document.getElementById(id).classList.add("active");
 if(btn){
  document.querySelectorAll(".menu button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
 }
}
function logout(){
 localStorage.clear();
 location.href="index.html";
}

/* LOAD STUDENTS */
function loadStudents(){
 studentTable.innerHTML="";
 db.collection("students").get().then(s=>{
  s.forEach(d=>{
   const st=d.data();
   studentTable.innerHTML+=`
    <tr>
     <td>${st.code}</td>
     <td>${st.name}</td>
     <td><button onclick="viewStudent('${st.code}','${st.name}')">👁️ Xem</button></td>
    </tr>`;
  });
 });
}
loadStudents();

/* STUDENT DETAIL */
function viewStudent(code,name){
 currentStudent={code,name};
 detailCode.innerText=code;
 detailName.innerText=name;
 showPage('studentDetail');
 loadHistory();
}

function loadHistory(){
 historyTable.innerHTML="";
 studentExams=[];
 db.collection("exam_logs").where("studentCode","==",currentStudent.code).get().then(s=>{
  s.forEach(d=>{
   const e=d.data();
   studentExams.push({
    time:e.time.toDate(),
    setId:e.setId,
    score:e.score,
    pass:e.pass,
    answers:e.answers||[]
   });
  });
  studentExams.sort((a,b)=>b.time-a.time);
  studentExams.forEach((e,i)=>{
   historyTable.innerHTML+=`
    <tr>
     <td>${i+1}</td>
     <td>${e.time.toLocaleString('vi-VN')}</td>
     <td>${e.setId}</td>
     <td>${e.score}</td>
     <td><span class="rate ${e.pass?'good':'bad'}">${e.pass?'Đạt':'Không đạt'}</span></td>
     <td><span style="color:#0d6efd;cursor:pointer" onclick="showExamDetail(${i})">Xem</span></td>
    </tr>`;
  });
 });
}

/* MODAL DETAIL */
function showExamDetail(i){
 const exam=studentExams[i];
 let html=`
  <p><b>Thời gian:</b> ${exam.time.toLocaleString('vi-VN')}</p>
  <p><b>Bộ đề:</b> ${exam.setId}</p>
  <p><b>Điểm:</b> ${exam.score}</p>
  <p><b>Kết quả:</b> ${exam.pass?'Đạt':'Không đạt'}</p>
  <hr>
 `;

 if(exam.answers.length){
  exam.answers.forEach((a,idx)=>{
   html+=`
    <div class="answerRow ${a.correct?'correct':'wrong'}">
     <span>Câu ${idx+1}: ${a.userAnswer||'Không trả lời'}</span>
     <span>${a.correct?'✓':'✗'}</span>
    </div>
   `;
  });
 }else{
  html+=`<p>Không có chi tiết câu hỏi</p>`;
 }

 examDetailContent.innerHTML=html;
 examModal.classList.add("show");
}

function closeExamModal(){
 examModal.classList.remove("show");
}
</script>

</body>
</html>
