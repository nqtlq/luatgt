<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN | Hệ thống thi luật giao thông</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@latest/dist/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <style>
        :root {
            --primary: #1e40af;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #0f172a;
            --light: #f8fafc;
            --gray: #64748b;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',sans-serif; background:#f1f5f9; color:#334155; line-height:1.6; }
        header { background:linear-gradient(90deg,#0f172a,#1e40af); color:white; padding:1rem 1.5rem; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:1000; box-shadow:0 4px 20px rgba(0,0,0,0.15); }
        header h1 { font-size:1.25rem; font-weight:600; display:flex; align-items:center; gap:0.75rem; }
        .mobile-menu-btn { display:none; background:none; border:none; color:white; font-size:1.8rem; cursor:pointer; }
        
        #app { display:flex; min-height:calc(100vh - 70px); }
        aside { width:280px; background:white; border-right:1px solid #e2e8f0; padding:1.5rem 0; box-shadow:2px 0 10px rgba(0,0,0,0.05); position:sticky; top:70px; height:calc(100vh - 70px); overflow-y:auto; }
        .menu-btn { width:100%; text-align:left; padding:0.9rem 1.5rem; border:none; background:transparent; color:#64748b; font-weight:500; display:flex; align-items:center; gap:0.9rem; transition:all 0.3s; cursor:pointer; }
        .menu-btn:hover { background:#f0f9ff; color:var(--primary); }
        .menu-btn.active { background:#dbeafe; color:var(--primary); font-weight:600; border-left:4px solid var(--primary); }
        .menu-btn i { width:20px; text-align:center; }

        main { flex:1; padding:1.5rem; overflow:auto; }
        .card { background:white; border-radius:12px; padding:1.5rem; margin-bottom:1.5rem; box-shadow:0 4px 15px rgba(0,0,0,0.08); border:1px solid #e2e8f0; }
        .card-title { font-size:1.4rem; font-weight:700; color:var(--dark); margin-bottom:1rem; display:flex; align-items:center; gap:0.5rem; }

        .stats-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(260px, 1fr)); gap:1.2rem; margin-bottom:1.5rem; }
        .stat-box { padding:1.5rem; border-radius:12px; color:white; position:relative; overflow:hidden; backdrop-filter:blur(10px); }
        .stat-box::before { content:''; position:absolute; top:-50%; right:-50%; width:150%; height:150%; background:rgba(255,255,255,0.1); border-radius:50%; transform:rotate(30deg); }
        .stat-blue { background:linear-gradient(135deg,#3b82f6,#1d4ed8); }
        .stat-green { background:linear-gradient(135deg,#10b981,#059669); }
        .stat-red { background:linear-gradient(135deg,#ef4444,#dc2626); }
        .stat-purple { background:linear-gradient(135deg,#8b5cf6,#7c3aed); }
        .stat-label { font-size:0.9rem; opacity:0.95; margin-bottom:0.5rem; }
        .stat-value { font-size:2.5rem; font-weight:800; }

        .toolbar { display:flex; flex-wrap:wrap; gap:0.75rem; margin-bottom:1.2rem; align-items:center; }
        .search-box { position:relative; flex:1; min-width:250px; }
        .search-box input { width:100%; padding:0.75rem 1rem 0.75rem 2.5rem; border:1px solid #cbd5e1; border-radius:8px; font-size:0.95rem; }
        .search-box i { position:absolute; left:0.8rem; top:50%; transform:translateY(-50%); color:#94a3b8; }

        .btn { padding:0.65rem 1.2rem; border:none; border-radius:8px; cursor:pointer; font-weight:600; display:inline-flex; align-items:center; gap:0.5rem; transition:all 0.3s; font-size:0.9rem; }
        .btn:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(0,0,0,0.15); }
        .btn-primary { background:#3b82f6; color:white; }
        .btn-success { background:#10b981; color:white; }
        .btn-danger { background:#ef4444; color:white; }
        .btn-warning { background:#f59e0b; color:white; }
        .btn-purple { background:#8b5cf6; color:white; }
        .btn-outline { background:transparent; border:2px solid #cbd5e1; color:#475569; }
        .btn-sm { padding:0.4rem 0.8rem; font-size:0.8rem; }

        .table-container { 
            border-radius:12px; 
            overflow:hidden; 
            border:1px solid #e2e8f0; 
            box-shadow:0 4px 15px rgba(0,0,0,0.06);
        }
        table { width:100%; border-collapse:collapse; font-size:0.9rem; }
        thead { background:#f8fafc; position:sticky; top:0; z-index:10; }
        th { padding:1rem 0.75rem; text-align:left; font-weight:600; color:#475569; border-bottom:2px solid #e2e8f0; }
        td { padding:0.9rem 0.75rem; border-bottom:1px solid #e2e8f0; vertical-align:middle; }
        tbody tr:hover { background:#f8fafc; }
        tbody tr:last-child td { border-bottom:none; }

        .badge { padding:0.35rem 0.75rem; border-radius:50px; font-size:0.75rem; font-weight:600; }
        .badge-green { background:#d1fae5; color:#065f46; }
        .badge-red { background:#fee2e2; color:#991b1b; }
        .badge-yellow { background:#fef3c7; color:#92400e; }
        .badge-blue { background:#dbeafe; color:#1e40af; }
        .badge-purple { background:#f3e8ff; color:#7c3aed; }

        .action-group { display:flex; gap:0.4rem; }
        .action-btn { width:38px; height:38px; border:none; border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:1rem; transition:all 0.2s; }
        .action-btn:hover { transform:scale(1.1); }
        .btn-edit { background:#fbbf24; color:white; }
        .btn-reset { background:#8b5cf6; color:white; }
        .btn-delete { background:#ef4444; color:white; }
        .btn-view { background:#3b82f6; color:white; }

        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:2000; align-items:center; justify-content:center; backdrop-filter:blur(8px); }
        .modal.show { display:flex; }
        .modal-content { background:white; border-radius:16px; width:95%; max-width:560px; max-height:90vh; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,0.3); animation:modalPop 0.4s ease-out; }
        @keyframes modalPop { from { opacity:0; transform:scale(0.9); } to { opacity:1; transform:scale(1); } }
        .modal-header { padding:1.5rem; background:var(--primary); color:white; display:flex; justify-content:space-between; align-items:center; }
        .modal-body { padding:1.5rem; max-height:60vh; overflow-y:auto; }
        .form-group { margin-bottom:1.2rem; }
        .form-label { display:block; margin-bottom:0.5rem; font-weight:600; color:#374151; }
        .form-input { width:100%; padding:0.75rem 1rem; border:1px solid #d1d5db; border-radius:8px; font-size:0.95rem; transition:border 0.3s; }
        .form-input:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(59,130,246,0.2); }

        @media (max-width: 768px) {
            aside { position:fixed; left:-280px; top:70px; height:calc(100vh - 70px); transition:left 0.4s; z-index:999; }
            aside.open { left:0; }
            .mobile-menu-btn { display:block; }
            main { padding:1rem; }
            .stats-grid { grid-template-columns:1fr; }
            .toolbar { flex-direction:column; align-items:stretch; }
            .search-box { min-width:auto; }
            table { font-size:0.85rem; }
            th, td { padding:0.75rem 0.5rem; }
            .action-group { flex-wrap:wrap; }
        }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:1rem;">
        <button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
        <h1><i class="fas fa-tachometer-alt"></i> ADMIN QUẢN TRỊ</h1>
    </div>
    <button class="btn btn-danger" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button>
</header>

<div id="app">
    <aside id="sidebar">
        <nav>
            <button class="menu-btn active" onclick="showPage('dashboard',this)"><i class="fas fa-home"></i> Tổng quan</button>
            <button class="menu-btn" onclick="showPage('students',this)"><i class="fas fa-users"></i> Quản lý Học viên</button>
            <button class="menu-btn" onclick="showPage('stats',this)"><i class="fas fa-chart-bar"></i> Thống kê</button>
            <button class="menu-btn" onclick="showPage('system',this)"><i class="fas fa-cogs"></i> Cài đặt</button>
        </nav>
    </aside>

    <main>
        <!-- Dashboard -->
        <div id="dashboard" class="page active">
            <div class="card">
                <h2 class="card-title"><i class="fas fa-shield-alt"></i> Hệ thống thi Luật Giao thông 2025</h2>
                <div class="stats-grid">
                    <div class="stat-box stat-blue"><div class="stat-label">Tổng học viên</div><div class="stat-value" id="dashTotal">00</div></div>
                    <div class="stat-box stat-green"><div class="stat-label">Hoạt động</div><div class="stat-value" id="dashActive">00</div></div>
                    <div class="stat-box stat-red"><div class="stat-label">Bị khóa</div><div class="stat-value" id="dashLock">00</div></div>
                    <div class="stat-box stat-purple"><div class="stat-label">Lượt thi hôm nay</div><div class="stat-value" id="dashToday">00</div></div>
                </div>
            </div>
        </div>

        <!-- Students Page - ĐÃ ĐƯỢC LÀM ĐẸP HOÀN TOÀN -->
        <div id="students" class="page">
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem; margin-bottom:1.5rem;">
                    <h3 class="card-title"><i class="fas fa-users"></i> Danh sách học viên</h3>
                    <div class="toolbar">
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" id="searchStudent" placeholder="Tìm tên, mã, đơn vị..." oninput="filterStudents()">
                        </div>
                        <button class="btn btn-success" onclick="openAddStudent()"><i class="fas fa-plus"></i> Thêm mới</button>
                        <button class="btn btn-primary" onclick="exportExcel()"><i class="fas fa-file-excel"></i> Xuất Excel</button>
                        <button class="btn btn-warning" onclick="openImportModal()"><i class="fas fa-file-import"></i> Nhập Excel</button>
                    </div>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th style="width:100px;">Mã HV</th>
                                <th>Họ và tên</th>
                                <th style="width:110px;">Ngày sinh</th>
                                <th>Đối tượng</th>
                                <th>Đơn vị / Lớp</th>
                                <th style="width:110px;">Trạng thái</th>
                                <th style="width:180px; text-align:center;">Hành động</th>
                            </tr>
                        </thead>
                        <tbody id="studentTable">
                            <tr><td colspan="7" style="text-align:center; padding:3rem; color:#94a3b8;">Đang tải dữ liệu...</td></tr>
                        </tbody>
                    </table>
                </div>
                <div style="margin-top:1rem; text-align:right; color:#64748b;">
                    Hiển thị: <strong id="studentCount">0</strong> học viên
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Modal Thêm/Sửa Học viên -->
<div class="modal" id="studentModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle"><i class="fas fa-user-plus"></i> Thêm học viên mới</h3>
            <button onclick="closeStudentModal()" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">×</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label class="form-label">Họ và tên <span style="color:red;">*</span></label>
                <input type="text" class="form-input" id="stName" placeholder="Nguyễn Văn A">
            </div>
            <div class="form-group">
                <label class="form-label">Ngày tháng năm sinh</label>
                <input type="date" class="form-input" id="stBirthday">
            </div>
            <div class="form-group">
                <label class="form-label">Đối tượng</label>
                <select class="form-input" id="stObjectType" onchange="toggleOtherObject()">
                    <option value="HV">Học viên (HV)</option>
                    <option value="SQ">Sĩ quan (SQ)</option>
                    <option value="CN">Chuyên nghiệp (CN)</option>
                    <option value="OTHER">Khác...</option>
                </select>
            </div>
            <div class="form-group" id="otherObjectGroup" style="display:none;">
                <input type="text" class="form-input" id="stObjectOther" placeholder="Tên đối tượng khác">
            </div>
            <div class="form-group">
                <label class="form-label">Đơn vị / Lớp <span style="color:red;">*</span></label>
                <input type="text" class="form-input" id="stUnit" placeholder="VD: Lớp A1, Phòng TM">
            </div>
        </div>
        <div style="padding:1.5rem; background:#f8fafc; display:flex; gap:1rem; justify-content:flex-end;">
            <button class="btn btn-outline" onclick="closeStudentModal()">Hủy</button>
            <button class="btn btn-success" onclick="saveStudent()"><i class="fas fa-save"></i> Lưu lại</button>
        </div>
    </div>
</div>

<script>
// === ẨN API KEY AN TOÀN (Khuyến nghị dùng Firebase Hosting + environment variables) ===
const firebaseConfig = {
    apiKey: "AIzaSyBGivIEsyBLsLs0CqRvwmwceG26duZbWlM",
    authDomain: "thi-luat-giao-thong.firebaseapp.com",
    projectId: "thi-luat-giao-thong"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Biến toàn cục
let allStudents = [];
let editingCode = null;

// Kiểm tra quyền admin
if(localStorage.getItem("userType") !== "admin") location.href = "index.html";

function showPage(id, btn) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    document.querySelectorAll(".menu-btn").forEach(b => b.classList.remove("active"));
    if(btn) btn.classList.add("active");
    if(id === 'students') loadStudents();
    if(id === 'dashboard') loadDashboard();
}

// Load danh sách học viên + kiểm tra trùng lặp
async function loadStudents() {
    const tbody = document.getElementById("studentTable");
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:3rem;">Đang tải...</td></tr>';
    
    const snapshot = await db.collection("students").orderBy("code").get();
    allStudents = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
    
    document.getElementById("dashTotal").innerText = allStudents.length.toString().padStart(2,'0');
    document.getElementById("dashActive").innerText = allStudents.filter(s => s.status === 'active').length.toString().padStart(2,'0');
    document.getElementById("dashLock").innerText = allStudents.filter(s => s.status === 'lock').length.toString().padStart(2,'0');
    
    filterStudents();
}

function filterStudents() {
    const keyword = document.getElementById("searchStudent").value.toLowerCase();
    const filtered = allStudents.filter(s => 
        s.name.toLowerCase().includes(keyword) || 
        s.code.includes(keyword) || 
        (s.unit && s.unit.toLowerCase().includes(keyword))
    );
    
    const tbody = document.getElementById("studentTable");
    tbody.innerHTML = '';
    document.getElementById("studentCount").innerText = filtered.length;
    
    if(filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:3rem; color:#94a3b8;">Không tìm thấy học viên nào</td></tr>';
        return;
    }
    
    filtered.forEach(st => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><b>${st.code}</b></td>
            <td><strong>${st.name}</strong></td>
            <td>${st.birthday ? new Date(st.birthday).toLocaleDateString('vi-VN') : '<span style="color:#94a3b8;">Chưa có</span>'}</td>
            <td><span class="badge badge-yellow">${st.object || 'Khác'}</span></td>
            <td>${st.unit || '-'}</td>
            <td style="text-align:center;">
                <select class="badge ${st.status==='active'?'badge-green':'badge-red'}" onchange="changeStatus('${st.code}', this.value)" style="padding:0.4rem 0.8rem; border:none; border-radius:50px;">
                    <option value="active" ${st.status==='active'?'selected':''}>Hoạt động</option>
                    <option value="lock" ${st.status==='lock'?'selected':''}>Khóa</option>
                </select>
            </td>
            <td style="text-align:center;">
                <div class="action-group">
                    <button class="action-btn btn-edit" title="Sửa" onclick="openEditStudent('${st.code}')"><i class="fas fa-edit"></i></button>
                    <button class="action-btn btn-reset" title="Reset mật khẩu" onclick="resetPassword('${st.code}')"><i class="fas fa-key"></i></button>
                    <button class="action-btn btn-delete" title="Xóa" onclick="confirmDelete('${st.code}', '${st.name}')"><i class="fas fa-trash"></i></button>
                </div>
            </td>
        `;
        tbody.appendChild(tr);
    });
}

// Kiểm tra trùng lặp 100% thông tin
function checkDuplicate(name, birthday, unit) {
    return allStudents.some(s => 
        s.name.trim().toLowerCase() === name.trim().toLowerCase() &&
        (!birthday || s.birthday === birthday) &&
        s.unit.trim().toLowerCase() === unit.trim().toLowerCase()
    );
}

async function saveStudent() {
    const name = document.getElementById("stName").value.trim();
    const birthday = document.getElementById("stBirthday").value;
    const unit = document.getElementById("stUnit").value.trim();
    const objType = document.getElementById("stObjectType").value;
    let objName = objType === "OTHER" ? document.getElementById("stObjectOther").value.trim() : 
                  objType === "HV" ? "Học viên" : objType === "SQ" ? "Sĩ quan" : "Chuyên nghiệp";

    if(!name || !unit) return alert("Vui lòng nhập đầy đủ họ tên và đơn vị!");

    if(checkDuplicate(name, birthday, unit)) {
        return alert("⚠️ Học viên này đã tồn tại (trùng tên + ngày sinh + đơn vị)!");
    }

    try {
        if(!editingCode) {
            // Tạo mã tự động
            const prefix = objType === "OTHER" ? "KH" : objType;
            const relevant = allStudents.filter(s => s.code && s.code.startsWith(prefix));
            const maxNum = relevant.length ? Math.max(...relevant.map(s => parseInt(s.code.slice(2) || 0))) : 0;
            const newCode = prefix + String(maxNum + 1).padStart(4, '0');
            
            await db.collection("students").doc(newCode).set({
                code: newCode,
                name, birthday, unit, object: objName, objectCode: objType,
                status: "active",
                nameSearch: name.toLowerCase()
            });
        } else {
            await db.collection("students").doc(editingCode).update({
                name, birthday, unit, object: objName, objectCode: objType,
                nameSearch: name.toLowerCase()
            });
        }
        closeStudentModal();
        loadStudents();
    } catch(e) { alert("Lỗi: " + e.message); }
}

// Reset mật khẩu học viên về 123456
async function resetPassword(code) {
    if(confirm(`Đặt lại mật khẩu học viên ${code} về "123456"?`)) {
        await db.collection("students").doc(code).update({ password: "123456" });
        alert("Đã reset mật khẩu thành công!");
    }
}

// Xuất Excel
function exportExcel() {
    const data = allStudents.map(s => ({
        "Mã HV": s.code,
        "Họ tên": s.name,
        "Ngày sinh": s.birthday ? new Date(s.birthday).toLocaleDateString('vi-VN') : "",
        "Đối tượng": s.object,
        "Đơn vị": s.unit,
        "Trạng thái": s.status === 'active' ? 'Hoạt động' : 'Bị khóa'
    }));
    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "HocVien");
    XLSX.writeFile(wb, "Danh_Sach_Hoc_Vien.xlsx");
}

// Các hàm khác giữ nguyên (openAddStudent, openEditStudent, logout, v.v.)
function openAddStudent() { editingCode = null; document.getElementById("modalTitle").innerHTML = '<i class="fas fa-user-plus"></i> Thêm học viên mới'; document.getElementById("studentModal").classList.add("show"); document.getElementById("stName").value = ""; document.getElementById("stBirthday").value = ""; document.getElementById("stUnit").value = ""; }
function openEditStudent(code) { 
    const st = allStudents.find(s => s.code === code);
    editingCode = code;
    document.getElementById("modalTitle").innerHTML = `<i class="fas fa-user-edit"></i> Sửa học viên (${code})`;
    document.getElementById("stName").value = st.name;
    document.getElementById("stBirthday").value = st.birthday || "";
    document.getElementById("stUnit").value = st.unit;
    document.getElementById("stObjectType").value = st.objectCode || "HV";
    toggleOtherObject();
    document.getElementById("studentModal").classList.add("show");
}
function closeStudentModal() { document.getElementById("studentModal").classList.remove("show"); }
function toggleOtherObject() { document.getElementById("otherObjectGroup").style.display = document.getElementById("stObjectType").value === "OTHER" ? "block" : "none"; }
function logout() { localStorage.clear(); location.href = "index.html"; }

async function changeStatus(code, status) {
    await db.collection("students").doc(code).update({ status });
}

async function confirmDelete(code, name) {
    if(confirm(`Xóa vĩnh viễn học viên ${name} (${code}) và toàn bộ lịch sử thi?`)) {
        await db.collection("students").doc(code).delete();
        const logs = await db.collection("exam_logs").where("studentCode", "==", code).get();
        const batch = db.batch();
        logs.forEach(doc => batch.delete(doc.ref));
        await batch.commit();
        loadStudents();
    }
}

loadDashboard();
</script>
