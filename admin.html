<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>ADMIN | Hệ thống thi luật giao thông</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
 margin:0;
 font-family:Arial,Helvetica,sans-serif;
 background:#eef2f6;
}

/* ===== HEADER ===== */
header{
 background:linear-gradient(90deg,#1d3557,#264a8a);
 color:white;
 padding:18px 28px;
 display:flex;
 justify-content:space-between;
 align-items:center;
 box-shadow:0 4px 14px rgba(0,0,0,.25);
}
header b{font-size:18px}
header button{
 background:#e63946;
 border:none;
 border-radius:8px;
 padding:8px 14px;
 color:white;
 cursor:pointer;
}

/* ===== LAYOUT ===== */
#layout{
 display:flex;
 min-height:calc(100vh - 70px);
}

/* ===== SIDEBAR ===== */
aside{
 width:260px;
 background:#ffffff;
 box-shadow:4px 0 15px rgba(0,0,0,.08);
 padding:22px;
}
aside h3{
 margin-top:0;
 margin-bottom:14px;
 color:#1d3557;
}
.menu button{
 width:100%;
 margin-bottom:10px;
 padding:12px 14px;
 border:none;
 border-radius:10px;
 background:#f1f4fb;
 cursor:pointer;
 text-align:left;
 font-size:14px;
}
.menu button:hover,
.menu button.active{
 background:#dbe6ff;
}

/* ===== MAIN ===== */
main{
 flex:1;
 padding:28px;
}

/* ===== BOX ===== */
.box{
 background:white;
 padding:20px;
 border-radius:14px;
 box-shadow:0 4px 14px rgba(0,0,0,.12);
 margin-bottom:20px;
}
.box h3{
 margin-top:0;
 color:#1d3557;
}

/* ===== TOOLBAR ===== */
.toolbar{
 display:flex;
 gap:12px;
 margin-bottom:16px;
 flex-wrap:wrap;
}
.toolbar input,
.toolbar select{
 padding:10px;
 border-radius:8px;
 border:1px solid #ccc;
}
.toolbar button{
 padding:10px 16px;
 border:none;
 border-radius:8px;
 background:#198754;
 color:white;
 cursor:pointer;
}

/* ===== TABLE ===== */
table{
 width:100%;
 border-collapse:collapse;
 font-size:14px;
}
th,td{
 padding:10px;
 border-bottom:1px solid #eee;
}
th{
 background:#f1f4fb;
 color:#1d3557;
 cursor:pointer;
}

/* ===== ACTION ===== */
.action-btn{
 border:none;
 padding:6px 10px;
 border-radius:6px;
 cursor:pointer;
}
.edit{background:#457b9d;color:white}
.del{background:#e63946;color:white}

/* ===== PAGE ===== */
.page{display:none}
.page.active{display:block}

/* ===== STATS ===== */
.statRow{
 display:flex;
 gap:14px;
 margin-bottom:18px;
}
.statBox{
 flex:1;
 background:#f1f4fb;
 border-radius:12px;
 padding:14px;
 text-align:center;
}
.statBox.pass{background:#e8f7f0}
.statBox.fail{background:#fdecea}
.statBox b{font-size:22px}

.medal{font-size:18px}
</style>
</head>

<body>

<header>
 <b>🛠️ ADMIN – HỆ THỐNG THI LUẬT GIAO THÔNG</b>
 <button onclick="logout()">Đăng xuất</button>
</header>

<div id="layout">

<!-- ===== SIDEBAR ===== -->
<aside>
 <h3>📂 Quản trị</h3>
 <div class="menu">
  <button class="active" onclick="showPage('dashboard',this)">📊 Tổng quan</button>
  <button onclick="showPage('students',this)">👤 Học viên</button>
  <button onclick="showPage('stats',this)">📈 Thống kê</button>
 </div>
</aside>

<!-- ===== MAIN ===== -->
<main>

<!-- DASHBOARD -->
<div id="dashboard" class="page active">
 <div class="box">
  <h3>📊 Tổng quan hệ thống</h3>
  <p>✔ Quản lý học viên</p>
  <p>✔ Theo dõi kết quả thi</p>
  <p>✔ Thống kê – xếp hạng</p>
 </div>
</div>

<!-- STUDENTS -->
<div id="students" class="page">
 <div class="box">
  <h3>👤 Quản lý học viên</h3>

  <div class="toolbar">
   <input id="searchStudent" placeholder="🔍 Tìm theo mã hoặc tên">
   <button onclick="openAddStudent()">➕ Thêm học viên</button>
  </div>

  <table>
   <thead>
    <tr>
     <th>Mã HV</th>
     <th>Họ tên</th>
     <th>Thao tác</th>
    </tr>
   </thead>
   <tbody id="studentTable"></tbody>
  </table>
 </div>
</div>

<!-- STATS -->
<div id="stats" class="page">
 <div class="box">
  <h3>📈 Thống kê kết quả thi</h3>

  <div class="statRow">
   <div class="statBox">
    Tổng lượt thi<br><b id="sumTotal">0</b>
   </div>
   <div class="statBox pass">
    Đạt<br><b id="sumPass">0</b>
   </div>
   <div class="statBox fail">
    Không đạt<br><b id="sumFail">0</b>
   </div>
  </div>

  <div class="toolbar">
   <select id="filterTime">
    <option value="all">Tất cả</option>
    <option value="week">Tuần này</option>
    <option value="month">Tháng này</option>
   </select>
   <button onclick="loadStats()">Lọc</button>
  </div>

  <table>
   <thead>
    <tr>
     <th>🏅</th>
     <th>Mã HV</th>
     <th>Họ tên</th>
     <th onclick="sortBy('total')">Lượt thi</th>
     <th onclick="sortBy('pass')">Đạt</th>
     <th onclick="sortBy('rate')">% đạt</th>
     <th>Gần nhất</th>
    </tr>
   </thead>
   <tbody id="statTable"></tbody>
  </table>
 </div>
</div>

</main>
</div>

<!-- ===== FIREBASE ===== -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
 apiKey:"AIzaSyBGivIEsyBLsLs0CqRvwmwceG26duZbWlM",
 authDomain:"thi-luat-giao-thong.firebaseapp.com",
 projectId:"thi-luat-giao-thong"
});
const db=firebase.firestore();

/* LOGIN */
if(localStorage.getItem("userType")!=="admin") location.href="index.html";

/* MENU */
function showPage(id,btn){
 document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
 document.getElementById(id).classList.add("active");
 document.querySelectorAll(".menu button").forEach(b=>b.classList.remove("active"));
 btn.classList.add("active");
}

/* LOGOUT */
function logout(){
 localStorage.clear();
 location.href="index.html";
}

/* ===== STUDENTS ===== */
function loadStudents(keyword=""){
 studentTable.innerHTML="";
 db.collection("students").get().then(snap=>{
  snap.forEach(doc=>{
   const s=doc.data();
   const key=keyword.toLowerCase();
   if(keyword && !s.code.toLowerCase().includes(key) && !s.nameSearch?.includes(key)) return;
   studentTable.innerHTML+=`
    <tr>
     <td>${s.code}</td>
     <td>${s.name}</td>
     <td>
      <button class="action-btn edit" onclick="editStudent('${doc.id}')">✏️</button>
      <button class="action-btn del" onclick="deleteStudent('${doc.id}')">🗑️</button>
     </td>
    </tr>`;
  });
 });
}
loadStudents();
searchStudent.oninput=e=>loadStudents(e.target.value);

function openAddStudent(){
 const name=prompt("Nhập họ tên:");
 if(!name) return;
 db.collection("students").get().then(snap=>{
  const num=snap.size+1;
  const code="HV"+String(num).padStart(3,"0");
  db.collection("students").doc(code).set({
   code,name,
   nameSearch:name.toLowerCase().replace(/\s+/g,"")
  }).then(loadStudents);
 });
}
function editStudent(id){
 db.collection("students").doc(id).get().then(d=>{
  const n=prompt("Sửa tên:",d.data().name);
  if(!n) return;
  db.collection("students").doc(id).update({
   name:n,
   nameSearch:n.toLowerCase().replace(/\s+/g,"")
  }).then(loadStudents);
 });
}
function deleteStudent(id){
 if(confirm("Xóa học viên?"))
  db.collection("students").doc(id).delete().then(loadStudents);
}

/* ===== STATS ===== */
let statData=[],sortKey="rate",sortDir="desc";

function loadStats(){
 statTable.innerHTML="";
 let total=0,pass=0;
 statData=[];
 const students={};

 db.collection("students").get().then(snap=>{
  snap.forEach(d=>{
   students[d.data().code]={...d.data(),total:0,pass:0,last:null};
  });

  db.collection("exam_logs").get().then(logs=>{
   logs.forEach(d=>{
    const l=d.data();
    const hv=l.studentCode||("HV"+l.code);
    if(!students[hv]) return;

    const t=l.createdAt?.toDate();
    if(filterTime.value==="week" && t && Date.now()-t>7*86400000) return;
    if(filterTime.value==="month" && t && new Date().getMonth()!=t.getMonth()) return;

    total++; l.pass&&pass++;
    students[hv].total++; l.pass&&students[hv].pass++;
    if(!students[hv].last||t>students[hv].last) students[hv].last=t;
   });

   sumTotal.innerText=total;
   sumPass.innerText=pass;
   sumFail.innerText=total-pass;

   Object.values(students).forEach(s=>{
    if(!s.total) return;
    s.rate=Math.round(s.pass/s.total*100);
    statData.push(s);
   });

   renderStats();
  });
 });
}

function sortBy(k){
 sortDir=(sortKey===k&&sortDir==="desc")?"asc":"desc";
 sortKey=k; renderStats();
}

function renderStats(){
 statTable.innerHTML="";
 statData.sort((a,b)=>sortDir==="desc"?b[sortKey]-a[sortKey]:a[sortKey]-b[sortKey]);
 statData.forEach((s,i)=>{
  const medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":"";
  statTable.innerHTML+=`
   <tr>
    <td class="medal">${medal}</td>
    <td>${s.code}</td>
    <td>${s.name}</td>
    <td>${s.total}</td>
    <td>${s.pass}</td>
    <td>${s.rate}%</td>
    <td>${s.last?s.last.toLocaleString():""}</td>
   </tr>`;
 });
}
</script>

</body>
</html>
