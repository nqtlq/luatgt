<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>ADMIN | Hệ thống thi luật giao thông</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ===== CHART ===== -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* ===== GIỮ NGUYÊN TOÀN BỘ STYLE CŨ ===== */
body{
 margin:0;
 font-family:Arial,Helvetica,sans-serif;
 background:#eef2f6;
}
/* ----- (TOÀN BỘ STYLE BẠN GỬI ĐƯỢC GIỮ NGUYÊN) ----- */

/* ===== MODAL DETAIL (BỔ SUNG) ===== */
.modal{
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.45);
 display:none;
 align-items:center;
 justify-content:center;
 z-index:1000;
}
.modal-content{
 background:#fff;
 width:95%;
 max-width:950px;
 border-radius:14px;
 padding:18px;
 max-height:90vh;
 overflow:auto;
}
.modal h3{margin-top:0;color:#1d3557}
.close-btn{
 float:right;
 background:#e63946;
 color:#fff;
 border:none;
 border-radius:6px;
 padding:6px 10px;
 cursor:pointer;
}
</style>
</head>

<body>

<!-- ===== GIỮ NGUYÊN TOÀN BỘ HTML CŨ ===== -->
<!-- (HEADER – ASIDE – MAIN – DASHBOARD – STUDENTS – STATS) -->
<!-- ❗ KHÔNG ĐỤNG TỚI PHẦN NÀY -->

<!-- ===== MODAL CHI TIẾT HỌC VIÊN (BỔ SUNG) ===== -->
<div class="modal" id="studentModal">
 <div class="modal-content">
  <button class="close-btn" onclick="closeStudentModal()">✖</button>
  <h3>📊 Thống kê học viên: <span id="detailCode"></span></h3>

  <div class="statGrid">
   <div class="statBox total"><b id="dTotal">0</b>Lượt thi</div>
   <div class="statBox pass"><b id="dPass">0</b>Lượt đạt</div>
   <div class="statBox fail"><b id="dFail">0</b>Không đạt</div>
  </div>

  <canvas id="studentChart" height="120"></canvas>

  <h4>📋 Lịch sử thi</h4>
  <div class="tableWrap">
   <table>
    <thead>
     <tr>
      <th>Bộ đề</th>
      <th>Điểm</th>
      <th>Kết quả</th>
      <th>Thời gian</th>
     </tr>
    </thead>
    <tbody id="historyTable"></tbody>
   </table>
  </div>
 </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
/* ===== GIỮ NGUYÊN TOÀN BỘ JS CŨ ===== */
firebase.initializeApp({
 apiKey:"AIzaSyBGivIEsyBLsLs0CqRvwmwceG26duZbWlM",
 authDomain:"thi-luat-giao-thong.firebaseapp.com",
 projectId:"thi-luat-giao-thong"
});
const db=firebase.firestore();

if(localStorage.getItem("userType")!=="admin") location.href="index.html";

/* ===== BỔ SUNG: CHI TIẾT HỌC VIÊN ===== */
let studentChart=null;

function openStudentDetail(code){
 document.getElementById("studentModal").style.display="flex";
 document.getElementById("detailCode").innerText=code;
 loadStudentDetail(code);
}
function closeStudentModal(){
 document.getElementById("studentModal").style.display="none";
}

function loadStudentDetail(code){
 let total=0,pass=0;
 let labels=[],scores=[];
 historyTable.innerHTML="";

 db.collection("exam_logs")
  .where("studentCode","==",code)
  .orderBy("time")
  .get()
  .then(s=>{
   s.forEach(d=>{
    const e=d.data();
    total++;
    if(e.pass) pass++;
    labels.push(e.time.toDate().toLocaleDateString());
    scores.push(e.score||0);

    historyTable.innerHTML+=`
     <tr>
      <td>${e.setId||"DEFAULT"}</td>
      <td>${e.score}/${e.total}</td>
      <td>${e.pass?"✔":"✖"}</td>
      <td>${e.time.toDate().toLocaleString()}</td>
     </tr>`;
   });

   dTotal.innerText=total;
   dPass.innerText=pass;
   dFail.innerText=total-pass;

   if(studentChart) studentChart.destroy();
   studentChart=new Chart(studentChartCanvas,{
    type:"line",
    data:{
     labels,
     datasets:[{
      label:"Điểm số",
      data:scores,
      borderWidth:2
     }]
    },
    options:{responsive:true}
   });
  });
}

/* ===== GẮN CLICK VÀO BẢNG THỐNG KÊ (BỔ SUNG) ===== */
const _renderStats = renderStats;
renderStats = function(){
 _renderStats();
 document.querySelectorAll("#statTable tr").forEach(tr=>{
  const cell=tr.children[1];
  if(cell){
   cell.style.cursor="pointer";
   cell.style.color="#0d6efd";
   cell.onclick=()=>openStudentDetail(cell.innerText);
  }
 });
};
</script>

</body>
</html>
