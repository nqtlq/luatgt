<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Admin | Hệ thống thi luật giao thông</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
 margin:0;
 font-family:Arial,Helvetica,sans-serif;
 background:#eef2f6;
}

/* ===== HEADER ===== */
header{
 background:linear-gradient(90deg,#1d3557,#264a8a);
 color:white;
 padding:18px 28px;
 display:flex;
 justify-content:space-between;
 align-items:center;
 box-shadow:0 4px 14px rgba(0,0,0,.25);
}
header b{font-size:18px}
header button{
 background:#e63946;
 border:none;
 border-radius:8px;
 padding:8px 14px;
 color:white;
 cursor:pointer;
}

/* ===== LAYOUT ===== */
#layout{
 display:flex;
 min-height:100vh;
}

/* ===== SIDEBAR ===== */
aside{
 width:240px;
 background:#ffffff;
 box-shadow:4px 0 15px rgba(0,0,0,.08);
 padding:20px;
}
aside h3{
 margin-top:0;
 color:#1d3557;
}
.menu button{
 width:100%;
 margin-bottom:10px;
 padding:12px;
 border:none;
 border-radius:10px;
 background:#f1f4fb;
 cursor:pointer;
 text-align:left;
 font-size:14px;
}
.menu button:hover{background:#dbe6ff}

/* ===== MAIN ===== */
main{
 flex:1;
 padding:28px;
}

/* ===== BOX ===== */
.box{
 background:white;
 padding:20px;
 border-radius:14px;
 box-shadow:0 4px 14px rgba(0,0,0,.12);
}
.box h3{
 margin-top:0;
 color:#1d3557;
}

/* ===== STUDENT TABLE ===== */
table{
 width:100%;
 border-collapse:collapse;
 font-size:14px;
}
th,td{
 padding:10px;
 border-bottom:1px solid #eee;
 text-align:left;
}
th{
 background:#f1f4fb;
 color:#1d3557;
}

.action-btn{
 border:none;
 padding:6px 10px;
 border-radius:6px;
 cursor:pointer;
}
.edit{background:#457b9d;color:white}
.del{background:#e63946;color:white}

/* ===== INPUT ===== */
input{
 padding:10px;
 border-radius:8px;
 border:1px solid #ccc;
}
.toolbar{
 display:flex;
 gap:12px;
 margin-bottom:16px;
}
.toolbar button{
 padding:10px 16px;
 border:none;
 border-radius:8px;
 background:#198754;
 color:white;
 cursor:pointer;
}
</style>
</head>

<body>

<header>
 <b>🛠️ ADMIN – HỆ THỐNG THI LUẬT GIAO THÔNG</b>
 <button onclick="logout()">Đăng xuất</button>
</header>

<div id="layout">

 <!-- ===== SIDEBAR ===== -->
 <aside>
  <h3>📂 Chức năng</h3>
  <div class="menu">
   <button onclick="showPage('students')">👤 Quản lý học viên</button>
  </div>
 </aside>

 <!-- ===== MAIN ===== -->
 <main>

  <!-- ===== STUDENTS PAGE ===== -->
  <div id="students" class="page">

   <div class="box">
    <h3>👤 Quản lý học viên</h3>

    <div class="toolbar">
     <input id="searchStudent" placeholder="🔍 Tìm theo mã hoặc tên" style="flex:1">
     <button onclick="addStudent()">➕ Thêm học viên</button>
    </div>

    <table>
     <thead>
      <tr>
       <th>Mã học viên</th>
       <th>Họ tên</th>
       <th width="160">Thao tác</th>
      </tr>
     </thead>
     <tbody id="studentTable"></tbody>
    </table>

   </div>

  </div>

 </main>
</div>

<!-- ===== FIREBASE ===== -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
/* ===== FIREBASE INIT ===== */
firebase.initializeApp({
 apiKey:"AIzaSyBGivIEsyBLsLs0CqRvwmwceG26duZbWlM",
 authDomain:"thi-luat-giao-thong.firebaseapp.com",
 projectId:"thi-luat-giao-thong"
});
const db = firebase.firestore();

/* ===== LOGIN CHECK ===== */
if(localStorage.getItem("userType")!=="admin"){
 location.href="index.html";
}

/* ===== LOGOUT ===== */
function logout(){
 localStorage.clear();
 location.href="index.html";
}

/* ===== LOAD STUDENTS ===== */
function loadStudents(keyword=""){
 studentTable.innerHTML="";

 db.collection("students").get().then(snap=>{
  snap.forEach(doc=>{
   const s = doc.data();
   const key = keyword.toLowerCase();

   if(keyword &&
      !s.code.toLowerCase().includes(key) &&
      !s.nameSearch?.includes(key)) return;

   studentTable.innerHTML+=`
    <tr>
     <td>${s.code}</td>
     <td>${s.name}</td>
     <td>
      <button class="action-btn edit" onclick="editStudent('${doc.id}')">✏️</button>
      <button class="action-btn del" onclick="deleteStudent('${doc.id}')">🗑️</button>
     </td>
    </tr>
   `;
  });
 });
}
loadStudents();

/* ===== SEARCH ===== */
searchStudent.oninput = e=>{
 loadStudents(e.target.value);
};

/* ===== ADD STUDENT ===== */
function addStudent(){
 const name = prompt("Nhập họ tên học viên:");
 if(!name) return;

 db.collection("students").get().then(snap=>{
  const num = snap.size + 1;
  const code = "HV" + String(num).padStart(3,"0");

  db.collection("students").doc(code).set({
   code,
   codeNumber:num,
   name,
   nameSearch:name.toLowerCase().replace(/\s+/g,""),
   createdAt:firebase.firestore.FieldValue.serverTimestamp()
  }).then(loadStudents);
 });
}

/* ===== EDIT ===== */
function editStudent(id){
 db.collection("students").doc(id).get().then(doc=>{
  const s = doc.data();
  const newName = prompt("Sửa tên học viên:", s.name);
  if(!newName) return;

  db.collection("students").doc(id).update({
   name:newName,
   nameSearch:newName.toLowerCase().replace(/\s+/g,"")
  }).then(loadStudents);
 });
}

/* ===== DELETE ===== */
function deleteStudent(id){
 if(!confirm("Xóa học viên này?")) return;
 db.collection("students").doc(id).delete().then(loadStudents);
}
</script>

</body>
</html>
