<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>ADMIN | Hệ thống thi luật giao thông</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* GIỮ NGUYÊN TOÀN BỘ CẤU TRÚC CSS CỦA ADMIN_COMPLETE */
        body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: #eef2f6; }
        .status { padding: 5px 8px; border-radius: 8px; font-size: 12px; font-weight: bold; border: 1px solid #ccc; cursor: pointer;}
        .activeStatus { background: #d1e7dd; color: #0f5132 }
        .lockStatus { background: #f8d7da; color: #842029 }
        .rate { padding: 5px 8px; border-radius: 7px; font-weight: bold; display: inline-block; font-size: 12px; }
        .good { background: #d1e7dd; color: #0f5132 }
        .bad { background: #f8d7da; color: #842029 }

        header { background: #1d3557; color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        #layout { display: flex; min-height: calc(100vh - 60px); }
        aside { width: 220px; background: white; border-right: 1px solid #ddd; padding: 15px; flex-shrink: 0; }
        .menu button { width: 100%; padding: 12px; margin-bottom: 5px; border: none; border-radius: 8px; background: transparent; text-align: left; cursor: pointer; color: #555; font-size: 14px; }
        .menu button.active { background: #e7f1ff; color: #0d6efd; font-weight: bold; }
        main { flex: 1; padding: 20px; overflow-y: auto; }
        .box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .statGrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .statCard { padding: 20px; border-radius: 12px; color: white; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; font-size: 14px; }
        th { background: #f8f9fa; color: #666; font-weight: 600; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 500px; }
    </style>
</head>
<body>

<header>
    <b>🛡️ QUẢN TRỊ VIÊN HỆ THỐNG</b>
    <button onclick="location.reload()" style="background:#457b9d; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer">Làm mới dữ liệu</button>
</header>

<div id="layout">
    <aside>
        <div class="menu">
            <button class="active" onclick="showPage('dashboard', this)">📊 Tổng quan</button>
            <button onclick="showPage('students', this)">👤 Học viên</button>
            <button onclick="showPage('stats', this)">📈 Thống kê thi</button>
        </div>
    </aside>

    <main>
        <div id="dashboard" class="page">
            <div class="statGrid">
                <div class="statCard" style="background:#0d6efd">Tổng học viên <h2 id="totalCount">0</h2></div>
                <div class="statCard" style="background:#198754">Đang hoạt động <h2 id="activeCount">0</h2></div>
                <div class="statCard" style="background:#dc3545">Đã khóa <h2 id="lockCount">0</h2></div>
            </div>
            <div class="box">
                <h3>🔔 Hoạt động hệ thống</h3>
                <p>Số lượt thi đã thực hiện: <b id="examCount">0</b></p>
            </div>
        </div>

        <div id="students" class="page" style="display:none">
            <div class="box">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px">
                    <h3 style="margin:0">Danh sách học viên</h3>
                    <div>
                        <button onclick="openImportModal()" style="background:#6c757d; color:white; border:none; padding:8px 15px; border-radius:6px; cursor:pointer; margin-right:5px">📥 Nhập Excel</button>
                        <button onclick="openStudentModal('add')" style="background:#198754; color:white; border:none; padding:8px 15px; border-radius:6px; cursor:pointer">➕ Thêm mới</button>
                    </div>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Mã số</th>
                            <th>Họ tên</th>
                            <th>Đơn vị</th>
                            <th>Trạng thái</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="studentTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="stats" class="page" style="display:none">
            <div class="box">
                <h3>📈 Xếp hạng và Tỷ lệ</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Học viên</th>
                            <th>Lượt thi</th>
                            <th>Lượt đạt</th>
                            <th>Tỷ lệ</th>
                        </tr>
                    </thead>
                    <tbody id="rankingTableBody"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<div id="studentModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Thông tin học viên</h3>
        <input type="text" id="stName" placeholder="Họ và tên" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:6px">
        <input type="text" id="stUnit" placeholder="Đơn vị" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:6px">
        <select id="stObject" style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ddd; border-radius:6px">
            <option value="HV">Học viên (HV)</option>
            <option value="SQ">Sĩ quan (SQ)</option>
            <option value="CN">Chuyên nghiệp (CN)</option>
        </select>
        <div style="display:flex; justify-content:flex-end; gap:10px">
            <button onclick="closeStudentModal()" style="padding:8px 15px; border:none; border-radius:5px">Hủy</button>
            <button onclick="saveStudent()" style="background:#0d6efd; color:white; padding:8px 15px; border:none; border-radius:5px">Lưu dữ liệu</button>
        </div>
    </div>
</div>

<script>
    // 1. ĐỒNG BỘ CẤU HÌNH FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyBGivIEsyBLsLs0CqRvwmwceG26duZbWlM",
        authDomain: "thi-luat-giao-thong.firebaseapp.com",
        projectId: "thi-luat-giao-thong"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let allStudents = [];

    // 2. TẢI DỮ LIỆU TỪ FIRESTORE
    async function fetchAllData() {
        const studentSnap = await db.collection("students").get();
        allStudents = [];
        let counts = { total: 0, active: 0, lock: 0 };
        const tbody = document.getElementById("studentTableBody");
        tbody.innerHTML = "";

        studentSnap.forEach(doc => {
            const s = doc.data();
            allStudents.push(s);
            counts.total++;
            if(s.status === 'active') counts.active++; else counts.lock++;

            tbody.innerHTML += `
                <tr>
                    <td><b>${s.code}</b></td>
                    <td>${s.name}</td>
                    <td>${s.unit}</td>
                    <td><span class="status ${s.status === 'active' ? 'activeStatus' : 'lockStatus'}" onclick="toggleStatus('${s.code}', '${s.status}')">${s.status === 'active' ? 'Hoạt động' : 'Đã khóa'}</span></td>
                    <td><button onclick="deleteStudent('${s.code}')" style="color:red; background:none; border:none; cursor:pointer">Xóa</button></td>
                </tr>
            `;
        });

        document.getElementById("totalCount").innerText = counts.total;
        document.getElementById("activeCount").innerText = counts.active;
        document.getElementById("lockCount").innerText = counts.lock;

        const examSnap = await db.collection("exam_logs").get();
        document.getElementById("examCount").innerText = examSnap.size;
        renderRanking(examSnap);
    }

    // 3. LOGIC SINH MÃ TỰ ĐỘNG (ĐỒNG BỘ TỪ ADMIN_FIXED)
    async function generateNextCode(prefix) {
        const sameType = allStudents.filter(s => s.code.startsWith(prefix));
        if (sameType.length === 0) return prefix + "0001";
        const nums = sameType.map(s => parseInt(s.code.replace(prefix, "")) || 0);
        const nextNum = Math.max(...nums) + 1;
        return prefix + nextNum.toString().padStart(4, '0');
    }

    // 4. LƯU HỌC VIÊN
    async function saveStudent() {
        const name = document.getElementById("stName").value.trim();
        const unit = document.getElementById("stUnit").value.trim();
        const type = document.getElementById("stObject").value;

        if(!name || !unit) return alert("Vui lòng điền đủ thông tin!");

        try {
            const code = await generateNextCode(type);
            await db.collection("students").doc(code).set({
                code, name, unit, status: "active", objectCode: type, createdAt: new Date()
            });
            alert("Thêm thành công: " + code);
            closeStudentModal();
            fetchAllData();
        } catch (e) { alert("Lỗi: " + e.message); }
    }

    // 5. THỐNG KÊ KẾT QUẢ
    function renderRanking(examSnap) {
        const stats = {};
        examSnap.forEach(doc => {
            const e = doc.data();
            if(!stats[e.studentCode]) stats[e.studentCode] = { name: e.studentName, total: 0, pass: 0 };
            stats[e.studentCode].total++;
            if(e.pass) stats[e.studentCode].pass++;
        });

        const rBody = document.getElementById("rankingTableBody");
        rBody.innerHTML = Object.entries(stats).map(([code, data]) => {
            const rate = Math.round((data.pass / data.total) * 100);
            return `
                <tr>
                    <td>${data.name} <br><small>${code}</small></td>
                    <td>${data.total}</td>
                    <td>${data.pass}</td>
                    <td><span class="rate ${rate >= 80 ? 'good' : 'bad'}">${rate}%</span></td>
                </tr>
            `;
        }).join("");
    }

    // ĐIỀU HƯỚNG TRANG
    function showPage(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.menu button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    async function toggleStatus(code, cur) {
        await db.collection("students").doc(code).update({ status: cur === 'active' ? 'locked' : 'active' });
        fetchAllData();
    }

    async function deleteStudent(code) {
        if(confirm("Bạn muốn xóa học viên " + code + "?")) {
            await db.collection("students").doc(code).delete();
            fetchAllData();
        }
    }

    function openStudentModal() { document.getElementById("studentModal").classList.add("show"); }
    function closeStudentModal() { document.getElementById("studentModal").classList.remove("show"); }

    window.onload = fetchAllData;
</script>
</body>
</html>
