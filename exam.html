<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HỆ THỐNG THI LUẬT GIAO THÔNG ĐƯỜNG BỘ</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* ===== GIỮ NGUYÊN CSS GỐC ===== */
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#eef2f6;}
header{background:linear-gradient(90deg,#1d3557,#264a8a);color:white;padding:18px 30px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 15px rgba(0,0,0,.25);}
header b{font-size:18px}
#logoutBtn{background:#e63946;color:white;border:none;border-radius:8px;padding:10px 16px;cursor:pointer;}
#container{max-width:1200px;margin:30px auto;padding:0 20px;}
#welcome{font-size:22px;margin-bottom:25px;color:#1d3557;}
.grid{display:grid;grid-template-columns:1fr 2.2fr;gap:25px;}
@media(max-width:768px){.grid{grid-template-columns:1fr;}}
.box{background:white;padding:20px;border-radius:14px;box-shadow:0 4px 15px rgba(0,0,0,.12);}
.box h3{margin-top:0;color:#1d3557;}
.info p{margin:8px 0}
.statRow{display:flex;gap:15px;margin-bottom:15px;}
.statBox{flex:1;text-align:center;padding:16px;border-radius:12px;color:white;}
.statBox b{font-size:26px;display:block;margin-top:4px;}
.bg1{background:#457b9d}.bg2{background:#2a9d8f}.bg3{background:#e63946}
.chartBox{height:240px;margin-top:10px;}
table{width:100%;border-collapse:collapse;font-size:14px;margin-top:15px;}
th,td{padding:10px;text-align:center;border-bottom:1px solid #eee;}
th{background:#f1f4fb;color:#1d3557;}
.pass{color:#2a9d8f;font-weight:bold}
.fail{color:#e63946;font-weight:bold}
.actions{display:flex;justify-content:flex-end;gap:14px;margin-top:15px;flex-wrap:wrap;}
.actionBtn{border:none;border-radius:10px;padding:14px 20px;font-size:15px;cursor:pointer;min-width:200px;color:white;}
#detailBtn{background:#457b9d}
#startBtn{background:#2a9d8f}
#empty{color:#888;text-align:center;margin-top:15px;font-style:italic;}
</style>
</head>

<body>

<header>
 <b>HỆ THỐNG THI LUẬT GIAO THÔNG ĐƯỜNG BỘ</b>
 <button id="logoutBtn">Đăng xuất</button>
</header>

<div id="container">
 <div id="welcome">Xin chào, <b id="studentName"></b> 👋</div>

 <div class="grid">
  <div class="box info">
   <h3>📘 Thông tin học viên</h3>
   <p><b>Mã học viên:</b> <span id="infoCode"></span></p>
   <p><b>Họ và tên:</b> <span id="infoName"></span></p>
   <p><b>Đơn vị:</b> <span id="infoUnit"></span></p>
   <p><b>Trạng thái:</b> <span id="infoStatus"></span></p>
  </div>

  <div class="box">
   <h3>📊 Thống kê kết quả</h3>

   <div class="statRow">
    <div class="statBox bg1">Tổng lượt thi<b id="totalExam">0</b></div>
    <div class="statBox bg2">Đạt<b id="passExam">0</b></div>
    <div class="statBox bg3">Không đạt<b id="failExam">0</b></div>
   </div>

   <div class="chartBox">
    <canvas id="chart"></canvas>
   </div>

   <div id="empty"></div>

   <table id="resultTable" style="display:none;">
    <thead>
     <tr><th>#</th><th>Thời gian</th><th>Kết quả</th></tr>
    </thead>
    <tbody id="logTable"></tbody>
   </table>

   <div class="actions">
    <button id="detailBtn" class="actionBtn">📄 Thống kê chi tiết</button>
    <button id="startBtn" class="actionBtn">▶ Làm bài kiểm tra</button>
   </div>
  </div>
 </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
 apiKey:"AIzaSyBGivIEsyBLsLs0CqRvwmwceG26duZbWlM",
 authDomain:"thi-luat-giao-thong.firebaseapp.com",
 projectId:"thi-luat-giao-thong"
});
const db=firebase.firestore();

/* LOGIN CHECK */
if(localStorage.getItem("userType")!=="student"){
 location.href="index.html";
}

/* STUDENT CODE */
const code=(localStorage.getItem("studentCode")||"").replace(/\D/g,"").padStart(3,"0");

/* LOAD STUDENT */
db.collection("students").where("code","==",code).limit(1).get().then(snap=>{
 if(snap.empty){alert("Không tìm thấy học viên");location.href="index.html";return;}
 const s=snap.docs[0].data();
 studentName.textContent=s.name;
 infoCode.textContent="HV"+s.code;
 infoName.textContent=s.name;
 infoUnit.textContent=s.unit||"";
 infoStatus.textContent=s.status||"Hoạt động";
 loadExamLogs(code);
});

/* COUNTER (BỔ SUNG – KHÔNG ẢNH HƯỞNG LOGIC) */
function animate(el,val){
 let n=0,step=Math.max(1,Math.ceil(val/40));
 const t=setInterval(()=>{
  n+=step;
  if(n>=val){el.textContent=val;clearInterval(t);}
  else el.textContent=n;
 },20);
}

/* LOAD LOGS */
let chart=null;
function loadExamLogs(code){
 db.collection("exam_logs").where("code","==",code).get().then(snap=>{
  if(snap.empty){empty.textContent="📭 Chưa có dữ liệu";return;}

  let logs=[],pass=0,fail=0;
  snap.forEach(d=>logs.push(d.data()));
  logs.sort((a,b)=>(b.timestamp?.seconds||0)-(a.timestamp?.seconds||0));

  logTable.innerHTML="";
  logs.forEach((d,i)=>{
   d.pass?pass++:fail++;
   const t=d.timestamp?new Date(d.timestamp.seconds*1000).toLocaleString("vi-VN"):"-";
   logTable.innerHTML+=`
    <tr>
     <td>${i+1}</td>
     <td>${t}</td>
     <td class="${d.pass?'pass':'fail'}">${d.pass?'ĐẠT':'KHÔNG ĐẠT'}</td>
    </tr>`;
  });

  animate(totalExam,logs.length);
  animate(passExam,pass);
  animate(failExam,fail);

  resultTable.style.display="table";
  empty.textContent="";

  const total=pass+fail;
  const passPct=Math.round(pass*100/total);
  const failPct=100-passPct;

  if(chart) chart.destroy();
  chart=new Chart(document.getElementById("chart"),{
   type:"pie",
   data:{
    labels:[`Đạt (${passPct}%)`,`Không đạt (${failPct}%)`],
    datasets:[{
     data:[pass,fail],
     backgroundColor:["#2a9d8f","#e63946"]
    }]
   },
   options:{
    responsive:true,
    maintainAspectRatio:false,
    plugins:{
     tooltip:{
      callbacks:{
       label:(ctx)=>{
        const v=ctx.raw;
        const p=Math.round(v*100/total);
        return `${ctx.label}: ${v} lượt (${p}%)`;
       }
      }
     }
    }
   }
  });
 });
}

/* BUTTONS – GIỮ MẠCH CŨ */
logoutBtn.onclick=()=>{localStorage.clear();location.href="index.html";}
startBtn.onclick=()=>location.href="test.html";
detailBtn.onclick=()=>location.href="exam_detail.html";
</script>

</body>
</html>
