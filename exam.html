<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HỆ THỐNG THI LUẬT GIAO THÔNG ĐƯỜNG BỘ</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
/* GENERAL */
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#eef2f6;}
header{background:linear-gradient(90deg,#1d3557,#264a8a);color:white;padding:18px 30px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 15px rgba(0,0,0,.25);}
header b{font-size:18px}
#logoutBtn{background:#e63946;color:white;border:none;border-radius:8px;padding:10px 16px;cursor:pointer;}
#container{max-width:1200px;margin:30px auto;padding:0 20px;}
#welcome{font-size:22px;margin-bottom:25px;color:#1d3557;}
.grid{display:grid;grid-template-columns:1fr 2.2fr;gap:25px;}
@media(max-width:768px){.grid{grid-template-columns:1fr;}}
.box{background:white;padding:20px;border-radius:14px;box-shadow:0 4px 15px rgba(0,0,0,.12);}
.box h3{margin-top:0;color:#1d3557;}
.info p{margin:8px 0}
.statRow{display:flex;gap:15px;margin-bottom:15px;}
.statBox{flex:1;text-align:center;padding:16px;border-radius:12px;color:white;}
.statBox b{font-size:26px;display:block;margin-top:4px;}
.bg1{background:#457b9d}.bg2{background:#2a9d8f}.bg3{background:#e63946}
.chartBox{height:240px;margin-top:10px;}
table{width:100%;border-collapse:collapse;font-size:14px;margin-top:15px;}
th,td{padding:10px;text-align:center;border-bottom:1px solid #eee;}
th{background:#f1f4fb;color:#1d3557;}
.pass{color:#2a9d8f;font-weight:bold}
.fail{color:#e63946;font-weight:bold}
.actions{display:flex;justify-content:flex-end;gap:14px;margin-top:15px;flex-wrap:wrap;}
.actionBtn{border:none;border-radius:10px;padding:14px 20px;font-size:15px;cursor:pointer;min-width:200px;color:white;}
#detailBtn{background:#457b9d}
#startBtn{background:#2a9d8f}
#empty{color:#888;text-align:center;margin-top:15px;font-style:italic;}

/* MODAL KICKOUT (BẢO TRÌ/BỊ KHÓA) */
.kickout-modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none;
    align-items: center; justify-content: center; z-index: 10000; backdrop-filter: blur(5px);
}
.kickout-modal.show { display: flex; }
.kickout-box {
    background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 420px;
    text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.3); animation: kickoutFadeIn .4s;
    border-top: 6px solid #dc3545;
}
@keyframes kickoutFadeIn { from { opacity: 0; transform: scale(.9); } to { opacity: 1; transform: scale(1); } }
.kickout-box .icon { font-size: 56px; margin-bottom: 15px; color: #dc3545; }
.kickout-box h3 { margin: 0 0 12px; font-size: 20px; color: #1d3557; }
.kickout-box p { font-size: 14px; color: #444; line-height: 1.6; margin: 0 0 20px; }
.kickout-box .countdown { font-size: 13px; color: #888; }
.kickout-box .countdown b { color: #1d3557; font-size: 15px; }
</style>
</head>
<body>

<header>
    <b>HỆ THỐNG THI LUẬT GIAO THÔNG ĐƯỜNG BỘ</b>
    <button id="logoutBtn">Đăng xuất</button>
</header>

<div id="container">
    <div id="welcome">Xin chào, <b id="studentName">...</b> 👋</div>
    
    <div class="grid">
        <div class="box info">
            <h3>📌 Thông tin học viên</h3>
            <p><b>Mã học viên:</b> <span id="infoCode">...</span></p>
            <p><b>Họ và tên:</b> <span id="infoName">...</span></p>
            <p><b>Đơn vị:</b> <span id="infoUnit">...</span></p>
            <p><b>Trạng thái:</b> <span id="infoStatus">...</span></p>
        </div>
        
        <div class="box">
            <h3>📊 Thống kê kết quả</h3>
            <div class="statRow">
                <div class="statBox bg1">Tổng lượt thi<b id="totalExam">0</b></div>
                <div class="statBox bg2">Đạt<b id="passExam">0</b></div>
                <div class="statBox bg3">Không đạt<b id="failExam">0</b></div>
            </div>
            <div class="chartBox">
                <canvas id="chart"></canvas>
            </div>
            <div id="empty"></div>
            
            <table id="resultTable" style="display:none;">
                <thead>
                    <tr><th>#</th><th>Thời gian</th><th>Đề thi</th><th>Điểm</th><th>Kết quả</th></tr>
                </thead>
                <tbody id="logTable"></tbody>
            </table>
            
            <div class="actions">
                <button id="detailBtn" class="actionBtn">📜 Thống kê chi tiết</button>
                <button id="startBtn" class="actionBtn">▶ Làm bài kiểm tra</button>
            </div>
        </div>
    </div>
</div>

<!-- MODAL BỊ KHÓA / BẢO TRÌ (Đá văng) -->
<div class="kickout-modal" id="kickoutModal">
    <div class="kickout-box">
        <div class="icon" id="kickoutIcon"></div>
        <h3 id="kickoutTitle"></h3>
        <p id="kickoutMessage"></p>
        <div class="countdown">
            Sẽ tự động quay lại trang đăng nhập sau <b id="kickoutCountdown">5</b> giây...
        </div>
    </div>
</div>

<script>
// =====================================================================
// FIREBASE CONFIG
// =====================================================================
try {
    if (firebase.apps.length === 0) {
        firebase.initializeApp({
            apiKey: "AIzaSyBGivIEsyBLsLs0CqRvwmwceG26duZbWlM",
            authDomain: "thi-luat-giao-thong.firebaseapp.com",
            projectId: "thi-luat-giao-thong"
        });
    }
} catch(e) { console.error('Firebase init:', e); }
const db = firebase.firestore();

// =====================================================================
// AUTH CHECK & DATA
// =====================================================================
const userType = localStorage.getItem("userType");
const studentCode = localStorage.getItem("studentCode");

if (userType !== "student" || !studentCode) {
    location.href = "index.html";
}

// =====================================================================
// MAIN LOGIC
// =====================================================================
async function initPage() {
    try {
        // Kiểm tra bảo trì ngay khi vào trang
        const maintDoc = await db.collection('systemConfig').doc('maintenance').get();
        if (maintDoc.exists && maintDoc.data().enabled) {
            kickOut('🔧 Hệ thống bảo trì', 'Hệ thống đang được nâng cấp. Bạn sẽ được đăng xuất.', '🔧');
            return;
        }

        // Lấy thông tin học viên
        let studentData = null;
        const docSnap = await db.collection("students").doc(studentCode).get();
        
        if (docSnap.exists) {
            studentData = docSnap.data();
        } else {
            // Fallback nếu không tìm thấy theo ID
            const querySnap = await db.collection("students").where("code","==",studentCode).limit(1).get();
            if (!querySnap.empty) studentData = querySnap.docs[0].data();
        }

        if (!studentData) {
            alert("Không tìm thấy dữ liệu học viên!");
            localStorage.clear();
            location.href = "index.html";
            return;
        }

        // Kiểm tra trạng thái khóa
        if (studentData.status === 'locked') {
            kickOut('🔒 Tài khoản đã bị khóa!', 'Tài khoản của bạn vừa bị Quản trị viên vô hiệu hóa.', '🔒');
            return;
        }

        // Hiển thị thông tin
        document.getElementById('studentName').textContent = studentData.name || '';
        document.getElementById('infoCode').textContent = studentData.code || studentCode;
        document.getElementById('infoName').textContent = studentData.name || '';
        document.getElementById('infoUnit').textContent = studentData.unit || '';
        document.getElementById('infoStatus').textContent = studentData.status === 'active' ? '✅ Hoạt động' : '🔒 Đã khóa';

        // Load dữ liệu thi
        loadExamLogs();

    } catch(e) {
        console.error("Init Error:", e);
    }
}

// =====================================================================
// LOAD EXAM LOGS & CHART
// =====================================================================
let chart = null;
function loadExamLogs() {
    db.collection("examResults")
        .where("studentCode", "==", studentCode)
        .orderBy("timestamp", "desc")
        .limit(50)
        .get()
        .then(snap => {
            if (snap.empty) {
                document.getElementById('empty').textContent = "📂 Chưa có dữ liệu kiểm tra";
                return;
            }

            let pass = 0, fail = 0;
            const logs = [];
            snap.forEach(d => {
                const data = d.data();
                logs.push(data);
                const score = data.score || 0;
                const totalQ = data.totalQuestions || 30;
                // Logic đậu/trượt: >= 26/30 (ví dụ cho oto), hoặc tùy config của bạn. 
                // Ở đây lấy tạm >= 80% hoặc theo trường passed có sẵn
                if (data.passed) pass++; else fail++;
            });

            // Render Table
            const tb = document.getElementById('logTable');
            tb.innerHTML = "";
            logs.slice(0, 5).forEach((d, i) => { // Chỉ hiện 5 kết quả mới nhất
                const ts = d.timestamp?.toDate ? d.timestamp.toDate() : new Date();
                const timeStr = ts.toLocaleString("vi-VN");
                const isPass = d.passed;
                tb.innerHTML += `
                    <tr>
                        <td>${i+1}</td>
                        <td>${timeStr}</td>
                        <td>${d.setName || d.setCode || '-'}</td>
                        <td>${d.score}/${d.totalQuestions}</td>
                        <td class="${isPass ? 'pass' : 'fail'}">${isPass ? 'ĐẠT' : 'KHÔNG ĐẠT'}</td>
                    </tr>`;
            });
            document.getElementById('resultTable').style.display = "table";
            document.getElementById('empty').textContent = "";

            // Animate Numbers
            animate(document.getElementById('totalExam'), logs.length);
            animate(document.getElementById('passExam'), pass);
            animate(document.getElementById('failExam'), fail);

            // Chart
            const total = pass + fail;
            const passPct = total ? Math.round(pass * 100 / total) : 0;
            const failPct = 100 - passPct;
            
            if (chart) chart.destroy();
            chart = new Chart(document.getElementById("chart"), {
                type: "pie",
                data: {
                    labels: [`Đạt (${passPct}%)`, `Không đạt (${failPct}%)`],
                    datasets: [{
                        data: [pass, fail],
                        backgroundColor: ["#2a9d8f", "#e63946"]
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom' } }
                }
            });
        })
        .catch(e => console.warn('Lỗi tải lịch sử:', e));
}

function animate(el, val) {
    let n = 0, step = Math.max(1, Math.ceil(val / 40));
    const t = setInterval(() => {
        n += step;
        if (n >= val) { el.textContent = val; clearInterval(t); }
        else el.textContent = n;
    }, 20);
}

// =====================================================================
// BUTTONS
// =====================================================================
document.getElementById('logoutBtn').onclick = () => {
    // Set offline
    db.collection('presence').doc(studentCode).set({ isOnline: false }, { merge: true });
    localStorage.clear();
    location.href = "index.html";
};
document.getElementById('startBtn').onclick = () => location.href = "test.html"; // Hoặc trang chọn đề
document.getElementById('detailBtn').onclick = () => location.href = "exam_detail.html";

// =====================================================================
// SECURITY & REAL-TIME (QUAN TRỌNG)
// =====================================================================
let isKicked = false;
let studentUnsub = null, maintUnsub = null;

function kickOut(title, message, icon) {
    if (isKicked) return;
    isKicked = true;

    if (studentUnsub) studentUnsub();
    if (maintUnsub) maintUnsub();

    // Set Offline
    db.collection('presence').doc(studentCode).set({ isOnline: false }, { merge: true });
    
    // Show Modal
    const modal = document.getElementById('kickoutModal');
    document.getElementById('kickoutIcon').textContent = icon;
    document.getElementById('kickoutTitle').textContent = title;
    document.getElementById('kickoutMessage').textContent = message;
    modal.classList.add('show');

    // Countdown
    let seconds = 5;
    const countdownEl = document.getElementById('kickoutCountdown');
    setInterval(() => {
        seconds--;
        if (countdownEl) countdownEl.textContent = seconds;
        if (seconds <= 0) {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    }, 1000);
}

// 1. Init
initPage();

// 2. Lắng nghe khóa tài khoản
studentUnsub = db.collection('students').doc(studentCode).onSnapshot((doc) => {
    if (doc.exists && doc.data().status === 'locked') {
        kickOut('🔒 Tài khoản đã bị khóa!', 'Tài khoản của bạn vừa bị Quản trị viên vô hiệu hóa.', '🔒');
    }
});

// 3. Lắng nghe bảo trì
maintUnsub = db.collection('systemConfig').doc('maintenance').onSnapshot((doc) => {
    if (doc.exists && doc.data().enabled === true) {
        kickOut('🔧 Hệ thống bảo trì', 'Hệ thống đang được nâng cấp. Bạn sẽ được đăng xuất.', '🔧');
    }
});

// 4. Heartbeat Online (20s/lần)
const presenceRef = db.collection('presence').doc(studentCode);
const sendHeartbeat = () => {
    if (!isKicked) {
        presenceRef.set({
            isOnline: true,
            currentSection: 'Trang chủ cá nhân',
            lastActive: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true }).catch(()=>{});
    }
};
sendHeartbeat();
setInterval(sendHeartbeat, 20000);

// 5. Báo Offline khi đóng tab
window.addEventListener('beforeunload', () => {
    if(!isKicked) presenceRef.set({ isOnline: false, currentSection: 'Đã thoát' }, { merge: true });
});
</script>
</body>
</html>
